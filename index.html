<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentOS</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14171c; --ink-soft:#3c4249; --paper:#f1f3f0; --surface:#ffffff; --line:#dfe2dc;
    --accent:#2f6f5e; --accent-dark:#204f42; --accent-soft:#e2ede8;
    --amber:#e2a542; --amber-soft:#faecd6; --coral:#d1503f; --coral-soft:#f7e2de;
    --blue:#3d6fa8; --blue-soft:#e1ebf4; --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);overflow:hidden;}
  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px;}
  
  /* Shell & Dock */
  #login-screen{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:100;}
  .login-card{background:var(--surface);width:380px;max-width:90vw;border-radius:16px;padding:36px 32px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
  #app{display:none;height:100vh;}
  .shell{display:flex;height:100vh;position:relative;}
  .dock{width:220px;background:var(--ink);color:#dfe3e0;display:flex;flex-direction:column;padding:18px 12px;flex-shrink:0;transition:transform 0.3s ease;z-index:50;}
  .main-col{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--paper);}
  
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;font-size:13.5px;font-weight:500;color:#b7bdb9;margin-bottom:2px;cursor:pointer;}
  .nav-item:hover{background:#1e2229;color:#fff;}
  .nav-item.active{background:var(--accent);color:#fff;}
  
  /* UI Elements */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);}
  table{width:100%;border-collapse:collapse;font-size:13px;text-align:left;}
  th{font-size:11px;text-transform:uppercase;color:var(--ink-soft);padding:10px 14px;border-bottom:1px solid var(--line);background:#f9f9f7;font-weight:600;}
  td{padding:11px 14px;border-bottom:1px solid #ececE7;}
  
  .modal-overlay{position:fixed;inset:0;background:rgba(20,23,28,.6);display:none;align-items:flex-start;justify-content:center;z-index:90;padding:6vh 20px;overflow-y:auto;backdrop-filter:blur(2px);}
  .modal-overlay.open{display:flex;}
  .modal{background:#fff;border-radius:14px;width:800px;max-width:100%;box-shadow:0 30px 80px rgba(0,0,0,.35);}
  .modal-sm{width:520px;}
  
  .toast{position:fixed;bottom:22px;right:22px;background:var(--ink);color:#fff;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:500;z-index:200;display:none;}
  .toast.show{display:flex;}
  
  /* Timeline & Highlight */
  .timeline{border-left:2px solid var(--line);margin-left:10px;padding-left:16px;position:relative;}
  .tl-item{position:relative;margin-bottom:16px;}
  .tl-item::before{content:'';position:absolute;left:-21px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--surface);border:2px solid var(--accent);}
  mark.hl{background:var(--amber-soft);color:#8a5a12;border-radius:2px;padding:0 2px;}

  @media(max-width:980px){
    .shell{flex-direction:column;}
    .dock{position:absolute;left:-220px;height:100%;box-shadow:2px 0 10px rgba(0,0,0,0.2);}
    .dock.open{transform:translateX(220px);}
    .menu-btn{display:block !important;}
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div style="font-family:'Space Grotesk';font-size:24px;font-weight:700;margin-bottom:6px;color:var(--ink);">ContentOS <span class="text-xs text-teal-600 align-top">v2</span></div>
    <div class="text-xs text-gray-500 mb-6 uppercase tracking-widest font-semibold">Workspace Authentication</div>
    <select id="login-user" class="w-full p-2 mb-4 rounded border border-gray-300 text-sm bg-gray-50 focus:outline-none focus:border-teal-500"></select>
    <button class="w-full bg-[#2f6f5e] hover:bg-[#204f42] text-white p-2.5 rounded-lg text-sm font-bold transition shadow-sm" onclick="doLogin()">Enter Workspace</button>
  </div>
</div>

<div id="app">
<div class="shell">
  
  <div class="dock" id="sidebar">
    <div class="flex items-center gap-2 px-2 py-1 mb-6">
      <div class="w-7 h-7 rounded-full bg-[#2f6f5e] flex items-center justify-center border-2 border-[#204f42]">
        <span class="text-white font-bold text-xs">OS</span>
      </div>
      <span class="display font-bold text-lg text-white">ContentOS</span>
    </div>
    <div id="nav-list" class="flex-1 overflow-y-auto"></div>
    <div class="mt-auto border-t border-gray-700 pt-3 px-2">
      <div id="user-name-tag" class="font-bold text-white text-xs truncate mb-0.5"></div>
      <div id="user-role-tag" class="text-[10px] text-gray-400 truncate mb-2"></div>
      <button class="text-xs text-gray-400 hover:text-white transition" onclick="doLogout()">Sign out</button>
    </div>
  </div>

  <div class="main-col">
    <div class="h-14 bg-white border-b border-gray-200 flex items-center px-5 gap-4 flex-shrink-0 z-10 relative">
      <button class="menu-btn hidden mr-2 text-gray-600" onclick="toggleSidebar()">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      
      <div class="flex-1 max-w-xl relative">
        <svg class="absolute left-3 top-2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input id="global-search" class="w-full bg-gray-100 border border-gray-200 rounded-md py-1.5 pl-9 pr-3 text-sm focus:outline-none focus:border-[#2f6f5e] focus:bg-white transition" placeholder="Search tasks, products, brands, users, comments... (/)" onfocus="openCmdk()" readonly>
      </div>
      
      <div class="ml-auto flex items-center gap-4">
        <button class="relative text-gray-500 hover:text-[#2f6f5e] transition" onclick="toggleNotif()">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
          <span id="notif-dot" class="absolute top-0 right-0 w-2 h-2 bg-red-500 border border-white rounded-full hidden"></span>
        </button>
      </div>
    </div>
    
    <div class="flex-1 overflow-y-auto p-5 md:p-7" id="view"></div>
  </div>
</div>
</div>

<div id="notif-panel" class="absolute top-14 right-5 w-80 bg-white border border-gray-200 rounded-xl shadow-2xl hidden z-[80] flex-col max-h-[70vh]">
  <div class="p-3 border-b flex justify-between items-center bg-gray-50 rounded-t-xl">
    <select id="notif-filter" class="text-xs font-bold bg-transparent outline-none cursor-pointer" onchange="renderNotifList()">
      <option value="all">All Notifications</option>
      <option value="Task">Tasks</option>
      <option value="Comment">Comments</option>
      <option value="System">System</option>
      <option value="Warning">Warnings</option>
    </select>
    <button class="text-[10px] text-[#2f6f5e] font-bold hover:underline uppercase" onclick="markAllRead()">Mark All Read</button>
  </div>
  <div id="notif-list" class="overflow-y-auto flex-1 divide-y"></div>
</div>

<div id="cmdk" class="fixed inset-0 bg-gray-900/50 z-[100] hidden flex-col items-center pt-[15vh] backdrop-blur-sm" onclick="if(event.target===this)closeCmdk()">
  <div class="bg-white w-[650px] max-w-[95vw] rounded-xl shadow-2xl overflow-hidden flex flex-col">
    <div class="flex items-center px-4 border-b">
      <svg class="w-5 h-5 text-[#2f6f5e]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input id="cmdk-input" class="w-full p-4 text-base border-none outline-none font-medium" placeholder="Search ContentOS..." oninput="renderCmdkResults(this.value)">
    </div>
    <div id="cmdk-results" class="max-h-[50vh] overflow-y-auto bg-gray-50/50"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal flex flex-col max-h-[90vh]" id="modal-box"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* =========================================================
   CORE ARCHITECTURE & DATA LAYER
========================================================= */

// Req 22: Advanced Role Permissions Matrix
const ROLES_MATRIX = {
  'Admin': { dashboard:{view:true}, tasks:{view:true, create:true, edit:true, del:true, assign:true, comment:true, complete:true}, products:{view:true, create:true, edit:true, del:true}, brands:{view:true, edit:true}, reports:{view:true, export:true}, analytics:{view:true}, settings:{view:true, edit:true}, users:{view:true, create:true, edit:true, del:true}, audit:{view:true}, trash:{view:true, restore:true, del:true}, calendar:{view:true}, log:{view:true} },
  'General Manager': { dashboard:{view:true}, tasks:{view:true, create:true, edit:true, del:false, assign:true, comment:true, complete:true}, products:{view:true, create:true, edit:true, del:false}, brands:{view:true, edit:true}, reports:{view:true, export:true}, analytics:{view:true}, settings:{view:false, edit:false}, users:{view:true, create:false, edit:false, del:false}, audit:{view:true}, trash:{view:false, restore:false, del:false}, calendar:{view:true}, log:{view:true} },
  'Content Creator': { dashboard:{view:true}, tasks:{view:true, create:false, edit:false, del:false, assign:false, comment:true, complete:true}, products:{view:true, create:false, edit:false, del:false}, brands:{view:true, edit:false}, reports:{view:false, export:false}, analytics:{view:true}, settings:{view:false, edit:false}, users:{view:false, create:false, edit:false, del:false}, audit:{view:false}, trash:{view:false, restore:false, del:false}, calendar:{view:true}, log:{view:true} },
  'Viewer': { dashboard:{view:true}, tasks:{view:true, create:false, edit:false, del:false, assign:false, comment:false, complete:false}, products:{view:true, create:false, edit:false, del:false}, brands:{view:true, edit:false}, reports:{view:true, export:false}, analytics:{view:true}, settings:{view:false, edit:false}, users:{view:false, create:false, edit:false, del:false}, audit:{view:false}, trash:{view:false, restore:false, del:false}, calendar:{view:true}, log:{view:true} }
};

const DEFAULT_SETTINGS = {
  postTypes: ['Story','Post','Status','Video','Animation','Other'],
  taskStatuses: ['Pending','In Progress','In Review','Done'],
  taskPriorities: ['High', 'Normal', 'Low'],
  productStatuses: ['New Product','Active','Out of Stock','Discontinued'],
  productCategories: ['Serum', 'Cream', 'Body Care', 'Hair Care', 'Supplement', 'Other'],
  googleDrive: { rootFolderId: '', autoCreateFolders: false, brandDefaultIds:{}, prodDefaultIds:{} },
  googleSheets: { sheetId: '', syncTasks: false, syncProducts: false },
  notifPrefs: { Task:true, Comment:true, Warning:true, System:true }
};

const DB = {
  key: 'contentos_db_v2_master',
  data: null,
  load() {
    const raw = localStorage.getItem(this.key);
    if(raw) { this.data = JSON.parse(raw); this.migrate(); } 
    else { this.data = this.seed(); this.save(); }
  },
  migrate() {
    if(!this.data.brands) this.data.brands = [{id:'exact',name:'Exact Extract',color:'#2f6f5e'}];
    if(!this.data.settings) this.data.settings = JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
    if(!this.data.settings.taskPriorities) this.data.settings.taskPriorities = ['High','Normal','Low'];
    if(!this.data.settings.notifPrefs) this.data.settings.notifPrefs = {Task:true,Comment:true,Warning:true,System:true};
    if(!this.data.comments) this.data.comments = [];
    if(!this.data.history) this.data.history = [];
    if(!this.data.audit) this.data.audit = [];
    if(!this.data.trash) this.data.trash = [];
    if(!this.data.logs) this.data.logs = [];
    
    this.data.tasks.forEach(t => { 
      if(t.deleted===undefined) t.deleted = false; 
      if(!t.links) t.links = t.driveLink ? [{id:uid('lnk'), name:'Main File', url:t.driveLink}] : [];
      if(!t.priority) t.priority = 'Normal';
    });
    this.data.products.forEach(p => { if(p.deleted===undefined) p.deleted = false; });
    this.save();
  },
  save() { localStorage.setItem(this.key, JSON.stringify(this.data)); },
  seed() {
    const users = [
      {id:'u1', name:'Nikitha Keshan Gomes', role:'Admin', email:'nk@biseka.lk'},
      {id:'u2', name:'General Manager', role:'General Manager', email:'gm@biseka.lk'},
      {id:'u3', name:'Content Creator 1', role:'Content Creator', email:'cc1@biseka.lk'}
    ];
    const brands = [
      {id:'exact', name:'Exact Extract', color:'#2f6f5e'}, {id:'biseka', name:'Biseka', color:'#3d6fa8'},
      {id:'lovelab', name:'Love&Lab', color:'#d1503f'}, {id:'ola', name:'OLA Tangalle', color:'#e2a542'}
    ];
    const products = [{id:'p1', name:'Vitamin C Face Serum', brand:'exact', sku:'EXA-VC-030', category:'Serum', status:'Active', ts:Date.now()-864000000, deleted:false}];
    const tasks = [{id:'t1', brand:'exact', title:'Instagram Reel Launch', type:'Video', product:'p1', assignee:'u3', addedBy:'u1', date:todayISO(), priority:'High', status:'Pending', links:[], deleted:false, ts:Date.now()-80000}];
    return { users, brands, products, tasks, logs:[], notifications:[], comments:[], history:[], audit:[], trash:[], settings:JSON.parse(JSON.stringify(DEFAULT_SETTINGS)) };
  }
};

/* --- Utilities --- */
function uid(prefix){ return prefix+'_'+Math.random().toString(36).slice(2,9); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmtDate(iso){ if(!iso) return '—'; return new Date(iso+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function timeAgo(ts){ const s=Math.floor((Date.now()-ts)/1000); if(s<60) return 'Just now'; const m=Math.floor(s/60); if(m<60) return m+'m ago'; const h=Math.floor(m/60); if(h<24) return h+'h ago'; return Math.floor(h/24)+'d ago'; }
function escapeHtml(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function hl(text, q) { 
  if(!q || !text) return escapeHtml(text||''); 
  return escapeHtml(text).replace(new RegExp(`(${escapeHtml(q)})`, 'gi'), '<mark class="hl">$1</mark>'); 
}
function brandOf(id){ return DB.data.brands.find(b=>b.id===id) || {name:'Unknown', color:'#94a3b8'}; }
function getUserName(id){ const u=DB.data.users.find(x=>x.id===id); return u ? u.name : 'System'; }

let SESSION = null;
let currentView = 'dashboard';

/* =========================================================
   SYSTEM LOGGING & EVENT HANDLING
========================================================= */
function logAudit(module, action, oldVal, newVal) {
  DB.data.audit.unshift({ id: uid('aud'), user: SESSION.id, module, action, oldVal: JSON.stringify(oldVal), newVal: JSON.stringify(newVal), ts: Date.now() });
}
function logTaskHistory(taskId, action) {
  DB.data.history.unshift({ id: uid('hst'), taskId, user: SESSION.id, action, ts: Date.now() });
}
function addNotif(text, type='System', roleFilter='all') {
  if(DB.data.settings.notifPrefs && DB.data.settings.notifPrefs[type] === false) return; // User preference toggle check
  const icons = {'Comment':'💬', 'Warning':'⚠️', 'Task':'📋', 'System':'🔔', 'Complete':'✅'};
  DB.data.notifications.unshift({ id: uid('ntf'), text, type, icon:icons[type]||'🔔', ts: Date.now(), read: false, forRole: roleFilter });
  refreshNotifDot();
}
function softDelete(module, id, itemObj) {
  itemObj.deleted = true;
  DB.data.trash.unshift({ id: uid('trsh'), module, itemId: id, itemData: JSON.stringify(itemObj), deletedBy: SESSION.id, ts: Date.now() });
  logAudit(module, 'Moved to Trash', itemObj.name || itemObj.title, null);
  DB.save();
}

/* =========================================================
   AUTHENTICATION & ROUTING
========================================================= */
function doLogin(){
  const userId = document.getElementById('login-user').value;
  const user = DB.data.users.find(u=>u.id===userId);
  SESSION = { id: user.id, name: user.name, role: user.role };
  localStorage.setItem('contentos_session', JSON.stringify(SESSION));
  boot();
}
function doLogout(){ localStorage.removeItem('contentos_session'); location.reload(); }
function perms(){ return ROLES_MATRIX[SESSION.role] || ROLES_MATRIX['Viewer']; }

function boot(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('user-name-tag').textContent = SESSION.name;
  document.getElementById('user-role-tag').textContent = SESSION.role;
  document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('en-GB',{weekday:'short', day:'2-digit', month:'short', year:'numeric'});
  buildNav(); renderView('dashboard'); refreshNotifDot();
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
function buildNav(){
  const p = perms();
  const menu = [
    {id:'dashboard', label:'Dashboard', icon:'M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z', show:p.dashboard.view},
    {id:'tasks', label:'Task Workflow', icon:'M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11', show:p.tasks.view},
    {id:'products', label:'Products Library', icon:'M20.5 7.3L12 12l-8.5-4.7M12 12v9M20.5 7.3L12 3 3.5 7.3 12 12l8.5-4.7z', show:p.products.view},
    {id:'calendar', label:'Marketing Calendar', icon:'M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z', show:p.calendar.view},
    {id:'log', label:'Content Logs', icon:'M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z', show:p.log.view},
    {id:'analytics', label:'Analytics', icon:'M4 19h16M7 15v4M12 9v10M17 5v14', show:p.analytics.view},
    {id:'reports', label:'Export Reports', icon:'M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z', show:p.reports.view},
    {id:'users', label:'Team & Users', icon:'M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z', show:p.users.view},
    {id:'audit', label:'System Audit', icon:'M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z', show:p.audit.view},
    {id:'trash', label:'Trash', icon:'M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16', show:p.trash.view},
    {id:'settings', label:'Settings', icon:'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z', show:p.settings.view},
  ];
  document.getElementById('nav-list').innerHTML = menu.filter(m=>m.show).map(m=>`
    <a class="nav-item ${currentView===m.id?'active':''}" onclick="renderView('${m.id}')">
      <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${m.icon}"/></svg>
      <span>${m.label}</span>
    </a>`).join('');
}
function renderView(id) {
  currentView = id;
  buildNav();
  if(window.innerWidth <= 980) document.getElementById('sidebar').classList.remove('open');
  const renders = {dashboard:renderDash, tasks:renderTasks, products:renderProducts, calendar:renderCalendar, log:renderLogs, analytics:renderAnalytics, settings:renderSettings, reports:renderReports, users:renderUsers, audit:renderAudit, trash:renderTrash};
  if(renders[id]) renders[id](document.getElementById('view'));
}

/* =========================================================
   1. DASHBOARD & FEED (Req 8)
========================================================= */
function renderDash(el) {
  const activeTasks = DB.data.tasks.filter(t=>!t.deleted && t.status!=='Done');
  const feed = DB.data.history.slice(0, 10);
  
  el.innerHTML = `
    <h1 class="text-2xl font-bold mb-6 text-gray-800">Dashboard</h1>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 mb-5">

function renderTasks(el) {
  const p = perms().tasks;

  if(taskFilter.status) tasks = tasks.filter(t=>t.status===taskFilter.status);
  if(taskFilter.type) tasks = tasks.filter(t=>t.type===taskFilter.type);

  if(taskFilter.priority) tasks = tasks.filter(t=>t.priority===taskFilter.priority);

function saveNewTask() {
  const title = document.getElementById('nt-title').value.trim();
  const brand = document.getElementById('nt-brand').value;
  const product = document.getElementById('nt-product').value;
  const type = document.getElementById('nt-type').value;
  const assignee = document.getElementById('nt-assignee').value;
  const priority = document.getElementById('nt-priority').value;
  
  if(!title) return toast('Task title is required');

  if(product) { // Req 7: Duplicate Warning
    const dups = DB.data.tasks.filter(t=>!t.deleted && t.product===product && t.type===type);
    if(dups.length > 0) {
      if(!confirm(`Warning: This product already has ${dups.length} active ${type} task(s). Create anyway?`)) return;
      addNotif(`Duplicate ${type} task created for product`, 'Warning');
    }
  }

  const t = { id: uid('tsk'), title, brand, product, type, assignee, priority, status: 'Pending', date: todayISO(), links: [], deleted: false, addedBy: SESSION.id, ts: Date.now() };
  DB.data.tasks.unshift(t);
  
  logTaskHistory(t.id, 'Task created & assigned');
  logAudit('Tasks', 'Create', null, t.title);
  addNotif(`New task assigned: ${title}`, 'Task', assignee);
  
  DB.save(); closeModal(); renderView('tasks'); toast('Task created');
}

function updateTaskStatus(id, newStatus) {
  const t = DB.data.tasks.find(x=>x.id===id);
  const old = t.status;
  t.status = newStatus;
  logTaskHistory(id, `Changed status to "${newStatus}"`);
  logAudit('Tasks', 'Update Status', old, newStatus);
  if(newStatus === 'Done') {
    addNotif(`Task completed: ${t.title}`, 'Complete');
    DB.data.logs.unshift({ id:uid('log'), taskId:t.id, brand:t.brand, product:t.product, type:t.type, date:todayISO(), title:t.title, links:t.links, completedBy:SESSION.id });
  }
  DB.save(); toast('Status updated'); renderView('tasks');
}

function addLinkPrompt(id) {
  const name = prompt("Enter attachment name (e.g. Final Video, Caption Doc):");
  if(!name) return;
  const url = prompt("Paste Google Drive URL:");
  if(!url) return;
  const t = DB.data.tasks.find(x=>x.id===id);
  t.links.push({id:uid('lnk'), name, url});
  logTaskHistory(id, `Added attachment: ${name}`);
  logAudit('Tasks', 'Add Link', null, name);
  DB.save(); openTaskDetail(id);
}
function removeLink(tid, lid) {
  if(!confirm("Remove this attachment?")) return;
  const t = DB.data.tasks.find(x=>x.id===tid);
  t.links = t.links.filter(l=>l.id!==lid);
  logTaskHistory(tid, `Removed an attachment`);
  DB.save(); openTaskDetail(tid);
}

// Comments Req 1
function submitComment(id) {
  const text = document.getElementById('td-comment').value.trim();
  if(!text) return;
  if(editingCommentId) {
    const c = DB.data.comments.find(x=>x.id===editingCommentId);
    c.text = text; c.edited = true; c.ts = Date.now();
    logTaskHistory(id, 'Edited a comment');
    editingCommentId = null;
  } else {
    const c = { id:uid('cmt'), taskId:id, userId:SESSION.id, text, ts:Date.now() };
    DB.data.comments.push(c);
    logTaskHistory(id, 'Added a comment');
    const t = DB.data.tasks.find(x=>x.id===id);
    addNotif(`${SESSION.name} commented: ${text.substring(0,25)}...`, 'Comment');
  }
  DB.save(); openTaskDetail(id);
}
function editCommentPrompt(tid, cid) {
  const c = DB.data.comments.find(x=>x.id===cid);
  document.getElementById('td-comment').value = c.text;
  document.getElementById('td-cmt-btn').innerText = 'Save Edit';
  editingCommentId = cid;
}
function deleteComment(tid, cid) {
  if(!confirm('Delete comment permanently?')) return;
  DB.data.comments = DB.data.comments.filter(c=>c.id!==cid);
  logTaskHistory(tid, 'Deleted a comment');
  DB.save(); openTaskDetail(tid);
}

function deleteTask(id) {
  if(!confirm("Move task to trash?")) return;
  softDelete('Tasks', id, DB.data.tasks.find(x=>x.id===id));
  closeModal(); renderView('tasks'); toast('Task trashed');
}

function saveProduct(id) {
  const name = document.getElementById('pm-name').value.trim();
  if(!name) return toast('Name required');
  const data = {
    name, brand: document.getElementById('pm-brand').value, sku: document.getElementById('pm-sku').value.trim(),
    category: document.getElementById('pm-category').value, status: document.getElementById('pm-status').value
  };
  
  if(id) {
    const p = DB.data.products.find(x=>x.id===id);
    logAudit('Products', 'Edit', p.name, name);
    Object.assign(p, data);
  } else {
    const p = { id:uid('prd'), ts:Date.now(), deleted:false, ...data };
    DB.data.products.unshift(p);
    logAudit('Products', 'Create', null, name);
    addNotif(`New Product Added: ${name}`, 'System');
  }
  DB.save(); closeModal(); renderView('products'); toast('Product saved');
}

let calMonth = new Date().getMonth(); let calYear = new Date().getFullYear();
function renderCalendar(el){
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  let blanks = firstDay===0 ? 6 : firstDay-1; 
  
  let cells = '';
  for(let i=0; i<blanks; i++) cells += `<div class="cal-cell dim"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const iso = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const evs = CALENDAR_EVENTS.filter(e=>e.date===iso);
    const tsks = DB.data.tasks.filter(t=>t.date===iso && !t.deleted);
    cells += `
      <div class="cal-cell ${iso===todayISO()?'ring-2 ring-[#2f6f5e] bg-teal-50':''}">
        <div class="font-bold text-xs mb-1 text-gray-600">${d}</div>
        ${evs.map(e=>`<div class="text-[9px] font-bold px-1.5 py-0.5 rounded mb-0.5 truncate ${e.type==='global'?'bg-blue-100 text-blue-800':'bg-orange-100 text-orange-800'}">${e.name}</div>`).join('')}
        ${tsks.map(t=>`<div class="text-[9px] bg-white border border-gray-200 text-gray-700 px-1.5 py-0.5 rounded mb-0.5 truncate cursor-pointer hover:border-teal-400 shadow-sm" onclick="openTaskDetail('${t.id}')">${t.title}</div>`).join('')}
      </div>`;
  }
  
  el.innerHTML = `
    <h1 class="text-2xl font-bold mb-6 text-gray-800">Marketing Calendar</h1>
    <div class="card p-5 bg-white shadow-sm border-gray-200">
      <div class="flex justify-between items-center mb-5">
        <button class="px-3 py-1 border rounded text-sm hover:bg-gray-50 font-bold text-gray-600" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderView('calendar')">← Prev</button>
        <span class="font-bold text-lg text-gray-800">${['January','February','March','April','May','June','July','August','September','October','November','December'][calMonth]} ${calYear}</span>
        <button class="px-3 py-1 border rounded text-sm hover:bg-gray-50 font-bold text-gray-600" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderView('calendar')">Next →</button>
      </div>
      <div class="grid grid-cols-7 gap-1 text-center font-bold text-[10px] text-gray-500 mb-1.5 uppercase tracking-widest">
        <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
      </div>
      <div class="cal-grid rounded-xl overflow-hidden shadow-inner">${cells}</div>
    </div>
  `;
}

            return `<div class="flex items-center text-xs"><div class="w-28 truncate font-bold text-gray-700">${pt}</div><div class="flex-1 bg-gray-100 h-2.5 rounded-full mx-3 overflow-hidden border border-gray-200"><div class="h-full rounded-full bg-[#2f6f5e]" style="width:${(count/max)*100}%"></div></div><div class="w-6 text-right mono font-bold text-gray-600">${count}</div></div>`;
          }).join('')}
        </div>
      </div>
    </div>
  `;
}

function restoreItem(id) {
  const tr = DB.data.trash.find(x=>x.id===id);
  if(tr.module === 'Tasks') { const t=DB.data.tasks.find(x=>x.id===tr.itemId); if(t) t.deleted=false; }
  if(tr.module === 'Products') { const p=DB.data.products.find(x=>x.id===tr.itemId); if(p) p.deleted=false; }
  DB.data.trash = DB.data.trash.filter(x=>x.id!==id);
  logAudit(tr.module, 'Restored', null, tr.itemId);
  DB.save(); renderView('trash'); toast('Item restored');
}
function permanentDelete(id) {
  if(!confirm("Permanently delete? Cannot be undone.")) return;
  DB.data.trash = DB.data.trash.filter(x=>x.id!==id);
  DB.save(); renderView('trash'); toast('Permanently deleted');
}
function emptyTrash() {
  if(!confirm("Empty all trash?")) return;
  DB.data.trash = []; DB.save(); renderView('trash'); toast('Trash emptied');
}

/* =========================================================
   COMMAND PALETTE (CMDK) - Req 9 Unified Search with Highlighting
========================================================= */
function openCmdk(){
  document.getElementById('cmdk').classList.remove('hidden');
  document.getElementById('cmdk').classList.add('flex');
  setTimeout(()=>document.getElementById('cmdk-input').focus(),30);
  renderCmdkResults('');
}
function closeCmdk(){ 
  document.getElementById('cmdk').classList.add('hidden'); 
  document.getElementById('cmdk').classList.remove('flex');
}
document.addEventListener('keydown', e=>{
  if(e.key==='/' && document.activeElement.tagName!=='INPUT' && document.activeElement.tagName!=='TEXTAREA'){ e.preventDefault(); if(SESSION) openCmdk(); }
  if(e.key==='Escape') { closeCmdk(); closeModal(); }
});

function renderCmdkResults(q){
  q = q.toLowerCase().trim();
  const results = [];
  
  // Search tasks, products, brands, users, comments, links (Req 9)
  DB.data.tasks.filter(t=>!t.deleted).forEach(t=>{ if(!q || t.title.toLowerCase().includes(q)) results.push({tag:'Task', label:t.title, sub:t.type, action:()=>{closeCmdk();renderView('tasks');openTaskDetail(t.id);}}); });
  DB.data.products.filter(p=>!p.deleted).forEach(p=>{ if(!q || p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q)) results.push({tag:'Product', label:p.name, sub:p.sku, action:()=>{closeCmdk();renderView('products');openProductDetail(p.id);}}); });
  DB.data.brands.forEach(b=>{ if(!q || b.name.toLowerCase().includes(q)) results.push({tag:'Brand', label:b.name, sub:'Dashboard View', action:()=>{closeCmdk();renderView('dashboard');}}); });
  DB.data.users.forEach(u=>{ if(!q || u.name.toLowerCase().includes(q)) results.push({tag:'User', label:u.name, sub:u.role, action:()=>{closeCmdk();renderView('users');}}); });
  
  // Search Comments
  DB.data.comments.forEach(c=>{ if(q && c.text.toLowerCase().includes(q)) {
    const parentTask = DB.data.tasks.find(t=>t.id===c.taskId);
    if(parentTask && !parentTask.deleted) results.push({tag:'Comment', label:c.text.substring(0,40)+'...', sub:`In: ${parentTask.title}`, action:()=>{closeCmdk();renderView('tasks');openTaskDetail(c.taskId);}});
  }});
  
  // Search Drive Links
  DB.data.tasks.filter(t=>!t.deleted).forEach(t=>{
    t.links.forEach(l=>{ if(q && l.name.toLowerCase().includes(q)) results.push({tag:'File Link', label:l.name, sub:`In: ${t.title}`, action:()=>{closeCmdk();renderView('tasks');openTaskDetail(t.id);}}); });
  });
  
  const wrap = document.getElementById('cmdk-results');
  wrap.innerHTML = results.slice(0,12).map((r,i)=>`
    <div class="p-3 border-b border-gray-100 hover:bg-gray-100 cursor-pointer flex justify-between items-center transition" onclick="window.__cmdkAction(${i})">
      <div>
        <div class="text-[13px] font-bold text-gray-800 leading-tight">${hl(r.label, q)}</div>
        <div class="text-[10px] font-bold text-gray-400 mt-1 uppercase tracking-wider">${r.sub}</div>
      </div>
      <div class="text-[9px] font-bold text-teal-700 bg-teal-50 px-2 py-0.5 rounded border border-teal-100 uppercase tracking-widest">${r.tag}</div>
    </div>
  `).join('') || `<div class="p-6 text-center text-xs text-gray-400 font-bold uppercase tracking-widest">No matching records found.</div>`;
  
  window.__cmdkResults = results;
  window.__cmdkAction = (i)=>{ window.__cmdkResults[i].action(); };
}

/* =========================================================
   NOTIFICATIONS UTILS
========================================================= */
function toggleNotif(){ document.getElementById('notif-panel').classList.toggle('hidden'); }
function markAllRead() {
  DB.data.notifications.forEach(n=>n.read=true);
  DB.save(); document.getElementById('notif-panel').classList.add('hidden');
  refreshNotifDot(); toast('Notifications cleared');
}
function renderNotifList() {
  const filterVal = document.getElementById('notif-filter') ? document.getElementById('notif-filter').value : 'all';
  const unread = DB.data.notifications.filter(n=>!n.read && (n.forRole==='all' || n.forRole===SESSION.role || SESSION.role==='Admin'));
  document.getElementById('notif-dot').style.display = unread.length ? 'block' : 'none';
  
  let list = DB.data.notifications.filter(n=>(n.forRole==='all' || n.forRole===SESSION.role || SESSION.role==='Admin'));
  if(filterVal !== 'all') list = list.filter(n=>n.type===filterVal);
  
  const wrap = document.getElementById('notif-list');
  wrap.innerHTML = list.slice(0,20).map(n=>`
    <div class="p-3 text-[13px] flex gap-3 ${n.read?'opacity-50':'bg-teal-50'}">
      <div class="text-base">${n.icon||'🔔'}</div>
      <div>
        <div class="text-gray-800 font-bold leading-tight">${escapeHtml(n.text)}</div>
        <div class="text-[9px] text-gray-400 mt-1 font-mono uppercase">${timeAgo(n.ts)}</div>
      </div>
    </div>
  `).join('') || `<div class="p-6 text-center text-[10px] text-gray-400 font-bold uppercase tracking-widest">Inbox is zero.</div>`;
}
function refreshNotifDot() { renderNotifList(); }

function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.remove('show'), 2600);
}

/* =========================================================
   INIT
========================================================= */
(function init(){
  DB.load();
  const select = document.getElementById('login-user');
  select.innerHTML = DB.data.users.map(u=>`<option value="${u.id}">${u.name} (${u.role})</option>`).join('');
  
  const raw = localStorage.getItem('contentos_session');
  if(raw){ SESSION = JSON.parse(raw); boot(); }
})();
</script>
