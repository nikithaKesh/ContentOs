<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentOS Phase 2</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14171c; --ink-soft:#3c4249; --paper:#f1f3f0; --surface:#ffffff; --line:#dfe2dc;
    --accent:#2f6f5e; --accent-dark:#204f42; --accent-soft:#e2ede8;
    --amber:#e2a542; --amber-soft:#faecd6; --coral:#d1503f; --coral-soft:#f7e2de;
    --blue:#3d6fa8; --blue-soft:#e1ebf4; --radius:10px;
    --shadow: 0 1px 2px rgba(20,23,28,.04), 0 6px 20px -8px rgba(20,23,28,.12);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);overflow:hidden;}
  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#d4d7d0;border-radius:8px;}
  a{text-decoration:none;color:inherit;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}

  /* ---------- APP SHELL & MOBILE ---------- */
  #login-screen{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:100;}
  .login-card{background:var(--surface);width:380px;max-width:90vw;border-radius:16px;padding:36px 32px;}
  
  #app{display:none;height:100vh;}
  .shell{display:flex;height:100vh;position:relative;}
  
  .dock{width:220px;background:var(--ink);color:#dfe3e0;display:flex;flex-direction:column;padding:18px 12px;flex-shrink:0;transition:transform 0.3s ease;z-index:50;}
  .main-col{flex:1;display:flex;flex-direction:column;min-width:0;position:relative;background:var(--paper);}
  
  .dock-logo{display:flex;align-items:center;gap:9px;padding:6px 10px 22px;}
  .dock-logo .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px rgba(47,111,94,.35);}
  .dock-logo span{font-family:'Space Grotesk';font-weight:700;font-size:18px;color:#fff;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;font-size:13.5px;font-weight:500;color:#b7bdb9;margin-bottom:2px;cursor:pointer;}
  .nav-item:hover{background:#1e2229;color:#fff;}
  .nav-item.active{background:var(--accent);color:#fff;}
  .nav-item svg{width:16px;height:16px;flex-shrink:0;}
  .dock-foot{margin-top:auto;padding:10px;border-top:1px solid #262b31;}
  
  .topbar{height:60px;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 20px;gap:14px;background:var(--surface);flex-shrink:0;}
  .menu-btn{display:none;background:none;border:none;color:var(--ink);cursor:pointer;}
  
  .view{flex:1;overflow-y:auto;padding:24px 28px;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:22px;}
  .kpi{padding:16px 18px;}
  .kpi .num{font-family:'Space Grotesk';font-size:26px;font-weight:700;}
  
  table{width:100%;border-collapse:collapse;font-size:13px;text-align:left;}
  th{font-size:11px;text-transform:uppercase;color:var(--ink-soft);padding:10px 14px;border-bottom:1px solid var(--line);background:#f9f9f7;}
  td{padding:11px 14px;border-bottom:1px solid #ececE7;}
  
  .modal-overlay{position:fixed;inset:0;background:rgba(20,23,28,.5);display:none;align-items:flex-start;justify-content:center;z-index:90;padding:6vh 20px;overflow-y:auto;}
  .modal-overlay.open{display:flex;}
  .modal{background:#fff;border-radius:14px;width:750px;max-width:100%;box-shadow:0 30px 80px rgba(0,0,0,.35);}
  
  .toast{position:fixed;bottom:22px;right:22px;background:var(--ink);color:#fff;padding:11px 18px;border-radius:9px;font-size:13px;z-index:200;display:none;transition: opacity 0.3s;}
  .toast.show{display:flex;}
  
  /* Timeline & Comments */
  .timeline{border-left:2px solid var(--line);margin-left:10px;padding-left:16px;position:relative;}
  .tl-item{position:relative;margin-bottom:16px;font-size:12px;}
  .tl-item::before{content:'';position:absolute;left:-21px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--surface);border:2px solid var(--accent);}
  .comment-box{background:#f9f9f7;border-radius:8px;padding:12px;margin-bottom:10px;font-size:13px;border:1px solid var(--line);}
  
  /* Mobile Queries */
  @media(max-width:980px){
    .shell{flex-direction:column;}
    .dock{position:absolute;left:-220px;height:100%;box-shadow:2px 0 10px rgba(0,0,0,0.2);}
    .dock.open{transform:translateX(220px);}
    .menu-btn{display:block;}
    .grid-2, .grid-3{grid-template-columns:1fr !important;}
    .view{padding:16px;}
    .table-wrap{display:block;overflow-x:auto;}
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card shadow-2xl">
    <div style="font-family:'Space Grotesk';font-size:24px;font-weight:700;margin-bottom:6px;color:var(--ink);">ContentOS <span class="text-xs text-teal-600 align-top">v2</span></div>
    <div class="text-xs text-gray-500 mb-6 uppercase tracking-widest font-semibold">Workspace Authentication</div>
    <select id="login-user" class="w-full p-2 mb-4 rounded border border-gray-300 text-sm bg-gray-50 focus:outline-none focus:border-teal-500">
      </select>
    <button class="w-full bg-teal-600 hover:bg-teal-700 text-white p-3 rounded-lg text-sm font-bold transition shadow-sm" onclick="doLogin()">Enter Workspace</button>
  </div>
</div>

<div id="app">
<div class="shell">
  
  <div class="dock" id="sidebar">
    <div class="dock-logo"><span class="dot"></span><span>ContentOS</span></div>
    <div id="nav-list" class="flex-1 overflow-y-auto mt-2"></div>
    <div class="dock-foot text-sm">
      <div id="user-name-tag" class="font-bold text-white mb-1 truncate"></div>
      <div id="user-role-tag" class="text-xs text-gray-400 mb-2 truncate"></div>
      <a class="text-xs text-gray-500 hover:text-white cursor-pointer inline-block mt-2 border-t border-gray-700 pt-2 w-full" onclick="doLogout()">Sign out</a>
    </div>
  </div>

  <div class="main-col">
    <div class="topbar">
      <button class="menu-btn mr-2" onclick="toggleSidebar()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <div class="flex-1 relative max-w-lg">
        <svg class="absolute left-3 top-2 w-4 h-4 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="global-search" class="w-full bg-gray-100 border border-gray-200 rounded-lg py-1.5 pl-9 pr-3 text-sm focus:outline-none focus:border-teal-500 focus:bg-white transition" placeholder="Search tasks, products, users... (/)" onfocus="openCmdk()" readonly>
      </div>
      <div class="ml-auto flex items-center gap-4">
        <button class="relative text-gray-500 hover:text-teal-600 transition" onclick="toggleNotif()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 01-3.4 0"/></svg>
          <span id="notif-dot" class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full hidden"></span>
        </button>
      </div>
    </div>
    
    <div class="view" id="view"></div>
  </div>
</div>
</div>

<div id="notif-panel" class="absolute top-14 right-4 w-80 bg-white border border-gray-200 rounded-lg shadow-xl hidden z-[80] flex-col max-h-[80vh]">
  <div class="p-3 border-b flex justify-between items-center bg-gray-50 rounded-t-lg">
    <span class="font-bold text-sm text-gray-800">Notifications</span>
    <button class="text-xs text-teal-600 font-semibold hover:underline" onclick="markAllRead()">Mark all read</button>
  </div>
  <div id="notif-list" class="overflow-y-auto flex-1 p-2 space-y-1"></div>
</div>

<div id="cmdk" class="fixed inset-0 bg-black/60 z-[100] hidden flex-col items-center pt-[12vh]" onclick="if(event.target===this)closeCmdk()">
  <div class="bg-white w-[600px] max-w-[90vw] rounded-xl shadow-2xl overflow-hidden flex flex-col transform transition-all">
    <input id="cmdk-input" class="w-full p-4 text-base border-b outline-none font-medium" placeholder="Search everything..." oninput="renderCmdkResults(this.value)">
    <div id="cmdk-results" class="max-h-[50vh] overflow-y-auto bg-gray-50"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal flex flex-col max-h-[90vh]" id="modal-box"></div>
</div>

<div class="toast flex items-center gap-2" id="toast"></div>

<script>
/* =========================================================
   CORE ARCHITECTURE & DATA LAYER (PHASE 2)
========================================================= */

// Advanced Permission Matrix
const ROLES_MATRIX = {
  'Admin': { 
    dashboard:{view:true}, 
    tasks:{view:true, create:true, edit:true, del:true, assign:true, comment:true, complete:true}, 
    products:{view:true, create:true, edit:true, del:true}, 
    brands:{view:true, edit:true}, 
    reports:{view:true, export:true}, 
    analytics:{view:true}, 
    settings:{view:true, edit:true}, 
    users:{view:true, create:true, edit:true, del:true}, 
    audit:{view:true}, 
    trash:{view:true, restore:true, del:true} 
  },
  'General Manager': { 
    dashboard:{view:true}, 
    tasks:{view:true, create:true, edit:true, del:false, assign:true, comment:true, complete:true}, 
    products:{view:true, create:true, edit:true, del:false}, 
    brands:{view:true, edit:true}, 
    reports:{view:true, export:true}, 
    analytics:{view:true}, 
    settings:{view:false, edit:false}, 
    users:{view:true, create:false, edit:false, del:false}, 
    audit:{view:true}, 
    trash:{view:false, restore:false, del:false} 
  },
  'Content Creator': { 
    dashboard:{view:true}, 
    tasks:{view:true, create:false, edit:false, del:false, assign:false, comment:true, complete:true}, 
    products:{view:true, create:false, edit:false, del:false}, 
    brands:{view:true, edit:false}, 
    reports:{view:false, export:false}, 
    analytics:{view:true}, 
    settings:{view:false, edit:false}, 
    users:{view:false, create:false, edit:false, del:false}, 
    audit:{view:false}, 
    trash:{view:false, restore:false, del:false} 
  },
  'Viewer': { 
    dashboard:{view:true}, 
    tasks:{view:true, create:false, edit:false, del:false, assign:false, comment:false, complete:false}, 
    products:{view:true, create:false, edit:false, del:false}, 
    brands:{view:true, edit:false}, 
    reports:{view:true, export:false}, 
    analytics:{view:true}, 
    settings:{view:false, edit:false}, 
    users:{view:false, create:false, edit:false, del:false}, 
    audit:{view:false}, 
    trash:{view:false, restore:false, del:false} 
  }
};

const DEFAULT_SETTINGS = {
  postTypes: ['Story','Post','Status','Video','Animation','Other'],
  taskStatuses: ['Pending','In Progress','In Review','Done'],
  productStatuses: ['New Product','Active','Out of Stock','Discontinued'],
  productCategories: ['Serum', 'Cream', 'Body Care', 'Hair Care', 'Supplement', 'Other'],
  googleDrive: { rootFolderId: '', autoCreateFolders: false },
  googleSheets: { sheetId: '', syncTasks: false, syncProducts: false }
};

const DB = {
  key: 'contentos_db_v2',
  data: null,
  load() {
    const raw = localStorage.getItem(this.key);
    if(raw) {
      this.data = JSON.parse(raw);
      this.migrate(); // Handles v1 -> v2 upgrade seamlessly
    } else {
      this.data = this.seed();
      this.save();
    }
  },
  migrate() {
    if(!this.data.brands) this.data.brands = [{id:'exact',name:'Exact Extract',color:'#2f6f5e'}, {id:'biseka',name:'Biseka',color:'#3d6fa8'}];
    if(!this.data.settings) this.data.settings = JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
    if(!this.data.comments) this.data.comments = [];
    if(!this.data.history) this.data.history = [];
    if(!this.data.audit) this.data.audit = [];
    if(!this.data.trash) this.data.trash = [];
    
    // Convert V1 Task driveLink strings to V2 links array
    this.data.tasks.forEach(t => {
      if(t.driveLink !== undefined) {
        t.links = t.driveLink ? [{id:uid('lnk'), name:'Main File', url:t.driveLink}] : [];
        delete t.driveLink;
      }
      if(t.deleted === undefined) t.deleted = false;
    });
    
    // Ensure all products have deleted flag
    this.data.products.forEach(p => { if(p.deleted===undefined) p.deleted = false; });
    
    this.save();
  },
  save() { localStorage.setItem(this.key, JSON.stringify(this.data)); },
  seed() {
    // Generate initial demo data
    const users = [
      {id:'u1', name:'Sanduni Fernando', role:'Admin', email:'sanduni@agency.lk'},
      {id:'u2', name:'Ruwan Jayasinghe', role:'General Manager', email:'ruwan@agency.lk'},
      {id:'u3', name:'Nadeesha Perera', role:'Content Creator', email:'nadeesha@agency.lk'},
      {id:'u4', name:'Ishara Madushani', role:'Viewer', email:'ishara@agency.lk'}
    ];
    const brands = [
      {id:'exact', name:'Exact Extract', color:'#2f6f5e'},
      {id:'biseka', name:'Biseka', color:'#3d6fa8'},
      {id:'lovelab', name:'Love&Lab', color:'#d1503f'},
      {id:'ola', name:'OLA Tangalle', color:'#e2a542'}
    ];
    const products = [
      {id:'p1', name:'Vitamin C Face Serum', brand:'exact', sku:'EXA-VC-030', category:'Serum', status:'Active', ts:Date.now()-864000000, deleted:false},
      {id:'p2', name:'Turmeric Night Cream', brand:'biseka', sku:'BSK-TN-050', category:'Cream', status:'Active', ts:Date.now()-400000000, deleted:false}
    ];
    const tasks = [
      {id:'t1', brand:'exact', title:'Instagram Reel Launch', type:'Video', product:'p1', assignee:'u3', addedBy:'u2', date:todayISO(), status:'Pending', links:[], deleted:false, ts:Date.now()-80000},
      {id:'t2', brand:'biseka', title:'Story Set - Turmeric', type:'Story', product:'p2', assignee:'u3', addedBy:'u2', date:todayISO(), status:'In Progress', links:[{id:uid('lnk'), name:'Canva Link', url:'https://canva.com'}], deleted:false, ts:Date.now()-3000000}
    ];
    return { users, brands, products, tasks, logs:[], notifications:[], comments:[], history:[], audit:[], trash:[], settings:JSON.parse(JSON.stringify(DEFAULT_SETTINGS)) };
  }
};

/* --- Helpers --- */
function uid(prefix){ return prefix+'_'+Math.random().toString(36).slice(2,9); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmtDate(iso){ if(!iso) return '—'; const d=new Date(iso+'T00:00:00'); return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function timeAgo(ts){ const s=Math.floor((Date.now()-ts)/1000); if(s<60) return 'Just now'; const m=Math.floor(s/60); if(m<60) return m+'m ago'; const h=Math.floor(m/60); if(h<24) return h+'h ago'; return Math.floor(h/24)+'d ago'; }
function escapeHtml(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function brandOf(id){ return DB.data.brands.find(b=>b.id===id) || {name:'Unknown', color:'#999'}; }
function getUserName(id){ const u=DB.data.users.find(x=>x.id===id); return u ? u.name : 'System'; }

let SESSION = null;
let currentView = 'dashboard';

/* =========================================================
   SYSTEM LOGGING & EVENT HANDLING
========================================================= */
function logAudit(module, action, oldVal, newVal) {
  DB.data.audit.unshift({ id: uid('aud'), user: SESSION.id, module, action, oldVal: JSON.stringify(oldVal), newVal: JSON.stringify(newVal), ts: Date.now() });
}

function logTaskHistory(taskId, action) {
  DB.data.history.unshift({ id: uid('hst'), taskId, user: SESSION.id, action, ts: Date.now() });
}

function addNotif(text, type='System', roleFilter='all') {
  const icon = type==='Comment' ? '💬' : type==='Warning' ? '⚠️' : type==='Task' ? '📋' : '🔔';
  DB.data.notifications.unshift({ id: uid('ntf'), text, type, icon, ts: Date.now(), read: false, forRole: roleFilter });
  refreshNotifDot();
}

function softDelete(module, id, itemObj) {
  itemObj.deleted = true;
  DB.data.trash.unshift({ id: uid('trsh'), module, itemId: id, itemData: JSON.stringify(itemObj), deletedBy: SESSION.id, ts: Date.now() });
  logAudit(module, 'Deleted (Moved to Trash)', itemObj.name || itemObj.title, null);
  DB.save();
}

/* =========================================================
   AUTHENTICATION
========================================================= */
function doLogin(){
  const userId = document.getElementById('login-user').value;
  const user = DB.data.users.find(u=>u.id===userId);
  SESSION = { id: user.id, name: user.name, role: user.role };
  localStorage.setItem('contentos_session', JSON.stringify(SESSION));
  boot();
}
function doLogout(){ localStorage.removeItem('contentos_session'); location.reload(); }
function perms(){ return ROLES_MATRIX[SESSION.role] || ROLES_MATRIX['Viewer']; }

function boot(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('user-name-tag').textContent = SESSION.name;
  document.getElementById('user-role-tag').textContent = SESSION.role;
  buildNav();
  renderView('dashboard');
  refreshNotifDot();
}

/* =========================================================
   NAVIGATION & UI ROUTING
========================================================= */
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
function buildNav(){
  const p = perms();
  const menu = [
    {id:'dashboard', label:'Dashboard', icon:'M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z', show:p.dashboard.view},
    {id:'tasks', label:'Tasks & Workflow', icon:'M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11', show:p.tasks.view},
    {id:'products', label:'Products Hub', icon:'M20.5 7.3L12 12l-8.5-4.7M12 12v9M20.5 7.3L12 3 3.5 7.3 12 12l8.5-4.7z', show:p.products.view},
    {id:'analytics', label:'Analytics', icon:'M4 19h16M7 15v4M12 9v10M17 5v14', show:p.analytics.view},
    {id:'reports', label:'Reports', icon:'M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z', show:p.reports.view},
    {id:'audit', label:'Audit Log', icon:'M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z', show:p.audit.view},
    {id:'trash', label:'Trash', icon:'M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16', show:p.trash.view},
    {id:'settings', label:'Settings', icon:'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z', show:p.settings.view},
  ];
  document.getElementById('nav-list').innerHTML = menu.filter(m=>m.show).map(m=>`
    <a class="nav-item ${currentView===m.id?'active':''}" onclick="renderView('${m.id}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="${m.icon}"/></svg>
      <span>${m.label}</span>
    </a>`).join('');
}
function renderView(id) {
  currentView = id;
  buildNav();
  if(window.innerWidth <= 980) document.getElementById('sidebar').classList.remove('open');
  const renders = {dashboard:renderDash, tasks:renderTasks, products:renderProducts, analytics:renderAnalytics, settings:renderSettings, reports:renderReports, audit:renderAudit, trash:renderTrash};
  if(renders[id]) renders[id](document.getElementById('view'));
}

/* =========================================================
   VIEWS
========================================================= */

/* --- 1. DASHBOARD --- */
function renderDash(el) {
  const activeTasks = DB.data.tasks.filter(t=>!t.deleted && t.status!=='Done');
  const feed = DB.data.history.slice(0, 8); // Req 8: Recent Activity Feed
  
  el.innerHTML = `
    <h1 class="text-2xl font-bold mb-6">Dashboard Overview</h1>
    <div class="grid-2 mb-6">
      <div class="card p-5 border-t-4 border-teal-600">
        <h3 class="font-bold text-xs mb-4 text-gray-500 uppercase tracking-wide">Active Workspace Tasks</h3>
        <div class="text-4xl font-bold font-mono text-gray-800">${activeTasks.length}</div>
        <button class="mt-4 text-sm text-teal-600 font-semibold hover:underline" onclick="renderView('tasks')">View Task Board →</button>
      </div>
      <div class="card p-5">
        <h3 class="font-bold text-xs mb-4 text-gray-500 uppercase tracking-wide">Live Activity Feed</h3>
        <div class="space-y-3">
          ${feed.length ? feed.map(h=>`
            <div class="text-sm flex gap-3 items-start">

function saveNewTask() {
  const title = document.getElementById('nt-title').value.trim();
  const brand = document.getElementById('nt-brand').value;
  const product = document.getElementById('nt-product').value;
  const type = document.getElementById('nt-type').value;
  const assignee = document.getElementById('nt-assignee').value;
  
  if(!title) return toast('Task title is required');

  // Req 7: Duplicate Content Warning
  if(product) {
    const dups = DB.data.tasks.filter(t=>!t.deleted && t.product===product && t.type===type);
    if(dups.length > 0) {
      if(!confirm(`Duplicate Warning: This product already has ${dups.length} active ${type} task(s). Do you want to continue creating another one?`)) return;
      addNotif(`Duplicate ${type} task created for product`, 'Warning');
    }
  }

  const t = { id: uid('tsk'), title, brand, product, type, assignee, status: 'Pending', date: todayISO(), links: [], deleted: false, addedBy: SESSION.id, ts: Date.now() };
  DB.data.tasks.unshift(t);
  
  logTaskHistory(t.id, 'Task created & assigned');
  logAudit('Tasks', 'Create', null, t.title);
  addNotif(`New task assigned: ${title}`, 'Task', assignee); // Notify specific user
  
  DB.save();
  closeModal();
  renderTasks(document.getElementById('view'));
  toast('Task successfully created');
}

/* Modifying Task actions */
function updateTaskStatus(id, newStatus) {
  const t = DB.data.tasks.find(x=>x.id===id);
  const old = t.status;
  t.status = newStatus;
  logTaskHistory(id, `Changed status to "${newStatus}"`);
  logAudit('Tasks', 'Update Status', old, newStatus);
  if(newStatus === 'Done') addNotif(`Task completed: ${t.title}`, 'Task');
  DB.save();
  toast('Status updated successfully');
  renderTasks(document.getElementById('view'));
}

function addLinkPrompt(id) {
  const name = prompt("Enter attachment name (e.g. Final PSD, Caption Doc):");
  if(!name) return;
  const url = prompt("Paste Google Drive URL:");
  if(!url) return;
  const t = DB.data.tasks.find(x=>x.id===id);
  t.links.push({id:uid('lnk'), name, url});
  logTaskHistory(id, `Added drive attachment: ${name}`);
  logAudit('Tasks', 'Add Link', null, name);
  DB.save();
  openTaskDetail(id);
}
function removeLink(tid, lid) {
  if(!confirm("Remove this attachment?")) return;
  const t = DB.data.tasks.find(x=>x.id===tid);
  t.links = t.links.filter(l=>l.id!==lid);
  logTaskHistory(tid, `Removed an attachment`);
  DB.save();
  openTaskDetail(tid);
}

function addComment(id) {
  const text = document.getElementById('td-comment').value.trim();
  if(!text) return;
  const c = { id:uid('cmt'), taskId:id, userId:SESSION.id, text, ts:Date.now() };
  DB.data.comments.push(c);
  logTaskHistory(id, 'Added a comment');
  
  // Notification triggering
  const t = DB.data.tasks.find(x=>x.id===id);
  addNotif(`${SESSION.name} commented on "${t.title}": ${text.substring(0,20)}...`, 'Comment');
  
  DB.save();
  openTaskDetail(id);
}

function deleteComment(tid, cid) {
  if(!confirm('Delete your comment permanently?')) return;
  DB.data.comments = DB.data.comments.filter(c=>c.id!==cid);
  logTaskHistory(tid, 'Deleted a comment');
  DB.save();
  openTaskDetail(tid);
}

function deleteTask(id) {
  if(!confirm("Move task to trash?")) return;
  const t = DB.data.tasks.find(x=>x.id===id);
  softDelete('Tasks', id, t);
  closeModal();
  renderTasks(document.getElementById('view'));
  toast('Task moved to trash');
}

  el.innerHTML = `

}

function renderTrash(el) {
  const p = perms().trash;
  if(!p.view) return;
  el.innerHTML = `

      <h1 class="text-2xl font-bold">Trash & Recovery</h1>

    </div>
    <div class="card bg-white shadow-sm overflow-hidden table-wrap">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 border-b text-gray-500"><tr><th class="p-3">Deleted Date</th><th class="p-3">Type</th><th class="p-3">Deleted By</th><th class="p-3 text-right">Actions</th></tr></thead>
        <tbody>
          ${DB.data.trash.map(tr=>`
            <tr class="border-b hover:bg-gray-50">
              <td class="p-3 font-mono text-[11px] text-gray-500">${new Date(tr.ts).toLocaleString()}</td>
              <td class="p-3 font-semibold text-gray-700">${tr.module}</td>
              <td class="p-3 text-gray-600">${getUserName(tr.deletedBy)}</td>
              <td class="p-3 text-right">
                ${p.restore ? `<button class="text-teal-600 text-xs font-bold mr-3 hover:underline" onclick="restoreItem('${tr.id}')">Restore</button>` : ''}
                ${p.del ? `<button class="text-red-500 text-xs font-bold hover:underline" onclick="permanentDelete('${tr.id}')">Delete</button>` : ''}
              </td>
            </tr>
          `).join('')}
          ${DB.data.trash.length===0?'<tr><td colspan="4" class="p-8 text-center text-gray-400 border-dashed">Trash is empty.</td></tr>':''}
        </tbody>
      </table>
    </div>
  `;
}
function restoreItem(id) {
  const tr = DB.data.trash.find(x=>x.id===id);
  if(tr.module === 'Tasks') DB.data.tasks.find(x=>x.id===tr.itemId).deleted = false;
  if(tr.module === 'Products') DB.data.products.find(x=>x.id===tr.itemId).deleted = false;
  DB.data.trash = DB.data.trash.filter(x=>x.id!==id);
  logAudit(tr.module, 'Restored from trash', null, tr.itemId);
  DB.save(); renderTrash(document.getElementById('view')); toast('Item restored');
}
function permanentDelete(id) {
  if(!confirm("Permanently delete? Cannot be undone.")) return;
  DB.data.trash = DB.data.trash.filter(x=>x.id!==id);
  DB.save(); renderTrash(document.getElementById('view')); toast('Permanently deleted');
}
function emptyTrash() {
  if(!confirm("Empty all trash?")) return;
  DB.data.trash = []; DB.save(); renderTrash(document.getElementById('view')); toast('Trash emptied');
}

/* =========================================================
   COMMAND PALETTE (CMDK) - Req 9 Global Search
========================================================= */
function openCmdk(){
  document.getElementById('cmdk').classList.remove('hidden');
  document.getElementById('cmdk').classList.add('flex');
  setTimeout(()=>document.getElementById('cmdk-input').focus(),30);
  renderCmdkResults('');
}
function closeCmdk(){ 
  document.getElementById('cmdk').classList.add('hidden'); 
  document.getElementById('cmdk').classList.remove('flex');
}
document.addEventListener('keydown', e=>{
  if(e.key==='/' && document.activeElement.tagName!=='INPUT' && document.activeElement.tagName!=='TEXTAREA'){ e.preventDefault(); if(SESSION) openCmdk(); }
  if(e.key==='Escape') { closeCmdk(); closeModal(); }
});
function renderCmdkResults(q){
  q = q.toLowerCase().trim();
  const results = [];
  
  // Categorized searching
  DB.data.tasks.filter(t=>!t.deleted).forEach(t=>{ if(!q || t.title.toLowerCase().includes(q)) results.push({tag:'Task', label:t.title, sub:t.type, action:()=>{closeCmdk();renderView('tasks');openTaskDetail(t.id);}}); });
  DB.data.products.filter(p=>!p.deleted).forEach(p=>{ if(!q || p.name.toLowerCase().includes(q)) results.push({tag:'Product', label:p.name, sub:p.category, action:()=>{closeCmdk();renderView('products');openProductDetail(p.id);}}); });
  DB.data.brands.forEach(b=>{ if(!q || b.name.toLowerCase().includes(q)) results.push({tag:'Brand', label:b.name, sub:'Dashboard View', action:()=>{closeCmdk();renderView('dashboard');}}); });
  
  const wrap = document.getElementById('cmdk-results');
  wrap.innerHTML = results.slice(0,10).map((r,i)=>`
    <div class="p-3 border-b hover:bg-gray-100 cursor-pointer flex justify-between items-center transition" onclick="window.__cmdkAction(${i})">
      <div>
        <div class="text-sm font-bold text-gray-800">${escapeHtml(r.label)}</div>
        <div class="text-[11px] text-gray-500 mt-0.5">${r.sub}</div>
      </div>
      <div class="text-[10px] font-bold text-teal-600 bg-teal-50 px-2 py-1 rounded border border-teal-100 uppercase tracking-wide">${r.tag}</div>
    </div>
  `).join('') || `<div class="p-6 text-center text-sm text-gray-400">No matching records found.</div>`;
  
  window.__cmdkResults = results;
  window.__cmdkAction = (i)=>{ window.__cmdkResults[i].action(); };
}

/* =========================================================
   NOTIFICATIONS UTILS
========================================================= */
function toggleNotif(){ document.getElementById('notif-panel').classList.toggle('hidden'); }
function markAllRead() {
  DB.data.notifications.forEach(n=>n.read=true);
  DB.save(); document.getElementById('notif-panel').classList.add('hidden');
  refreshNotifDot(); toast('Notifications marked read');
}
function refreshNotifDot() {
  const unread = DB.data.notifications.filter(n=>!n.read && (n.forRole==='all' || n.forRole===SESSION.role || SESSION.role==='Admin'));
  document.getElementById('notif-dot').style.display = unread.length ? 'block' : 'none';
  
  const wrap = document.getElementById('notif-list');
  wrap.innerHTML = DB.data.notifications.filter(n=>(n.forRole==='all' || n.forRole===SESSION.role || SESSION.role==='Admin')).slice(0,15).map(n=>`
    <div class="p-2 border-b text-sm flex gap-2 ${n.read?'opacity-60':'bg-teal-50'}">
      <div class="text-base">${n.icon||'🔔'}</div>
      <div>
        <div class="text-gray-800">${escapeHtml(n.text)}</div>
        <div class="text-[10px] text-gray-400 mt-1">${timeAgo(n.ts)}</div>
      </div>
    </div>
  `).join('') || `<div class="p-4 text-center text-xs text-gray-400">Inbox is zero.</div>`;
}

function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.remove('show'), 2600);
}

/* =========================================================
   INIT
========================================================= */
(function init(){
  DB.load();
  const select = document.getElementById('login-user');
  select.innerHTML = DB.data.users.map(u=>`<option value="${u.id}">${u.name} (${u.role})</option>`).join('');
  
  const raw = localStorage.getItem('contentos_session');
  if(raw){ SESSION = JSON.parse(raw); boot(); }
})();
</script>
