<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentOS</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
  :root{
    --ink:#14171c; --ink-soft:#3c4249; --paper:#f1f3f0; --surface:#ffffff; --line:#dfe2dc;
    --accent:#2f6f5e; --accent-dark:#204f42; --accent-soft:#e2ede8;
    --amber:#e2a542; --amber-soft:#faecd6; --coral:#d1503f; --coral-soft:#f7e2de;
    --blue:#3d6fa8; --blue-soft:#e1ebf4; --radius:10px;
    --shadow: 0 1px 2px rgba(20,23,28,.04), 0 6px 20px -8px rgba(20,23,28,.12);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);}
  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#d4d7d0;border-radius:8px;}
  a{text-decoration:none;color:inherit;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}

  /* ---------- LOGIN ---------- */
  #login-screen{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:100;}
  .login-card{background:var(--surface);width:380px;max-width:90vw;border-radius:16px;padding:36px 32px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
  .login-logo{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .login-logo .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px var(--accent-soft);}
  .login-logo span{font-family:'Space Grotesk';font-weight:700;font-size:22px;letter-spacing:-.02em;}
  .login-sub{color:var(--ink-soft);font-size:13px;margin-bottom:24px;}
  .field-label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);font-weight:600;margin-bottom:6px;display:block;}
  .field{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;margin-bottom:16px;background:#fbfbfa;}
  .field:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent);}
  .btn{border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:.15s;}
  .btn-primary{background:var(--accent);color:#fff;justify-content:center;}
  .btn-primary:hover{background:var(--accent-dark);}
  .btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line);}
  .btn-ghost:hover{background:#f1f1ee;}
  .btn-danger{background:var(--coral-soft);color:var(--coral);}
  .btn-sm{padding:6px 10px;font-size:12px;border-radius:7px;}

  /* ---------- APP SHELL ---------- */
  #app{display:none;height:100vh;}
  .shell{display:grid;grid-template-columns:220px 1fr;height:100vh;}
  .dock{background:var(--ink);color:#dfe3e0;display:flex;flex-direction:column;padding:18px 12px;transition:transform 0.3s;}
  .dock-logo{display:flex;align-items:center;gap:9px;padding:6px 10px 22px;}
  .dock-logo .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px rgba(47,111,94,.35);}
  .dock-logo span{font-family:'Space Grotesk';font-weight:700;font-size:18px;color:#fff;letter-spacing:-.02em;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;font-size:13.5px;font-weight:500;color:#b7bdb9;margin-bottom:2px;}
  .nav-item:hover{background:#1e2229;color:#fff;}
  .nav-item.active{background:var(--accent);color:#fff;}
  .nav-item svg{width:16px;height:16px;flex-shrink:0;}
  .dock-foot{margin-top:auto;padding:10px;border-top:1px solid #262b31;}
  .dock-user{display:flex;align-items:center;gap:8px;font-size:12.5px;}
  .avatar{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
  .dock-user .role-tag{color:#8a908b;font-size:10.5px;}
  .logout-link{font-size:11px;color:#8a908b;margin-top:8px;display:inline-block;}
  .logout-link:hover{color:#fff;}

  .main-col{display:flex;flex-direction:column;min-width:0;position:relative;}
  .topbar{height:60px;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 20px;gap:14px;background:var(--surface);flex-shrink:0;}
  .search-wrap{flex:1;max-width:480px;position:relative;}
  .search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:#9a9d97;}
  #global-search{width:100%;padding:8px 12px 8px 32px;border-radius:8px;border:1px solid var(--line);background:var(--paper);font-size:13px;}
  #global-search:focus{outline:none;border-color:var(--accent);background:#fff;}
  .kbd{font-size:10px;border:1px solid var(--line);border-radius:4px;padding:1px 5px;color:#9a9d97;position:absolute;right:9px;top:50%;transform:translateY(-50%);background:#fff;}
  .topbar-right{display:flex;align-items:center;gap:14px;margin-left:auto;}
  .icon-btn{position:relative;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:transparent;border:1px solid transparent;color:var(--ink-soft);}
  .icon-btn:hover{background:var(--paper);border-color:var(--line);}
  .icon-btn svg{width:17px;height:17px;}
  .badge-dot{position:absolute;top:5px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--coral);border:2px solid #fff;}
  .date-chip{font-size:12px;color:var(--ink-soft);font-family:'IBM Plex Mono';}
  .menu-btn{display:none;background:none;border:none;font-size:18px;color:var(--ink-soft);cursor:pointer;}

  .view{flex:1;overflow-y:auto;padding:24px 28px;}
  .view-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
  .view-title{font-size:22px;font-weight:700;letter-spacing:-.01em;}
  .view-desc{color:var(--ink-soft);font-size:13px;margin-top:2px;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:22px;}
  .kpi{padding:16px 18px;}
  .kpi .label{font-size:11.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;font-weight:600;}
  .kpi .num{font-family:'Space Grotesk';font-size:26px;font-weight:700;margin-top:4px;}
  .kpi .sub{font-size:11.5px;color:#8a8f8a;margin-top:2px;}

  .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
  .brand-chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;}
  .brand-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

  .status-pending{background:var(--amber-soft);color:#8a5a12;}
  .status-progress{background:var(--blue-soft);color:#264a72;}
  .status-review{background:#efe4f6;color:#5b3a80;}
  .status-done{background:var(--accent-soft);color:var(--accent-dark);}

  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
  .select,.tfield{padding:7px 10px;border:1px solid var(--line);border-radius:7px;font-size:12.5px;background:#fff;color:var(--ink);}
  .select:focus,.tfield:focus{outline:2px solid var(--accent-soft);border-color:var(--accent);}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);padding:10px 14px;border-bottom:1px solid var(--line);font-weight:600;background:#f9f9f7;}
  td{padding:11px 14px;border-bottom:1px solid #ececE7;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:#fafaf8;}

  .task-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:box-shadow 0.2s;}
  .task-card:hover{box-shadow:var(--shadow);}
  .task-card .top-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .task-card .title{font-weight:600;font-size:14px;}
  .task-card .meta{font-size:11.5px;color:var(--ink-soft);margin-top:5px;display:flex;gap:12px;flex-wrap:wrap;}

  /* Phase 2: Timelines & Comments */
  .timeline{border-left:2px solid var(--line);margin-left:10px;padding-left:16px;}
  .tl-item{position:relative;margin-bottom:16px;font-size:12px;}
  .tl-item::before{content:'';position:absolute;left:-23px;top:4px;width:12px;height:12px;border-radius:50%;background:var(--surface);border:2px solid var(--accent);}
  .comment-box{background:#fbfbfa;border:1px solid var(--line);border-radius:8px;padding:12px;margin-bottom:10px;font-size:13px;}
  mark.hl { background: var(--amber-soft); color: var(--amber); padding: 0 2px; border-radius: 3px; font-weight:600; }
  
  .hub-grid{display:grid;grid-template-columns:320px 1fr;gap:20px;}
  .gallery-item{aspect-ratio:1;border:1px solid var(--line);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fbfbfa;cursor:pointer;transition:border-color 0.2s;}
  .gallery-item:hover{border-color:var(--accent);}

  .modal-overlay{position:fixed;inset:0;background:rgba(20,23,28,.6);backdrop-filter:blur(2px);display:none;align-items:flex-start;justify-content:center;z-index:60;padding:6vh 20px;overflow-y:auto;}
  .modal-overlay.open{display:flex;}
  .modal{background:#fff;border-radius:14px;width:520px;max-width:100%;box-shadow:0 30px 80px rgba(0,0,0,.35);}
  .modal-lg{width:850px;}
  .modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--line);}
  .modal-head h3{margin:0;font-size:16px;}
  .modal-body{padding:18px 20px;max-height:65vh;overflow-y:auto;}
  .modal-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;}
  .close-x{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;background:transparent;border:none;color:var(--ink-soft);}
  .close-x:hover{background:var(--paper);}
  .form-row{margin-bottom:14px;}
  .form-row label{font-size:11.5px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:5px;}
  .form-row input,.form-row select,.form-row textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:7px;font-size:13.5px;background:#fbfbfa;}

  #cmdk{position:fixed;inset:0;background:rgba(20,23,28,.45);z-index:80;display:none;align-items:flex-start;justify-content:center;padding-top:10vh;}
  #cmdk.open{display:flex;}
  .cmdk-box{width:600px;max-width:90vw;background:#fff;border-radius:14px;box-shadow:0 30px 80px rgba(0,0,0,.4);overflow:hidden;}
  .cmdk-input{width:100%;border:none;padding:16px 18px;font-size:15px;border-bottom:1px solid var(--line);}
  .cmdk-input:focus{outline:none;}
  .cmdk-results{max-height:360px;overflow-y:auto;}
  .cmdk-item{padding:11px 18px;display:flex;justify-content:space-between;align-items:center;font-size:13px;border-bottom:1px solid #f2f2ef;}
  .cmdk-item:hover{background:var(--paper);cursor:pointer;}

  #notif-panel{position:absolute;top:56px;right:20px;width:340px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);display:none;z-index:70;max-height:420px;overflow-y:auto;}
  #notif-panel.open{display:block;}
  .notif-item{padding:12px 16px;border-bottom:1px solid #f2f2ef;font-size:12.5px;display:flex;gap:10px;align-items:flex-start;}

  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;}
  
  /* Mobile Responsive Updates (Req 35) */
  @media(max-width:980px){
    .shell{display:block;height:auto;}
    .dock{position:fixed;left:-240px;top:0;height:100vh;width:240px;box-shadow:2px 0 10px rgba(0,0,0,.2);z-index:100;}
    .dock.open{transform:translateX(240px);}
    .menu-btn{display:block;}
    .grid-2,.grid-3,.hub-grid{grid-template-columns:1fr;}
    .card{overflow-x:auto;}
    .view{padding:16px;}
  }
  .toast{position:fixed;bottom:22px;right:22px;background:var(--ink);color:#fff;padding:11px 18px;border-radius:9px;font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,.3);z-index:200;display:none;align-items:center;gap:8px;}
  .toast.show{display:flex;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><span class="dot"></span><span>ContentOS</span></div>
    <div class="login-sub">Workspace Authentication (Phase 2)</div>
    <label class="field-label">Select User Profile</label>
    <select class="field" id="login-user"></select>
    <button class="btn btn-primary" style="width:100%;" onclick="doLogin()">Enter Workspace</button>
  </div>
</div>

<div id="app">
<div class="shell">
  <div class="dock" id="sidebar">
    <div class="dock-logo"><span class="dot"></span><span>ContentOS</span></div>
    <div id="nav-list" style="flex:1;overflow-y:auto;"></div>
    <div class="dock-foot">
      <div class="dock-user">
        <div class="avatar" id="user-avatar">--</div>
        <div class="txt">
          <div id="user-name-tag" style="color:#fff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px;"></div>
          <div class="role-tag" id="user-role-tag"></div>
        </div>
      </div>
      <a class="logout-link" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Sign out</a>
    </div>
  </div>

  <div class="main-col">
    <div class="topbar">
      <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="global-search" placeholder="Search tasks, products, brands, logs, comments... (/)" onfocus="openCmdk()" readonly>
        <span class="kbd">/</span>
      </div>
      <div class="topbar-right">
        <span class="date-chip" id="topbar-date"></span>
        <button class="icon-btn" onclick="toggleNotif()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg>
          <span class="badge-dot" id="notif-dot" style="display:none;"></span>
        </button>
      </div>
    </div>
    <div class="view" id="view"></div>
  </div>
</div>
</div>

<div id="notif-panel">
  <div style="padding:12px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;background:#fbfbfa;">
    <select id="notif-filter" class="select" style="padding:4px;font-size:11px;" onchange="renderNotifList()">
      <option value="all">All Notifications</option>
      <option value="Task">Tasks</option>
      <option value="Comment">Comments</option>
      <option value="Warning">Warnings</option>
      <option value="System">System</option>
    </select>
    <a style="font-size:11px;color:var(--accent);font-weight:600;cursor:pointer;" onclick="markAllRead()">Mark all read</a>
  </div>
  <div id="notif-list"></div>
</div>

<div id="cmdk" onclick="if(event.target===this)closeCmdk()">
  <div class="cmdk-box">
    <input class="cmdk-input" id="cmdk-input" placeholder="Search across all modules..." oninput="renderCmdkResults(this.value)">
    <div class="cmdk-results" id="cmdk-results"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay"><div class="modal" id="modal-box"></div></div>
<div class="toast" id="toast"></div>

<script>
/* =========================================================
   ContentOS Phase 2 — Core Data & Configuration
========================================================= */

// Req 22: Advanced Permission Matrix
const ROLES_MATRIX = {
  'Admin': { dashboard:{view:true}, tasks:{view:true, create:true, edit:true, del:true, assign:true, comment:true, complete:true}, products:{view:true, create:true, edit:true, del:true}, brands:{view:true, edit:true}, reports:{view:true, export:true}, analytics:{view:true}, settings:{view:true, edit:true}, users:{view:true, create:true, edit:true, del:true}, audit:{view:true}, trash:{view:true, restore:true, del:true}, log:{view:true} },
  'General Manager': { dashboard:{view:true}, tasks:{view:true, create:true, edit:true, del:false, assign:true, comment:true, complete:true}, products:{view:true, create:true, edit:true, del:false}, brands:{view:true, edit:true}, reports:{view:true, export:true}, analytics:{view:true}, settings:{view:false, edit:false}, users:{view:true, create:false, edit:false, del:false}, audit:{view:true}, trash:{view:false, restore:false, del:false}, log:{view:true} },
  'Content Creator': { dashboard:{view:true}, tasks:{view:true, create:false, edit:false, del:false, assign:false, comment:true, complete:true}, products:{view:true, create:false, edit:false, del:false}, brands:{view:true, edit:false}, reports:{view:false, export:false}, analytics:{view:true}, settings:{view:false, edit:false}, users:{view:false, create:false, edit:false, del:false}, audit:{view:false}, trash:{view:false, restore:false, del:false}, log:{view:true} },
  'Viewer': { dashboard:{view:true}, tasks:{view:true, create:false, edit:false, del:false, assign:false, comment:false, complete:false}, products:{view:true, create:false, edit:false, del:false}, brands:{view:true, edit:false}, reports:{view:true, export:false}, analytics:{view:true}, settings:{view:false, edit:false}, users:{view:false, create:false, edit:false, del:false}, audit:{view:false}, trash:{view:false, restore:false, del:false}, log:{view:true} }
};

const DEFAULT_SETTINGS = {
  postTypes: ['Story','Post','Status','Video','Animation','Other'],
  taskStatuses: ['Pending','In Progress','In Review','Done'],
  taskPriorities: ['High', 'Normal', 'Low'],
  productStatuses: ['New Product','Active','Out of Stock','Discontinued'],
  productCategories: ['Serum', 'Cream', 'Body Care', 'Hair Care', 'Supplement', 'Scrub', 'Gel', 'Other'],
  googleDrive: { rootFolderId: '', autoCreateFolders: false, brandDefaultIds:{}, prodDefaultIds:{} },
  googleSheets: { sheetId: '', syncTasks: false, syncProducts: false },
  notifPrefs: { Task:true, Comment:true, Warning:true, System:true }
};

const DB = {
  key: 'contentos_db_v2_final',
  data: null,
  load() {
    const raw = localStorage.getItem(this.key);
    if(raw) { this.data = JSON.parse(raw); this.migrate(); } 
    else { this.data = this.seed(); this.save(); }
  },
  migrate() {
    // Upgrades V1 structure to V2
    if(!this.data.brands) this.data.brands = [ {id:'exact',name:'Exact Extract',color:'#2f6f5e',priority:true}, {id:'biseka',name:'Biseka',color:'#3d6fa8',priority:true}, {id:'lovelab',name:'Love&Lab',color:'#d1503f',priority:true}, {id:'ola',name:'OLA Tangalle',color:'#e2a542',priority:false} ];
    if(!this.data.settings) this.data.settings = JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
    if(!this.data.settings.taskPriorities) this.data.settings.taskPriorities = ['High','Normal','Low'];
    if(!this.data.settings.notifPrefs) this.data.settings.notifPrefs = {Task:true,Comment:true,Warning:true,System:true};
    if(!this.data.comments) this.data.comments = [];
    if(!this.data.history) this.data.history = [];
    if(!this.data.audit) this.data.audit = [];
    if(!this.data.trash) this.data.trash = [];
    if(!this.data.logs) this.data.logs = [];
    
    this.data.tasks.forEach(t => { 
      if(t.deleted===undefined) t.deleted = false; 
      if(!t.priority) t.priority = 'Normal';
      if(!t.links) { t.links = t.driveLink ? [{id:uid('lnk'), name:'Main File', url:t.driveLink}] : []; delete t.driveLink; }
    });
    this.data.products.forEach(p => { if(p.deleted===undefined) p.deleted = false; });
    this.save();
  },
  save() { localStorage.setItem(this.key, JSON.stringify(this.data)); },
  seed() {
    const users = [
      {id:'u1', name:'Sanduni Fernando', role:'Admin', email:'sanduni@agency.lk'},
      {id:'u2', name:'Ruwan Jayasinghe', role:'General Manager', email:'ruwan@agency.lk'},
      {id:'u3', name:'Nadeesha Perera', role:'Content Creator', email:'nadeesha@agency.lk'},
      {id:'u4', name:'Ishara Madushani', role:'Viewer', email:'ishara@agency.lk'}
    ];
    const brands = [ {id:'exact',name:'Exact Extract',color:'#2f6f5e',priority:true}, {id:'biseka',name:'Biseka',color:'#3d6fa8',priority:true}, {id:'lovelab',name:'Love&Lab',color:'#d1503f',priority:true}, {id:'ola',name:'OLA Tangalle',color:'#e2a542',priority:false} ];
    const products = [
      {id:'p1', name:'Vitamin C Face Serum', brand:'exact', sku:'EXA-VC-030', category:'Serum', status:'Active', ts:Date.now()-864000000, deleted:false},
      {id:'p2', name:'Charcoal Deep Cleanse Bar', brand:'biseka', sku:'BSK-CH-100', category:'Soap', status:'New Product', ts:Date.now()-400000000, deleted:false}
    ];
    const tasks = [

/* --- Global Helpers --- */
function uid(prefix){ return prefix+'_'+Math.random().toString(36).slice(2,9); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmtDate(iso){ if(!iso) return '—'; const d=new Date(iso+'T00:00:00'); return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function timeAgo(ts){ const s=Math.floor((Date.now()-ts)/1000); if(s<60) return 'just now'; const m=Math.floor(s/60); if(m<60) return m+'m ago'; const h=Math.floor(m/60); if(h<24) return h+'h ago'; return Math.floor(h/24)+'d ago'; }
function escapeHtml(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function hl(text, q) { if(!q || !text) return escapeHtml(text); return escapeHtml(text).replace(new RegExp(`(${escapeHtml(q)})`, 'gi'), '<mark class="hl">$1</mark>'); } // Req 9 Highlight
function brandOf(id){ return DB.data.brands.find(b=>b.id===id) || {name:'Unknown', color:'#999'}; }
function getUserName(id){ const u=DB.data.users.find(x=>x.id===id); return u ? u.name : 'System'; }

let currentView = 'dashboard';

/* =========================================================
   SYSTEM LOGGING & AUDIT (Req 20, 21, 3)
========================================================= */
function logAudit(module, action, oldVal, newVal) { 
  DB.data.audit.unshift({ id: uid('aud'), user: SESSION.id, module, action, oldVal: JSON.stringify(oldVal), newVal: JSON.stringify(newVal), ts: Date.now() });
}
function logTaskHistory(taskId, action) { 
  DB.data.history.unshift({ id: uid('hst'), taskId, user: SESSION.id, action, ts: Date.now() });
}
function addNotif(text, type='System', roleFilter='all') { 
  if(DB.data.settings.notifPrefs && DB.data.settings.notifPrefs[type] === false) return; 
  const icons = {'Comment':'<i class="fas fa-comment-dots text-blue-500"></i>', 'Warning':'<i class="fas fa-exclamation-triangle" style="color:var(--amber);"></i>', 'Task':'<i class="fas fa-tasks text-teal-600"></i>', 'System':'<i class="fas fa-cog text-gray-500"></i>'};
  DB.data.notifications.unshift({ id: uid('ntf'), text, type, icon:icons[type]||'🔔', ts: Date.now(), read: false, forRole: roleFilter });
  refreshNotifDot();
}
function softDelete(module, id, itemObj) { 
  itemObj.deleted = true;
  DB.data.trash.unshift({ id: uid('trsh'), module, itemId: id, itemData: JSON.stringify(itemObj), deletedBy: SESSION.id, ts: Date.now() });
  logAudit(module, 'Moved to Trash', itemObj.name || itemObj.title, null);
  DB.save();
}

function saveNewTask() {
  const title = document.getElementById('nt-title').value.trim();
  const brand = document.getElementById('nt-brand').value;
  const product = document.getElementById('nt-product').value;
  const type = document.getElementById('nt-type').value;
  const assignee = document.getElementById('nt-assignee').value;
  const priority = document.getElementById('nt-priority').value;
  
  if(!title) return toast('Task title is required');

  if(product) { // Req 14: Duplicate Warning
    const dups = DB.data.tasks.filter(t=>!t.deleted && t.product===product && t.type===type);
    if(dups.length > 0) {
      if(!confirm(`Warning: This product already has ${dups.length} active ${type} task(s). Create anyway?`)) return;
      addNotif(`Duplicate ${type} task created for product`, 'Warning');
    }
  }

  const t = { id: uid('tsk'), title, brand, product, type, assignee, priority, status: 'Pending', date: todayISO(), links: [], deleted: false, addedBy: SESSION.id, ts: Date.now() };
  DB.data.tasks.unshift(t);
  
  logTaskHistory(t.id, 'Task created & assigned');
  logAudit('Tasks', 'Create', null, t.title);
  addNotif(`New task assigned: ${title}`, 'Task', assignee);
  
  DB.save(); closeModal(); renderView('tasks'); toast('Task created');
}

function updateTaskStatus(id, newStatus) {
  const t = DB.data.tasks.find(x=>x.id===id);
  const old = t.status;
  t.status = newStatus;
  logTaskHistory(id, `Changed status to "${newStatus}"`);
  logAudit('Tasks', 'Update Status', old, newStatus);
  if(newStatus === 'Done') {
    addNotif(`Task completed: ${t.title}`, 'Complete');
    DB.data.logs.unshift({ id:uid('log'), taskId:t.id, brand:t.brand, product:t.product, type:t.type, date:todayISO(), title:t.title, links:t.links, completedBy:SESSION.id });
  }
  DB.save(); toast('Status updated'); renderView('tasks');
}

function addLinkPrompt(id) {
  const name = prompt("Enter attachment name (e.g. Final Video, Caption Doc):");
  if(!name) return;
  const url = prompt("Paste Google Drive URL:");
  if(!url) return;
  const t = DB.data.tasks.find(x=>x.id===id);
  t.links.push({id:uid('lnk'), name, url});
  logTaskHistory(id, `Added attachment: ${name}`);
  logAudit('Tasks', 'Add Link', null, name);
  DB.save(); openTaskDetail(id);
}
function removeLink(tid, lid) {
  if(!confirm("Remove this attachment?")) return;
  const t = DB.data.tasks.find(x=>x.id===tid);
  t.links = t.links.filter(l=>l.id!==lid);
  logTaskHistory(tid, `Removed an attachment`);
  DB.save(); openTaskDetail(tid);
}

// Comments Req 1
function submitComment(id) {
  const text = document.getElementById('td-comment').value.trim();
  if(!text) return;
  if(editingCommentId) {
    const c = DB.data.comments.find(x=>x.id===editingCommentId);
    c.text = text; c.edited = true; c.ts = Date.now();
    logTaskHistory(id, 'Edited a comment');
    editingCommentId = null;
  } else {
    const c = { id:uid('cmt'), taskId:id, userId:SESSION.id, text, ts:Date.now() };
    DB.data.comments.push(c);
    logTaskHistory(id, 'Added a comment');
    const t = DB.data.tasks.find(x=>x.id===id);
    addNotif(`${SESSION.name} commented: ${text.substring(0,25)}...`, 'Comment');
  }
  DB.save(); openTaskDetail(id);
}
function editCommentPrompt(tid, cid) {
  const c = DB.data.comments.find(x=>x.id===cid);
  document.getElementById('td-comment').value = c.text;
  document.getElementById('td-cmt-btn').innerText = 'Save Edit';
  editingCommentId = cid;
}
function deleteComment(tid, cid) {
  if(!confirm('Delete comment permanently?')) return;
  DB.data.comments = DB.data.comments.filter(c=>c.id!==cid);
  logTaskHistory(tid, 'Deleted a comment');
  DB.save(); openTaskDetail(tid);
}

function deleteTask(id) {
  if(!confirm("Move task to trash?")) return;
  softDelete('Tasks', id, DB.data.tasks.find(x=>x.id===id));
  closeModal(); renderView('tasks'); toast('Task trashed');
}

    category: document.getElementById('pm-category').value, status: document.getElementById('pm-status').value
  };
  
  if(id) {
    const p = DB.data.products.find(x=>x.id===id);

function restoreItem(id) {
  const tr = DB.data.trash.find(x=>x.id===id);
  if(tr.module === 'Tasks') { const t=DB.data.tasks.find(x=>x.id===tr.itemId); if(t) t.deleted=false; }
  if(tr.module === 'Products') { const p=DB.data.products.find(x=>x.id===tr.itemId); if(p) p.deleted=false; }
  DB.data.trash = DB.data.trash.filter(x=>x.id!==id);
  logAudit(tr.module, 'Restored', null, tr.itemId);
  DB.save(); renderView('trash'); toast('Item restored');
}
function permanentDelete(id) {
  if(!confirm("Permanently delete? Cannot be undone.")) return;
  DB.data.trash = DB.data.trash.filter(x=>x.id!==id);
  DB.save(); renderView('trash'); toast('Permanently deleted');
}
function emptyTrash() {
  if(!confirm("Empty all trash?")) return;
  DB.data.trash = []; DB.save(); renderView('trash'); toast('Trash emptied');
}

/* =========================================================
   COMMAND PALETTE (CMDK) - Req 9 Unified Search with Highlighting
========================================================= */
function openCmdk(){
  document.getElementById('cmdk').classList.remove('hidden');
  document.getElementById('cmdk').classList.add('open');
  setTimeout(()=>document.getElementById('cmdk-input').focus(),30);
  renderCmdkResults('');
}
function closeCmdk(){ 
  document.getElementById('cmdk').classList.remove('open'); 
}
document.addEventListener('keydown', e=>{
  if(e.key==='/' && document.activeElement.tagName!=='INPUT' && document.activeElement.tagName!=='TEXTAREA'){ e.preventDefault(); if(SESSION) openCmdk(); }
  if(e.key==='Escape') { closeCmdk(); closeModal(); }
});

function renderCmdkResults(q){
  q = q.toLowerCase().trim();
  const results = [];
  
  DB.data.tasks.filter(t=>!t.deleted).forEach(t=>{ if(!q || t.title.toLowerCase().includes(q)) results.push({tag:'Task', label:t.title, sub:t.type, action:()=>{closeCmdk();renderView('tasks');openTaskDetail(t.id);}}); });
  DB.data.products.filter(p=>!p.deleted).forEach(p=>{ if(!q || p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q)) results.push({tag:'Product', label:p.name, sub:p.sku, action:()=>{closeCmdk();renderView('products');openProductDetail(p.id);}}); });
  DB.data.brands.forEach(b=>{ if(!q || b.name.toLowerCase().includes(q)) results.push({tag:'Brand', label:b.name, sub:'Dashboard View', action:()=>{closeCmdk();renderView('brands');}}); });
  DB.data.users.forEach(u=>{ if(!q || u.name.toLowerCase().includes(q)) results.push({tag:'User', label:u.name, sub:u.role, action:()=>{closeCmdk();renderView('users');}}); });
  
  // Search Comments
  DB.data.comments.forEach(c=>{ if(q && c.text.toLowerCase().includes(q)) {
    const parentTask = DB.data.tasks.find(t=>t.id===c.taskId);
    if(parentTask && !parentTask.deleted) results.push({tag:'Comment', label:c.text.substring(0,40)+'...', sub:`In: ${parentTask.title}`, action:()=>{closeCmdk();renderView('tasks');openTaskDetail(c.taskId);}});
  }});
  
  // Search Drive Links
  DB.data.tasks.filter(t=>!t.deleted).forEach(t=>{
    t.links.forEach(l=>{ if(q && l.name.toLowerCase().includes(q)) results.push({tag:'File Link', label:l.name, sub:`In: ${t.title}`, action:()=>{closeCmdk();renderView('tasks');openTaskDetail(t.id);}}); });
  });
  
  const wrap = document.getElementById('cmdk-results');
  wrap.innerHTML = results.slice(0,12).map((r,i)=>`
    <div class="cmdk-item" onclick="window.__cmdkAction(${i})">
      <div>
        <div style="font-weight:700; font-size:14px; color:var(--ink);">${hl(r.label, q)}</div>
        <div style="font-size:11px; color:var(--ink-soft); margin-top:4px;">${r.sub}</div>
      </div>
      <div class="cmdk-tag" style="background:#f4f4f1; border:1px solid var(--line); padding:4px 8px; border-radius:4px;">${r.tag}</div>
    </div>
  `).join('') || `<div style="padding:30px; text-align:center; font-size:12.5px; color:var(--ink-soft); font-weight:600;">No matching records found.</div>`;
  
  window.__cmdkResults = results;
  window.__cmdkAction = (i)=>{ window.__cmdkResults[i].action(); };
}

/* =========================================================
   NOTIFICATIONS UTILS
========================================================= */
function toggleNotif(){ document.getElementById('notif-panel').classList.toggle('open'); renderNotifList(); }
function markAllRead() {
  DB.data.notifications.forEach(n=>n.read=true);
  DB.save(); document.getElementById('notif-panel').classList.remove('open');
  refreshNotifDot(); toast('Notifications cleared');
}
function renderNotifList() {
  const filterVal = document.getElementById('notif-filter') ? document.getElementById('notif-filter').value : 'all';
  const unread = DB.data.notifications.filter(n=>!n.read && (n.forRole==='all' || n.forRole===SESSION.role || SESSION.role==='Admin'));
  document.getElementById('notif-dot').style.display = unread.length ? 'block' : 'none';
  
  let list = DB.data.notifications.filter(n=>(n.forRole==='all' || n.forRole===SESSION.role || SESSION.role==='Admin'));
  if(filterVal !== 'all') list = list.filter(n=>n.type===filterVal);
  
  const wrap = document.getElementById('notif-list');
  wrap.innerHTML = list.slice(0,20).map(n=>`
    <div class="notif-item ${n.read?'read':''}">
      <div class="n-icon">${n.icon||'🔔'}</div>
      <div>
        <div style="font-weight:600; color:var(--ink); line-height:1.4;">${escapeHtml(n.text)}</div>
        <div class="notif-time mono text-uppercase">${timeAgo(n.ts)}</div>
      </div>
    </div>
  `).join('') || `<div style="padding:30px; text-align:center; font-size:11px; color:var(--ink-soft); font-weight:700; text-transform:uppercase;">Inbox is zero.</div>`;
}
function refreshNotifDot() { renderNotifList(); }

function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }

/* =========================================================
   INIT
========================================================= */
(function init(){
  DB.load();
  const select = document.getElementById('login-user');
  select.innerHTML = DB.data.users.map(u=>`<option value="${u.id}">${u.name} (${u.role})</option>`).join('');
  
  const raw = localStorage.getItem('contentos_session');
  if(raw){ SESSION = JSON.parse(raw); boot(); }
})();
</script>
