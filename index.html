<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentOS</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14171c; --paper:#f1f3f0; --surface:#ffffff; --line:#dfe2dc;
    --accent:#2f6f5e;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);overflow:hidden;}
  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px;}
  
  /* Shell & Dock */
  #login-screen{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:100;}
  #app{display:none;height:100vh;}
  .shell{display:flex;height:100vh;position:relative;}
  .dock{width:240px;background:var(--ink);color:#dfe3e0;display:flex;flex-direction:column;padding:18px 12px;flex-shrink:0;transition:transform 0.3s ease;z-index:50;}
  .main-col{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--paper);}
  
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:13.5px;font-weight:500;color:#94a3b8;margin-bottom:4px;cursor:pointer;transition:all 0.2s;}
  .nav-item:hover{background:#1e293b;color:#f8fafc;}
  .nav-item.active{background:var(--accent);color:#ffffff;}
  
  /* UI Elements */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:12px;}
  table{width:100%;border-collapse:collapse;font-size:13px;text-align:left;}
  th{font-size:11px;text-transform:uppercase;color:#64748b;padding:12px 16px;border-bottom:1px solid var(--line);background:#f8fafc;}
  td{padding:12px 16px;border-bottom:1px solid #f1f5f9;}
  
  .modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.6);display:none;align-items:flex-start;justify-content:center;z-index:90;padding:6vh 20px;overflow-y:auto;backdrop-filter:blur(2px);}
  .modal-overlay.open{display:flex;}
  .modal{background:#fff;border-radius:16px;width:750px;max-width:100%;box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);}
  .modal-sm{width:450px;}
  
  .toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:200;display:none;box-shadow:0 10px 15px -3px rgba(0,0,0,0.1);transition:opacity 0.3s;}
  .toast.show{display:flex;}
  
  /* Timeline & Calendar */
  .timeline{border-left:2px solid #e2e8f0;margin-left:12px;padding-left:20px;position:relative;}
  .tl-item{position:relative;margin-bottom:20px;}
  .tl-item::before{content:'';position:absolute;left:-25px;top:4px;width:10px;height:10px;border-radius:50%;background:#fff;border:2px solid var(--accent);}
  
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#e2e8f0;border:1px solid #e2e8f0;}
  .cal-cell{background:#fff;min-height:100px;padding:8px;}
  .cal-cell.dim{background:#f8fafc;color:#cbd5e1;}
  
  @media(max-width:980px){
    .shell{flex-direction:column;}
    .dock{position:absolute;left:-240px;height:100%;box-shadow:4px 0 15px rgba(0,0,0,0.1);}
    .dock.open{transform:translateX(240px);}
    .menu-btn{display:block !important;}
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="card p-10 w-96 shadow-2xl">
    <div class="font-bold text-3xl mb-1 text-gray-900 display">ContentOS <span class="text-sm text-teal-600 align-top">v2</span></div>
    <div class="text-xs text-gray-500 mb-8 uppercase tracking-widest font-semibold">Workspace Authentication</div>
    <label class="block text-xs font-bold text-gray-600 mb-2">SELECT USER</label>
    <select id="login-user" class="w-full p-3 mb-6 rounded-lg border border-gray-300 text-sm bg-gray-50 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500"></select>
    <button class="w-full bg-teal-600 hover:bg-teal-700 text-white p-3 rounded-lg text-sm font-bold transition shadow" onclick="doLogin()">Enter Workspace</button>
  </div>
</div>

<div id="app">
<div class="shell">
  
  <div class="dock" id="sidebar">
    <div class="flex items-center gap-3 px-3 py-2 mb-6">
      <div class="w-8 h-8 rounded-full bg-teal-600 flex items-center justify-center border-2 border-teal-800 shadow-inner">
        <span class="text-white font-bold text-sm">OS</span>
      </div>
      <span class="display font-bold text-xl text-white tracking-tight">ContentOS</span>
    </div>
    <div id="nav-list" class="flex-1 overflow-y-auto"></div>
    <div class="mt-auto border-t border-gray-800 pt-4 px-2">
      <div id="user-name-tag" class="font-bold text-white text-sm truncate mb-0.5"></div>
      <div id="user-role-tag" class="text-xs text-gray-400 truncate mb-3"></div>
      <button class="text-xs text-gray-500 hover:text-white transition flex items-center gap-2" onclick="doLogout()">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Sign out
      </button>
    </div>
  </div>

  <div class="main-col">
    <div class="h-16 bg-white border-b border-gray-200 flex items-center px-6 gap-4 flex-shrink-0 z-10 relative">
      <button class="menu-btn hidden mr-2 text-gray-600" onclick="toggleSidebar()">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      
      <div class="flex-1 max-w-xl relative">
        <svg class="absolute left-3 top-2.5 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input id="global-search" class="w-full bg-gray-100 border border-gray-200 rounded-lg py-2 pl-10 pr-4 text-sm focus:outline-none focus:border-teal-500 focus:bg-white transition" placeholder="Search tasks, products, brands, users... (/)" onfocus="openCmdk()" readonly>
      </div>
      
      <div class="ml-auto flex items-center gap-5">
        <span id="topbar-date" class="text-xs font-mono text-gray-500 hidden sm:block"></span>
        <button class="relative text-gray-500 hover:text-teal-600 transition" onclick="toggleNotif()">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
          <span id="notif-dot" class="absolute top-0 right-0 w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full hidden"></span>
        </button>
      </div>
    </div>
    
    <div class="flex-1 overflow-y-auto p-6 md:p-8" id="view"></div>
  </div>
</div>
</div>

<div id="notif-panel" class="absolute top-16 right-6 w-80 bg-white border border-gray-200 rounded-xl shadow-2xl hidden z-[80] flex-col max-h-[70vh]">
  <div class="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-xl">
    <span class="font-bold text-sm text-gray-800">Notifications</span>
    <button class="text-xs text-teal-600 font-semibold hover:underline" onclick="markAllRead()">Mark read</button>
  </div>
  <div id="notif-list" class="overflow-y-auto flex-1 divide-y"></div>
</div>

<div id="cmdk" class="fixed inset-0 bg-gray-900/40 z-[100] hidden flex-col items-center pt-[15vh] backdrop-blur-sm" onclick="if(event.target===this)closeCmdk()">
  <div class="bg-white w-[650px] max-w-[95vw] rounded-2xl shadow-2xl overflow-hidden flex flex-col transform transition-all">
    <div class="flex items-center px-4 border-b">
      <svg class="w-5 h-5 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input id="cmdk-input" class="w-full p-4 text-lg border-none outline-none" placeholder="Search ContentOS..." oninput="renderCmdkResults(this.value)">
      <span class="text-xs text-gray-400 font-mono border px-1.5 rounded">ESC</span>
    </div>
    <div id="cmdk-results" class="max-h-[50vh] overflow-y-auto bg-gray-50/50"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal flex flex-col max-h-[90vh]" id="modal-box"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* =========================================================
   CORE ARCHITECTURE & DATA LAYER
========================================================= */

// Req 22: Advanced Role Permissions Matrix
const ROLES_MATRIX = {
  'Admin': { 
    dashboard:{view:true}, tasks:{view:true, create:true, edit:true, del:true, assign:true, comment:true, complete:true}, products:{view:true, create:true, edit:true, del:true}, brands:{view:true, edit:true}, reports:{view:true, export:true}, analytics:{view:true}, settings:{view:true, edit:true}, users:{view:true, create:true, edit:true, del:true}, audit:{view:true}, trash:{view:true, restore:true, del:true}, calendar:{view:true}, log:{view:true}
  },
  'General Manager': { 
    dashboard:{view:true}, tasks:{view:true, create:true, edit:true, del:false, assign:true, comment:true, complete:true}, products:{view:true, create:true, edit:true, del:false}, brands:{view:true, edit:true}, reports:{view:true, export:true}, analytics:{view:true}, settings:{view:false, edit:false}, users:{view:true, create:false, edit:false, del:false}, audit:{view:true}, trash:{view:false, restore:false, del:false}, calendar:{view:true}, log:{view:true}
  },
  'Content Creator': { 
    dashboard:{view:true}, tasks:{view:true, create:false, edit:false, del:false, assign:false, comment:true, complete:true}, products:{view:true, create:false, edit:false, del:false}, brands:{view:true, edit:false}, reports:{view:false, export:false}, analytics:{view:true}, settings:{view:false, edit:false}, users:{view:false, create:false, edit:false, del:false}, audit:{view:false}, trash:{view:false, restore:false, del:false}, calendar:{view:true}, log:{view:true}
  },
  'Viewer': { 
    dashboard:{view:true}, tasks:{view:true, create:false, edit:false, del:false, assign:false, comment:false, complete:false}, products:{view:true, create:false, edit:false, del:false}, brands:{view:true, edit:false}, reports:{view:true, export:false}, analytics:{view:true}, settings:{view:false, edit:false}, users:{view:false, create:false, edit:false, del:false}, audit:{view:false}, trash:{view:false, restore:false, del:false}, calendar:{view:true}, log:{view:true}
  }
};

const DEFAULT_SETTINGS = {
  postTypes: ['Story','Post','Status','Video','Animation','Other'],
  taskStatuses: ['Pending','In Progress','In Review','Done'],
  productStatuses: ['New Product','Active','Out of Stock','Discontinued'],
  productCategories: ['Serum', 'Cream', 'Body Care', 'Hair Care', 'Supplement', 'Other'],
  googleDrive: { rootFolderId: '', autoCreateFolders: false },
  googleSheets: { sheetId: '', syncTasks: false, syncProducts: false }
};

// Sri Lankan Holidays & Marketing Calendar Data
const CALENDAR_EVENTS = [
  {date:'2026-01-01', name:"New Year's Day", type:'global'}, {date:'2026-01-03', name:'Duruthu Full Moon Poya', type:'sl'},
  {date:'2026-02-04', name:'Independence Day', type:'sl'}, {date:'2026-02-14', name:"Valentine's Day", type:'global'},
  {date:'2026-04-13', name:'Sinhala & Tamil New Year', type:'sl'}, {date:'2026-05-01', name:'May Day', type:'sl'},
  {date:'2026-05-30', name:'Vesak Full Moon Poya', type:'sl'}, {date:'2026-12-25', name:'Christmas', type:'global'}
];

const DB = {
  key: 'contentos_db_v2_final',
  data: null,
  load() {
    const raw = localStorage.getItem(this.key);
    if(raw) { this.data = JSON.parse(raw); this.migrate(); } 
    else { this.data = this.seed(); this.save(); }
  },
  migrate() {
    // Migration checks to ensure all arrays exist for Phase 2
    if(!this.data.brands) this.data.brands = [{id:'exact',name:'Exact Extract',color:'#2f6f5e'}, {id:'biseka',name:'Biseka',color:'#3d6fa8'}];
    if(!this.data.settings) this.data.settings = JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
    if(!this.data.comments) this.data.comments = [];
    if(!this.data.history) this.data.history = [];
    if(!this.data.audit) this.data.audit = [];
    if(!this.data.trash) this.data.trash = [];
    if(!this.data.logs) this.data.logs = [];
    
    // Ensure all items have 'deleted' flags
    this.data.tasks.forEach(t => { 
      if(t.deleted===undefined) t.deleted = false; 
      if(!t.links) t.links = t.driveLink ? [{id:uid('lnk'), name:'Main File', url:t.driveLink}] : [];
    });
    this.data.products.forEach(p => { if(p.deleted===undefined) p.deleted = false; });
    this.save();
  },
  save() { localStorage.setItem(this.key, JSON.stringify(this.data)); },
  seed() {
    const users = [
      {id:'u1', name:'Nikitha Keshan Gomes', role:'Admin', email:'nk@biseka.lk'},
      {id:'u2', name:'General Manager', role:'General Manager', email:'gm@biseka.lk'},
      {id:'u3', name:'Content Creator 1', role:'Content Creator', email:'cc1@biseka.lk'},
      {id:'u4', name:'Client Viewer', role:'Viewer', email:'view@biseka.lk'}
    ];
    const brands = [
      {id:'exact', name:'Exact Extract', color:'#2f6f5e'}, {id:'biseka', name:'Biseka', color:'#3d6fa8'},
      {id:'lovelab', name:'Love&Lab', color:'#d1503f'}, {id:'ola', name:'OLA Tangalle', color:'#e2a542'},
      {id:'scrub', name:'Scrub&Butter', color:'#7a5cae'}, {id:'titan', name:'Titan Fitness', color:'#20685e'}
    ];
    const products = [
      {id:'p1', name:'Vitamin C Face Serum', brand:'exact', sku:'EXA-VC-030', category:'Serum', status:'Active', ts:Date.now()-864000000, deleted:false},
      {id:'p2', name:'Turmeric Night Cream', brand:'biseka', sku:'BSK-TN-050', category:'Cream', status:'Active', ts:Date.now()-400000000, deleted:false}
    ];
    const tasks = [
      {id:'t1', brand:'exact', title:'Instagram Reel Launch', type:'Video', product:'p1', assignee:'u3', addedBy:'u1', date:todayISO(), status:'Pending', links:[], deleted:false, ts:Date.now()-80000},
      {id:'t2', brand:'biseka', title:'Story Set - Turmeric', type:'Story', product:'p2', assignee:'u3', addedBy:'u2', date:todayISO(), status:'In Progress', links:[{id:uid('lnk'), name:'Canva Edit', url:'https://canva.com'}], deleted:false, ts:Date.now()-3000000}
    ];
    return { users, brands, products, tasks, logs:[], notifications:[], comments:[], history:[], audit:[], trash:[], settings:JSON.parse(JSON.stringify(DEFAULT_SETTINGS)) };
  }
};

/* --- Utilities --- */
function uid(prefix){ return prefix+'_'+Math.random().toString(36).slice(2,9); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmtDate(iso){ if(!iso) return '—'; return new Date(iso+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function timeAgo(ts){ const s=Math.floor((Date.now()-ts)/1000); if(s<60) return 'Just now'; const m=Math.floor(s/60); if(m<60) return m+'m ago'; const h=Math.floor(m/60); if(h<24) return h+'h ago'; return Math.floor(h/24)+'d ago'; }
function escapeHtml(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function brandOf(id){ return DB.data.brands.find(b=>b.id===id) || {name:'Unknown', color:'#94a3b8'}; }
function getUserName(id){ const u=DB.data.users.find(x=>x.id===id); return u ? u.name : 'System'; }

let SESSION = null;
let currentView = 'dashboard';

/* =========================================================
   SYSTEM LOGGING & EVENT HANDLING
========================================================= */
function logAudit(module, action, oldVal, newVal) {
  DB.data.audit.unshift({ id: uid('aud'), user: SESSION.id, module, action, oldVal: JSON.stringify(oldVal), newVal: JSON.stringify(newVal), ts: Date.now() });
}
function logTaskHistory(taskId, action) {
  DB.data.history.unshift({ id: uid('hst'), taskId, user: SESSION.id, action, ts: Date.now() });
}
function addNotif(text, type='System', roleFilter='all') {
  const icons = {'Comment':'💬', 'Warning':'⚠️', 'Task':'📋', 'System':'🔔', 'Complete':'✅'};
  DB.data.notifications.unshift({ id: uid('ntf'), text, type, icon:icons[type]||'🔔', ts: Date.now(), read: false, forRole: roleFilter });
  refreshNotifDot();
}
function softDelete(module, id, itemObj) {
  itemObj.deleted = true;
  DB.data.trash.unshift({ id: uid('trsh'), module, itemId: id, itemData: JSON.stringify(itemObj), deletedBy: SESSION.id, ts: Date.now() });
  logAudit(module, 'Moved to Trash', itemObj.name || itemObj.title, null);
  DB.save();
}

/* =========================================================
   AUTHENTICATION & ROUTING
========================================================= */
function doLogin(){
  const userId = document.getElementById('login-user').value;
  const user = DB.data.users.find(u=>u.id===userId);
  SESSION = { id: user.id, name: user.name, role: user.role };
  localStorage.setItem('contentos_session', JSON.stringify(SESSION));
  boot();
}
function doLogout(){ localStorage.removeItem('contentos_session'); location.reload(); }
function perms(){ return ROLES_MATRIX[SESSION.role] || ROLES_MATRIX['Viewer']; }

function boot(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('user-name-tag').textContent = SESSION.name;
  document.getElementById('user-role-tag').textContent = SESSION.role;
  document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('en-GB',{weekday:'short', day:'2-digit', month:'short', year:'numeric'});
  buildNav();
  renderView('dashboard');
  refreshNotifDot();
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
function buildNav(){
  const p = perms();
  const menu = [
    {id:'dashboard', label:'Dashboard', icon:'M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z', show:p.dashboard.view},
    {id:'tasks', label:'Task Workflow', icon:'M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11', show:p.tasks.view},
    {id:'products', label:'Products Library', icon:'M20.5 7.3L12 12l-8.5-4.7M12 12v9M20.5 7.3L12 3 3.5 7.3 12 12l8.5-4.7z', show:p.products.view},
    {id:'calendar', label:'Marketing Calendar', icon:'M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z', show:p.calendar.view},
    {id:'log', label:'Content Logs', icon:'M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z', show:p.log.view},
    {id:'analytics', label:'Analytics', icon:'M4 19h16M7 15v4M12 9v10M17 5v14', show:p.analytics.view},
    {id:'reports', label:'Export Reports', icon:'M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z', show:p.reports.view},
    {id:'users', label:'Team & Users', icon:'M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z', show:p.users.view},
    {id:'audit', label:'System Audit', icon:'M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z', show:p.audit.view},
    {id:'trash', label:'Trash', icon:'M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16', show:p.trash.view},
    {id:'settings', label:'Settings', icon:'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z', show:p.settings.view},
  ];
  document.getElementById('nav-list').innerHTML = menu.filter(m=>m.show).map(m=>`
    <a class="nav-item ${currentView===m.id?'active':''}" onclick="renderView('${m.id}')">

function saveNewTask() {
  const title = document.getElementById('nt-title').value.trim();
  const brand = document.getElementById('nt-brand').value;
  const product = document.getElementById('nt-product').value;
  const type = document.getElementById('nt-type').value;
  const assignee = document.getElementById('nt-assignee').value;
  
  if(!title) return toast('Task title is required');

  if(product) { // Duplicate Warning Req
    const dups = DB.data.tasks.filter(t=>!t.deleted && t.product===product && t.type===type);
    if(dups.length > 0) {
      if(!confirm(`Warning: This product already has ${dups.length} active ${type} task(s). Create anyway?`)) return;
      addNotif(`Duplicate ${type} task created`, 'Warning');
    }
  }

  const t = { id: uid('tsk'), title, brand, product, type, assignee, status: 'Pending', date: todayISO(), links: [], deleted: false, addedBy: SESSION.id, ts: Date.now() };
  DB.data.tasks.unshift(t);
  
  logTaskHistory(t.id, 'Task created & assigned');
  logAudit('Tasks', 'Create', null, t.title);
  addNotif(`New task assigned: ${title}`, 'Task', assignee);
  
  DB.save(); closeModal(); renderView('tasks'); toast('Task created');
}

function updateTaskStatus(id, newStatus) {
  const t = DB.data.tasks.find(x=>x.id===id);
  const old = t.status;
  t.status = newStatus;
  logTaskHistory(id, `Changed status to "${newStatus}"`);
  logAudit('Tasks', 'Update Status', old, newStatus);
  if(newStatus === 'Done') {
    addNotif(`Task completed: ${t.title}`, 'Complete');
    // Save to logs for V1 compatibility/Analytics
    DB.data.logs.unshift({ id:uid('log'), taskId:t.id, brand:t.brand, product:t.product, type:t.type, date:todayISO(), title:t.title, links:t.links, completedBy:SESSION.id });
  }
  DB.save(); toast('Status updated'); renderView('tasks');
}

function addLinkPrompt(id) {
  const name = prompt("Enter attachment name (e.g. Final Video, Caption Doc):");
  if(!name) return;
  const url = prompt("Paste Google Drive URL:");
  if(!url) return;
  const t = DB.data.tasks.find(x=>x.id===id);
  t.links.push({id:uid('lnk'), name, url});
  logTaskHistory(id, `Added attachment: ${name}`);
  logAudit('Tasks', 'Add Link', null, name);
  DB.save(); openTaskDetail(id);
}
function removeLink(tid, lid) {
  if(!confirm("Remove this attachment?")) return;
  const t = DB.data.tasks.find(x=>x.id===tid);
  t.links = t.links.filter(l=>l.id!==lid);
  logTaskHistory(tid, `Removed an attachment`);
  DB.save(); openTaskDetail(tid);
}

function addComment(id) {
  const text = document.getElementById('td-comment').value.trim();
  if(!text) return;
  const c = { id:uid('cmt'), taskId:id, userId:SESSION.id, text, ts:Date.now() };
  DB.data.comments.push(c);
  logTaskHistory(id, 'Added a comment');
  const t = DB.data.tasks.find(x=>x.id===id);
  addNotif(`${SESSION.name} commented: ${text.substring(0,25)}...`, 'Comment');
  DB.save(); openTaskDetail(id);
}
function deleteComment(tid, cid) {
  if(!confirm('Delete comment permanently?')) return;
  DB.data.comments = DB.data.comments.filter(c=>c.id!==cid);
  logTaskHistory(tid, 'Deleted a comment');
  DB.save(); openTaskDetail(tid);
}
function deleteTask(id) {
  if(!confirm("Move task to trash?")) return;
  softDelete('Tasks', id, DB.data.tasks.find(x=>x.id===id));
  closeModal(); renderView('tasks'); toast('Task trashed');
}

function saveProduct(id) {
  const name = document.getElementById('pm-name').value.trim();
  if(!name) return toast('Name required');
  const data = {
    name, brand: document.getElementById('pm-brand').value, sku: document.getElementById('pm-sku').value.trim(),
    category: document.getElementById('pm-category').value, status: document.getElementById('pm-status').value
  };
  
  if(id) {
    const p = DB.data.products.find(x=>x.id===id);
    logAudit('Products', 'Edit', p.name, name);
    Object.assign(p, data);
  } else {
    const p = { id:uid('prd'), ts:Date.now(), deleted:false, ...data };
    DB.data.products.unshift(p);
    logAudit('Products', 'Create', null, name);
    addNotif(`New Product Added: ${name}`, 'System');
  }
  DB.save(); closeModal(); renderView('products'); toast('Product saved');
}

// Restored from V1 as requested.
let calMonth = new Date().getMonth(); let calYear = new Date().getFullYear();
function renderCalendar(el){
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  let blanks = firstDay===0 ? 6 : firstDay-1; // Monday start
  
  let cells = '';
  for(let i=0; i<blanks; i++) cells += `<div class="cal-cell dim"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const iso = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const evs = CALENDAR_EVENTS.filter(e=>e.date===iso);
    const tsks = DB.data.tasks.filter(t=>t.date===iso && !t.deleted);
    cells += `
      <div class="cal-cell ${iso===todayISO()?'ring-2 ring-teal-500 bg-teal-50':''}">
        <div class="font-bold text-sm mb-1">${d}</div>
        ${evs.map(e=>`<div class="text-[10px] font-bold px-1 py-0.5 rounded mb-1 truncate ${e.type==='global'?'bg-blue-100 text-blue-800':'bg-orange-100 text-orange-800'}">${e.name}</div>`).join('')}
        ${tsks.map(t=>`<div class="text-[10px] bg-gray-100 border text-gray-700 px-1 py-0.5 rounded mb-0.5 truncate cursor-pointer hover:bg-gray-200" onclick="openTaskDetail('${t.id}')">${t.title}</div>`).join('')}
      </div>`;
  }
  
  el.innerHTML = `
    <h1 class="text-2xl font-bold mb-6">Marketing Calendar</h1>
    <div class="card p-6 bg-white">
      <div class="flex justify-between items-center mb-6">
        <button class="px-3 py-1 border rounded hover:bg-gray-50 font-bold" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderView('calendar')">← Prev</button>
        <span class="font-bold text-xl">${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][calMonth]} ${calYear}</span>
        <button class="px-3 py-1 border rounded hover:bg-gray-50 font-bold" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderView('calendar')">Next →</button>
      </div>
      <div class="grid grid-cols-7 gap-1 text-center font-bold text-xs text-gray-500 mb-2 uppercase">
        <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
      </div>
      <div class="cal-grid rounded-lg overflow-hidden">${cells}</div>
    </div>
  `;
}

    <div class="p-5 border-b bg-gray-50 rounded-t-2xl flex justify-between items-center">
      <h3 class="font-bold text-lg text-gray-800">${b?'Edit Theme':'Add Brand'}</h3>
      <button onclick="closeModal()" class="text-gray-400 hover:text-gray-800">✕</button>
    </div>
    <div class="p-6 space-y-5 bg-white">
      <div><label class="block text-xs font-bold text-gray-500 mb-1">BRAND NAME</label><input id="bm-name" value="${b?b.name:''}" class="w-full border rounded-lg p-2.5 text-sm outline-none focus:border-teal-500"></div>
      <div><label class="block text-xs font-bold text-gray-500 mb-1">PRIMARY COLOR</label><input type="color" id="bm-color" value="${b?b.color:'#000000'}" class="w-14 h-14 border rounded p-1 cursor-pointer"></div>
    </div>
    <div class="p-5 border-t bg-gray-50 rounded-b-2xl flex justify-end gap-3">
      <button class="px-5 py-2 border rounded-lg text-sm font-bold text-gray-600 hover:bg-white" onclick="closeModal()">Cancel</button>
      <button class="px-5 py-2 bg-teal-600 text-white rounded-lg text-sm font-bold hover:bg-teal-700 shadow" onclick="saveBrand(${b?`'${b.id}'`:'null'})">Save Brand</button>
    </div>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}
function saveBrand(id) {
  const name = document.getElementById('bm-name').value.trim();
  const color = document.getElementById('bm-color').value;
  if(!name) return toast('Name required');
  if(id) {
    const b = DB.data.brands.find(x=>x.id===id);
    logAudit('Settings', 'Edit Brand', b.name, name);
    b.name = name; b.color = color;
  } else {
    DB.data.brands.push({id:uid('bnd'), name, color});
    logAudit('Settings', 'Add Brand', null, name);
  }
  DB.save(); closeModal(); renderView('settings'); toast('Brand saved');
}

function openListsModal() {
  const s = DB.data.settings;
  const box = document.getElementById('modal-box');
  box.className = 'modal flex flex-col max-h-[90vh] modal-sm';
  box.innerHTML = `
    <div class="p-5 border-b bg-gray-50 rounded-t-2xl flex justify-between items-center">
      <h3 class="font-bold text-lg text-gray-800">Manage System Lists</h3>
      <button onclick="closeModal()" class="text-gray-400 hover:text-gray-800">✕</button>
    </div>
    <div class="p-6 space-y-4 bg-white overflow-y-auto">
      <div><label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Post Types (Comma separated)</label><textarea id="lm-pt" class="w-full border rounded-lg p-2.5 text-sm outline-none focus:border-teal-500 font-mono" rows="2">${s.postTypes.join(', ')}</textarea></div>
      <div><label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Categories</label><textarea id="lm-cat" class="w-full border rounded-lg p-2.5 text-sm outline-none focus:border-teal-500 font-mono" rows="2">${s.productCategories.join(', ')}</textarea></div>
    </div>
    <div class="p-5 border-t bg-gray-50 rounded-b-2xl flex justify-end gap-3">
      <button class="px-5 py-2 border rounded-lg text-sm font-bold text-gray-600 hover:bg-white" onclick="closeModal()">Cancel</button>
      <button class="px-5 py-2 bg-teal-600 text-white rounded-lg text-sm font-bold hover:bg-teal-700 shadow" onclick="saveLists()">Save Lists</button>
    </div>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}
function saveLists() {
  DB.data.settings.postTypes = document.getElementById('lm-pt').value.split(',').map(s=>s.trim()).filter(Boolean);
  DB.data.settings.productCategories = document.getElementById('lm-cat').value.split(',').map(s=>s.trim()).filter(Boolean);
  DB.save(); logAudit('Settings', 'Update Lists', null, null); closeModal(); renderView('settings'); toast('Lists updated');
}


/* =========================================================
   7. USERS, REPORTS, AUDIT, TRASH

// USERS
function renderUsers(el){
  if(!perms().users.view) return;
  el.innerHTML = `
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold">Team & Users</h1>
      ${perms().users.create ? `<button class="bg-teal-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow hover:bg-teal-700" onclick="openUserModal()">+ Add User</button>` : ''}
    </div>
    <div class="card overflow-hidden">
      <table class="w-full text-sm">
        <thead><tr><th>Name</th><th>Role</th><th>Email</th><th></th></tr></thead>
        <tbody>
          ${DB.data.users.map(u=>`
            <tr class="hover:bg-gray-50">
              <td class="font-bold text-gray-800">${escapeHtml(u.name)}</td>
              <td><span class="px-2 py-1 bg-gray-100 rounded text-xs font-bold border">${u.role}</span></td>
              <td class="text-gray-500">${u.email||'—'}</td>
              <td class="text-right">${perms().users.edit ? `<button class="text-teal-600 text-xs font-bold hover:underline" onclick="openUserModal('${u.id}')">Edit</button>` : ''}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}
function openUserModal(id=null){
  const u = id ? DB.data.users.find(x=>x.id===id) : null;
  const box = document.getElementById('modal-box');
  box.className = 'modal flex flex-col max-h-[90vh] modal-sm';
  box.innerHTML = `
    <div class="p-5 border-b bg-gray-50 rounded-t-2xl flex justify-between items-center"><h3 class="font-bold text-lg">${u?'Edit User':'New User'}</h3><button onclick="closeModal()">✕</button></div>
    <div class="p-6 space-y-4 bg-white">
      <div><label class="block text-xs font-bold text-gray-500 mb-1">NAME</label><input id="um-name" value="${u?escapeHtml(u.name):''}" class="w-full border rounded p-2.5 text-sm outline-none"></div>
      <div><label class="block text-xs font-bold text-gray-500 mb-1">EMAIL</label><input id="um-email" value="${u?u.email:''}" class="w-full border rounded p-2.5 text-sm outline-none"></div>
      <div><label class="block text-xs font-bold text-gray-500 mb-1">ROLE</label><select id="um-role" class="w-full border rounded p-2.5 text-sm outline-none">${Object.keys(ROLES_MATRIX).map(r=>`<option ${u&&u.role===r?'selected':''}>${r}</option>`).join('')}</select></div>
    </div>
    <div class="p-5 border-t bg-gray-50 rounded-b-2xl flex justify-end gap-3">
      ${u ? `<button class="mr-auto text-red-500 text-sm font-bold hover:underline" onclick="deleteUser('${u.id}')">Remove</button>` : ''}
      <button class="px-4 py-2 border rounded-lg text-sm font-bold" onclick="closeModal()">Cancel</button>
      <button class="px-4 py-2 bg-teal-600 text-white rounded-lg text-sm font-bold shadow" onclick="saveUser(${u?`'${u.id}'`:'null'})">Save</button>
    </div>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}
function saveUser(id){
  const name = document.getElementById('um-name').value.trim();
  if(!name) return toast('Name required');
  const data = {name, email:document.getElementById('um-email').value.trim(), role:document.getElementById('um-role').value};
  if(id) { Object.assign(DB.data.users.find(x=>x.id===id), data); logAudit('Users','Edit',null,name); } 
  else { DB.data.users.push({id:uid('usr'), ...data}); logAudit('Users','Create',null,name); }
  DB.save(); closeModal(); renderView('users'); toast('User saved');
}
function deleteUser(id) {
  if(!confirm("Remove user?")) return;
  DB.data.users = DB.data.users.filter(x=>x.id!==id);
  DB.save(); closeModal(); renderView('users'); toast('User removed');
}

        ${perms().reports.export ? `<button class="bg-teal-600 text-white px-6 py-2.5 rounded-lg text-sm font-bold shadow hover:bg-teal-700 transition" onclick="toast('Generating raw CSV (Integration Pending)')">Export CSV</button>` : ''}

// AUDIT
function renderAudit(el) {
  if(!perms().audit.view) return;
  el.innerHTML = `
    <h1 class="text-2xl font-bold mb-6">System Audit Log</h1>
    <div class="card shadow-sm overflow-hidden">
      <table class="w-full text-sm">
        <thead><tr><th>Time</th><th>User</th><th>Module & Action</th><th>Details</th></tr></thead>
        <tbody>

// TRASH
function renderTrash(el) {
  const p = perms().trash;
  if(!p.view) return;
  el.innerHTML = `
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold">Trash & Recovery</h1>
      ${p.del ? `<button class="bg-red-50 text-red-600 px-4 py-2 rounded-lg text-sm font-bold border border-red-200 hover:bg-red-100 transition" onclick="emptyTrash()">Empty Trash</button>` : ''}
    </div>
    <div class="card shadow-sm overflow-hidden">
      <table class="w-full text-sm">
        <thead><tr><th>Deleted Time</th><th>Data Type</th><th>Deleted By</th><th class="text-right">Actions</th></tr></thead>
        <tbody>
          ${DB.data.trash.map(tr=>`
            <tr class="hover:bg-gray-50">
              <td class="font-mono text-[11px] text-gray-500">${new Date(tr.ts).toLocaleString()}</td>
              <td class="font-bold text-gray-700">${tr.module}</td>
              <td class="text-gray-600">${getUserName(tr.deletedBy)}</td>
              <td class="text-right">
                ${p.restore ? `<button class="text-teal-600 text-xs font-bold mr-3 hover:underline px-2 py-1 border border-teal-200 rounded bg-teal-50" onclick="restoreItem('${tr.id}')">Restore</button>` : ''}
                ${p.del ? `<button class="text-red-500 text-xs font-bold hover:underline" onclick="permanentDelete('${tr.id}')">Delete</button>` : ''}
              </td>
            </tr>
          `).join('')}
          ${DB.data.trash.length===0?'<tr><td colspan="4" class="p-8 text-center text-gray-400 border-dashed">Trash is empty.</td></tr>':''}
        </tbody>
      </table>
    </div>
  `;
}
function restoreItem(id) {
  const tr = DB.data.trash.find(x=>x.id===id);
  if(tr.module === 'Tasks') DB.data.tasks.find(x=>x.id===tr.itemId).deleted = false;
  if(tr.module === 'Products') DB.data.products.find(x=>x.id===tr.itemId).deleted = false;
  DB.data.trash = DB.data.trash.filter(x=>x.id!==id);
  logAudit(tr.module, 'Restored', null, tr.itemId);
  DB.save(); renderView('trash'); toast('Item restored');
}
function permanentDelete(id) {
  if(!confirm("Permanently delete? Cannot be undone.")) return;
  DB.data.trash = DB.data.trash.filter(x=>x.id!==id);
  DB.save(); renderView('trash'); toast('Permanently deleted');
}
function emptyTrash() {
  if(!confirm("Empty all trash?")) return;
  DB.data.trash = []; DB.save(); renderView('trash'); toast('Trash emptied');
}

/* =========================================================
   COMMAND PALETTE (CMDK) - Req 9 Global Search
========================================================= */
function openCmdk(){
  document.getElementById('cmdk').classList.remove('hidden');
  document.getElementById('cmdk').classList.add('flex');
  setTimeout(()=>document.getElementById('cmdk-input').focus(),30);
  renderCmdkResults('');
}
function closeCmdk(){ 
  document.getElementById('cmdk').classList.add('hidden'); 
  document.getElementById('cmdk').classList.remove('flex');
}
document.addEventListener('keydown', e=>{
  if(e.key==='/' && document.activeElement.tagName!=='INPUT' && document.activeElement.tagName!=='TEXTAREA'){ e.preventDefault(); if(SESSION) openCmdk(); }
  if(e.key==='Escape') { closeCmdk(); closeModal(); }
});
function renderCmdkResults(q){
  q = q.toLowerCase().trim();
  const results = [];
  
  DB.data.tasks.filter(t=>!t.deleted).forEach(t=>{ if(!q || t.title.toLowerCase().includes(q)) results.push({tag:'Task', label:t.title, sub:t.type, action:()=>{closeCmdk();renderView('tasks');openTaskDetail(t.id);}}); });
  DB.data.products.filter(p=>!p.deleted).forEach(p=>{ if(!q || p.name.toLowerCase().includes(q)) results.push({tag:'Product', label:p.name, sub:p.category, action:()=>{closeCmdk();renderView('products');openProductDetail(p.id);}}); });
  DB.data.brands.forEach(b=>{ if(!q || b.name.toLowerCase().includes(q)) results.push({tag:'Brand', label:b.name, sub:'Dashboard View', action:()=>{closeCmdk();renderView('dashboard');}}); });
  
  const wrap = document.getElementById('cmdk-results');
  wrap.innerHTML = results.slice(0,10).map((r,i)=>`
    <div class="p-4 border-b hover:bg-gray-100 cursor-pointer flex justify-between items-center transition" onclick="window.__cmdkAction(${i})">
      <div>
        <div class="text-sm font-bold text-gray-800">${escapeHtml(r.label)}</div>
        <div class="text-[11px] font-bold text-gray-400 mt-1 uppercase tracking-wider">${r.sub}</div>
      </div>
      <div class="text-[10px] font-bold text-teal-600 bg-teal-50 px-2 py-1 rounded border border-teal-200 uppercase tracking-widest">${r.tag}</div>
    </div>
  `).join('') || `<div class="p-6 text-center text-sm text-gray-400">No matching records found.</div>`;
  
  window.__cmdkResults = results;
  window.__cmdkAction = (i)=>{ window.__cmdkResults[i].action(); };
}

/* =========================================================
   NOTIFICATIONS UTILS
========================================================= */
function toggleNotif(){ document.getElementById('notif-panel').classList.toggle('hidden'); }
function markAllRead() {
  DB.data.notifications.forEach(n=>n.read=true);
  DB.save(); document.getElementById('notif-panel').classList.add('hidden');
  refreshNotifDot(); toast('Notifications cleared');
}
function refreshNotifDot() {
  const unread = DB.data.notifications.filter(n=>!n.read && (n.forRole==='all' || n.forRole===SESSION.role || SESSION.role==='Admin'));
  document.getElementById('notif-dot').style.display = unread.length ? 'block' : 'none';
  
  const wrap = document.getElementById('notif-list');
  wrap.innerHTML = DB.data.notifications.filter(n=>(n.forRole==='all' || n.forRole===SESSION.role || SESSION.role==='Admin')).slice(0,15).map(n=>`
    <div class="p-3 text-sm flex gap-3 ${n.read?'opacity-60':'bg-teal-50'}">
      <div class="text-base">${n.icon||'🔔'}</div>
      <div>
        <div class="text-gray-800 font-medium">${escapeHtml(n.text)}</div>
        <div class="text-[10px] text-gray-400 mt-1 font-mono uppercase">${timeAgo(n.ts)}</div>
      </div>
    </div>
  `).join('') || `<div class="p-6 text-center text-xs text-gray-400 font-bold uppercase tracking-widest">Inbox is zero.</div>`;
}

function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.remove('show'), 2600);
}

/* =========================================================
   INIT
========================================================= */
(function init(){
  DB.load();
  const select = document.getElementById('login-user');
  select.innerHTML = DB.data.users.map(u=>`<option value="${u.id}">${u.name} (${u.role})</option>`).join('');
  
  const raw = localStorage.getItem('contentos_session');
  if(raw){ SESSION = JSON.parse(raw); boot(); }
})();
</script>
