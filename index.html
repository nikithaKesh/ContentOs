<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14171c;
    --ink-soft:#3c4249;
    --paper:#f1f3f0;
    --surface:#ffffff;
    --line:#dfe2dc;
    --accent:#2f6f5e;
    --accent-dark:#204f42;
    --accent-soft:#e2ede8;
    --amber:#e2a542;
    --amber-soft:#faecd6;
    --coral:#d1503f;
    --coral-soft:#f7e2de;
    --blue:#3d6fa8;
    --blue-soft:#e1ebf4;
    --radius:10px;
    --shadow: 0 1px 2px rgba(20,23,28,.04), 0 6px 20px -8px rgba(20,23,28,.12);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);}
  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#d4d7d0;border-radius:8px;}
  a{text-decoration:none;color:inherit;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}

  /* ---------- LOGIN ---------- */
  #login-screen{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:100;}
  .login-card{background:var(--surface);width:380px;max-width:90vw;border-radius:16px;padding:36px 32px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
  .login-logo{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .login-logo .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px var(--accent-soft);}
  .login-logo span{font-family:'Space Grotesk';font-weight:700;font-size:22px;letter-spacing:-.02em;}
  .login-sub{color:var(--ink-soft);font-size:13px;margin-bottom:24px;}
  .field-label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);font-weight:600;margin-bottom:6px;display:block;}
  .field{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;margin-bottom:16px;background:#fbfbfa;}
  .field:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent);}
  .btn{border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:.15s;}
  .btn-primary{background:var(--accent);color:#fff;width:100%;justify-content:center;padding:11px;}
  .btn-primary:hover{background:var(--accent-dark);}
  .btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line);}
  .btn-ghost:hover{background:#f1f1ee;}
  .btn-sm{padding:6px 10px;font-size:12px;border-radius:7px;}

  /* ---------- APP SHELL ---------- */
  #app{display:none;height:100vh;}
  .shell{display:grid;grid-template-columns:220px 1fr;height:100vh;}
  .dock{background:var(--ink);color:#dfe3e0;display:flex;flex-direction:column;padding:18px 12px;overflow-y:auto;}
  .dock-logo{display:flex;align-items:center;gap:9px;padding:6px 10px 22px;}
  .dock-logo .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px rgba(47,111,94,.35);}
  .dock-logo span{font-family:'Space Grotesk';font-weight:700;font-size:18px;color:#fff;letter-spacing:-.02em;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;font-size:13.5px;font-weight:500;color:#b7bdb9;margin-bottom:2px;}
  .nav-item:hover{background:#1e2229;color:#fff;}
  .nav-item.active{background:var(--accent);color:#fff;}
  .nav-item svg{width:16px;height:16px;flex-shrink:0;}
  .nav-section-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#6b716c;margin:16px 10px 6px;font-weight:600;}
  .dock-foot{margin-top:auto;padding:10px;border-top:1px solid #262b31;}
  .dock-user{display:flex;align-items:center;gap:8px;font-size:12.5px;}
  .avatar{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
  .dock-user .role-tag{color:#8a908b;font-size:10.5px;}
  .logout-link{font-size:11px;color:#8a908b;margin-top:8px;display:inline-block;}
  .logout-link:hover{color:#fff;}

  .main-col{display:flex;flex-direction:column;min-width:0;}
  .topbar{height:60px;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 20px;gap:14px;background:var(--surface);flex-shrink:0;}
  .search-wrap{flex:1;max-width:480px;position:relative;}
  .search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:#9a9d97;}
  #global-search{width:100%;padding:8px 12px 8px 32px;border-radius:8px;border:1px solid var(--line);background:var(--paper);font-size:13px;}
  #global-search:focus{outline:none;border-color:var(--accent);background:#fff;}
  .kbd{font-size:10px;border:1px solid var(--line);border-radius:4px;padding:1px 5px;color:#9a9d97;position:absolute;right:9px;top:50%;transform:translateY(-50%);background:#fff;}
  .topbar-right{display:flex;align-items:center;gap:14px;margin-left:auto;}
  .icon-btn{position:relative;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:transparent;border:1px solid transparent;color:var(--ink-soft);}
  .icon-btn:hover{background:var(--paper);border-color:var(--line);}
  .icon-btn svg{width:17px;height:17px;}
  .badge-dot{position:absolute;top:5px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--coral);border:2px solid #fff;}
  .date-chip{font-size:12px;color:var(--ink-soft);font-family:'IBM Plex Mono';}

  .view{flex:1;overflow-y:auto;padding:24px 28px;}
  .view-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
  .view-title{font-size:22px;font-weight:700;letter-spacing:-.01em;}
  .view-desc{color:var(--ink-soft);font-size:13px;margin-top:2px;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:22px;}
  .kpi{padding:16px 18px;}
  .kpi .label{font-size:11.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;font-weight:600;}
  .kpi .num{font-family:'Space Grotesk';font-size:26px;font-weight:700;margin-top:4px;}
  .kpi .sub{font-size:11.5px;color:#8a8f8a;margin-top:2px;}

  .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
  .brand-chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;}
  .brand-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

  .status-pending{background:var(--amber-soft);color:#8a5a12;}
  .status-progress{background:var(--blue-soft);color:#264a72;}
  .status-review{background:#efe4f6;color:#5b3a80;}
  .status-done{background:var(--accent-soft);color:var(--accent-dark);}
  .status-overdue{background:var(--coral-soft);color:#8f3323;}
  .status-active{background:var(--accent-soft);color:var(--accent-dark);}
  .status-new{background:var(--blue-soft);color:#264a72;}
  .status-oos{background:var(--coral-soft);color:#8f3323;}
  .status-disc{background:#eceae5;color:#6b6d68;}

  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
  .select,.tfield{padding:7px 10px;border:1px solid var(--line);border-radius:7px;font-size:12.5px;background:#fff;color:var(--ink);}
  .select:focus,.tfield:focus{outline:2px solid var(--accent-soft);border-color:var(--accent);}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);padding:10px 14px;border-bottom:1px solid var(--line);font-weight:600;background:#f9f9f7;}
  td{padding:11px 14px;border-bottom:1px solid #ececE7;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:#fafaf8;}

  .task-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
  .task-card .top-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .task-card .title{font-weight:600;font-size:14px;}
  .task-card .meta{font-size:11.5px;color:var(--ink-soft);margin-top:5px;display:flex;gap:12px;flex-wrap:wrap;}
  .brand-group{margin-bottom:26px;}
  .brand-group-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .brand-group-head .line{flex:1;height:1px;background:var(--line);}

  .log-card{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .log-embed{width:100%;aspect-ratio:16/10;background:#eef0ec;display:flex;align-items:center;justify-content:center;color:#9a9d97;font-size:12px;border-bottom:1px solid var(--line);}
  .log-embed iframe{width:100%;height:100%;border:0;}
  .log-body{padding:12px 14px;}
  .log-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}

  .modal-overlay{position:fixed;inset:0;background:rgba(20,23,28,.5);display:none;align-items:flex-start;justify-content:center;z-index:60;padding:6vh 20px;overflow-y:auto;}
  .modal-overlay.open{display:flex;}
  .modal{background:#fff;border-radius:14px;width:520px;max-width:100%;box-shadow:0 30px 80px rgba(0,0,0,.35);}
  .modal.modal-wide{width:720px;}
  .modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--line);}
  .modal-head h3{margin:0;font-size:16px;}
  .modal-body{padding:18px 20px;max-height:65vh;overflow-y:auto;}
  .modal-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;}
  .close-x{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;background:transparent;border:none;color:var(--ink-soft);}
  .close-x:hover{background:var(--paper);}
  .form-row{margin-bottom:14px;}
  .form-row label{font-size:11.5px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:5px;}
  .form-row input,.form-row select,.form-row textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:7px;font-size:13.5px;background:#fbfbfa;}
  .form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:var(--accent);background:#fff;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

  /* Command palette */
  #cmdk{position:fixed;inset:0;background:rgba(20,23,28,.45);z-index:80;display:none;align-items:flex-start;justify-content:center;padding-top:10vh;}
  #cmdk.open{display:flex;}
  .cmdk-box{width:560px;max-width:90vw;background:#fff;border-radius:14px;box-shadow:0 30px 80px rgba(0,0,0,.4);overflow:hidden;}
  .cmdk-input{width:100%;border:none;padding:16px 18px;font-size:15px;border-bottom:1px solid var(--line);}
  .cmdk-input:focus{outline:none;}
  .cmdk-results{max-height:360px;overflow-y:auto;}
  .cmdk-item{padding:11px 18px;display:flex;justify-content:space-between;align-items:center;font-size:13px;border-bottom:1px solid #f2f2ef;}
  .cmdk-item:hover{background:var(--paper);cursor:pointer;}
  .cmdk-tag{font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;}

  /* Notifications panel */
  #notif-panel{position:absolute;top:56px;right:20px;width:380px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);display:none;z-index:70;max-height:480px;overflow-y:auto;}
  #notif-panel.open{display:block;}
  .notif-item{padding:12px 16px;border-bottom:1px solid #f2f2ef;font-size:12.5px;display:flex;gap:10px;}
  .notif-item .badge{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:600;flex-shrink:0;}
  .notif-item.read{opacity:.55;}
  .notif-time{color:#9a9d97;font-size:10.5px;margin-top:3px;}
  .notif-task{background:var(--blue-soft);color:#264a72;}
  .notif-comment{background:#efe4f6;color:#5b3a80;}
  .notif-complete{background:var(--accent-soft);color:var(--accent-dark);}
  .notif-review{background:var(--amber-soft);color:#8a5a12;}

  /* Calendar */
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-dow{font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;text-align:center;padding-bottom:4px;font-weight:600;}
  .cal-cell{background:#fff;border:1px solid var(--line);border-radius:8px;min-height:88px;padding:6px 7px;font-size:11.5px;position:relative;cursor:pointer;}
  .cal-cell:hover{border-color:var(--accent);}
  .cal-cell.dim{background:#f4f4f1;color:#b6b8b1;}
  .cal-cell .dnum{font-weight:700;font-family:'Space Grotesk';font-size:13px;}
  .cal-cell.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
  .cal-tag{font-size:9.5px;padding:1px 5px;border-radius:5px;margin-top:3px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cal-holiday{background:var(--coral-soft);color:#8f3323;}
  .cal-poya{background:#efe4f6;color:#5b3a80;}
  .cal-religious{background:#e1ebf4;color:#264a72;}
  .cal-marketing{background:var(--amber-soft);color:#8a5a12;}
  .cal-task{background:var(--blue-soft);color:#264a72;}
  .cal-custom{background:#dff2ea;color:#1f6a4f;}
  .cal-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--ink-soft);margin-bottom:14px;}
  .cal-legend span{display:inline-flex;align-items:center;gap:6px;}
  .cal-legend i{width:9px;height:9px;border-radius:3px;display:inline-block;}

  /* Bars for analytics */
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .bar-label{width:120px;font-size:12px;flex-shrink:0;}
  .bar-track{flex:1;height:10px;background:#eceae5;border-radius:6px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:6px;}
  .bar-val{width:34px;text-align:right;font-size:12px;font-family:'IBM Plex Mono';color:var(--ink-soft);}

  .empty-state{text-align:center;padding:50px 20px;color:var(--ink-soft);}
  .empty-state svg{width:38px;height:38px;margin-bottom:10px;opacity:.5;}
  .empty-state .t{font-weight:600;color:var(--ink);font-size:14px;margin-bottom:4px;}

  .grid-2{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  
  .section-title{font-size:14px;font-weight:700;margin-bottom:12px;}
  .toast{position:fixed;bottom:22px;right:22px;background:var(--ink);color:#fff;padding:11px 18px;border-radius:9px;font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,.3);z-index:200;display:none;align-items:center;gap:8px;}
  .toast.show{display:flex;}
  .req-tag{font-size:10px;color:var(--ink-soft);}

  /* Task detail */
  .drive-link-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border:1px solid var(--line);border-radius:8px;margin-bottom:7px;font-size:12.5px;background:#fbfbfa;}
  .drive-link-row a{color:var(--accent);font-weight:600;}
  .drive-link-meta{font-size:10.5px;color:var(--ink-soft);margin-top:2px;}
  .add-link-row{display:flex;gap:8px;margin-top:8px;}
  .add-link-row input{flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:7px;font-size:12.5px;}

  .comment-item{padding:10px 0;border-bottom:1px solid #f0f0ec;}
  .comment-head{display:flex;justify-content:space-between;align-items:center;}
  .comment-user{font-weight:600;font-size:12.5px;}
  .comment-time{font-size:10.5px;color:var(--ink-soft);}
  .comment-text{font-size:12.5px;margin-top:4px;color:var(--ink);white-space:pre-wrap;}
  .comment-actions{display:flex;gap:10px;margin-top:5px;}
  .comment-actions a{font-size:10.5px;color:var(--ink-soft);font-weight:600;}
  .comment-actions a:hover{color:var(--accent);}
  .comment-edited-tag{font-size:9.5px;color:#9a9d97;margin-left:4px;}
  .comment-input-row{display:flex;gap:8px;margin-top:10px;}
  .comment-input-row textarea{flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:7px;font-size:12.5px;resize:vertical;min-height:38px;}

  .timeline{position:relative;padding-left:16px;}
  .timeline-item{position:relative;padding-bottom:14px;font-size:12px;}
  .timeline-item:before{content:'';position:absolute;left:-16px;top:4px;width:7px;height:7px;border-radius:50%;background:var(--accent);}
  .timeline-item:after{content:'';position:absolute;left:-13px;top:11px;bottom:0;width:1px;background:var(--line);}
  .timeline-item:last-child:after{display:none;}
  .timeline-detail{color:var(--ink-soft);font-size:11px;margin-top:1px;}
  .detail-tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:14px;flex-wrap:wrap;}
  .detail-tab{padding:7px 12px;font-size:12px;font-weight:600;color:var(--ink-soft);border-bottom:2px solid transparent;cursor:pointer;}
  .detail-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .search-counter-wrap{display:flex;gap:8px;margin-bottom:12px;}
  .search-counter-wrap input{flex:1;padding:8px 11px;border:1px solid var(--line);border-radius:7px;font-size:12.5px;}

  /* Activity feed */
  .activity-feed{max-height:360px;overflow-y:auto;}
  .activity-item{padding:10px 0;border-bottom:1px solid #f0f0ec;font-size:12px;}
  .activity-time{color:var(--ink-soft);font-size:10.5px;}
  .activity-text{margin-top:3px;color:var(--ink);}

  /* Product gallery */
  .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:14px;}
  .gallery-item{background:#fbfbfa;border:1px solid var(--line);border-radius:8px;padding:10px;text-align:center;cursor:pointer;transition:.15s;}
  .gallery-item:hover{border-color:var(--accent);background:#fff;}
  .gallery-item .type{font-size:10px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;margin-bottom:4px;}
  .gallery-item .brand{font-size:11.5px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:4px;margin-top:6px;}
  .gallery-item .brand-dot{width:6px;height:6px;border-radius:50%;}
  .gallery-item .date{font-size:10px;color:var(--ink-soft);margin-top:4px;}

  /* Product Dashboard */
  .product-kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px;}
  .product-kpi{padding:12px 14px;background:#fbfbfa;border-radius:8px;border:1px solid var(--line);}
  .product-kpi .label{font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;font-weight:600;}
  .product-kpi .num{font-size:18px;font-weight:700;margin-top:3px;}
  .product-kpi .sub{font-size:10px;color:#8a8f8a;margin-top:2px;}

  /* Audit Log */
  .audit-item{padding:10px 14px;border-bottom:1px solid #f0f0ec;display:flex;justify-content:space-between;align-items:flex-start;font-size:12px;}
  .audit-detail{flex:1;}
  .audit-user{color:var(--accent);font-weight:600;}
  .audit-action{color:var(--ink);margin-top:2px;}
  .audit-meta{color:var(--ink-soft);font-size:10.5px;margin-top:3px;}

  /* Product thumbnail */
  .prod-thumb{width:38px;height:38px;border-radius:8px;object-fit:cover;background:#eef0ec;border:1px solid var(--line);flex-shrink:0;}
  .prod-thumb-placeholder{width:38px;height:38px;border-radius:8px;background:#eef0ec;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:#9a9d97;font-size:14px;flex-shrink:0;}
  .prod-thumb-lg{width:64px;height:64px;border-radius:10px;object-fit:cover;background:#eef0ec;border:1px solid var(--line);flex-shrink:0;}
  .prod-thumb-xl{width:100%;aspect-ratio:1;border-radius:10px;object-fit:cover;background:#eef0ec;border:1px solid var(--line);}
  .prod-name-cell{display:flex;align-items:center;gap:10px;}
  .product-grid-card{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;cursor:pointer;transition:.15s;}
  .product-grid-card:hover{border-color:var(--accent);box-shadow:var(--shadow);}
  .product-grid-card .img-wrap{aspect-ratio:1;background:#eef0ec;display:flex;align-items:center;justify-content:center;color:#9a9d97;overflow:hidden;}
  .product-grid-card .img-wrap img{width:100%;height:100%;object-fit:cover;}
  .product-grid-card .body{padding:10px 12px;}
  .product-grid-card .pname{font-weight:600;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .product-grid-card .pmeta{font-size:10.5px;color:var(--ink-soft);margin-top:3px;}
  .view-toggle{display:flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;}
  .view-toggle button{border:none;background:#fff;padding:6px 11px;font-size:12px;font-weight:600;color:var(--ink-soft);}
  .view-toggle button.active{background:var(--accent);color:#fff;}
  .logo-preview{width:52px;height:52px;border-radius:10px;object-fit:cover;background:#eef0ec;border:1px solid var(--line);}
  .settings-nav{display:flex;flex-direction:column;gap:2px;}
  .settings-nav-item{padding:9px 12px;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;}
  .settings-nav-item:hover{background:var(--paper);}
  .settings-nav-item.active{background:var(--accent-soft);color:var(--accent-dark);}
  .settings-shell{display:grid;grid-template-columns:190px 1fr;gap:20px;}
  .tag-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:8px;background:var(--paper);border:1px solid var(--line);font-size:12px;font-weight:500;margin:0 6px 6px 0;}
  .tag-chip button{background:none;border:none;color:var(--ink-soft);font-size:13px;padding:0;line-height:1;}
  .tag-chip button:hover{color:var(--coral);}
  .toggle-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0ec;}
  .toggle-row:last-child{border-bottom:none;}
  .switch{position:relative;width:38px;height:22px;flex-shrink:0;}
  .switch input{opacity:0;width:0;height:0;}
  .switch .slider{position:absolute;cursor:pointer;inset:0;background:#d5d8d1;border-radius:22px;transition:.15s;}
  .switch .slider:before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s;}
  .switch input:checked + .slider{background:var(--accent);}
  .switch input:checked + .slider:before{transform:translateX(16px);}
  .inline-add-row{display:flex;gap:8px;margin-top:10px;}
  .inline-add-row input{flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:7px;font-size:12.5px;}

  /* Responsive */
  @media(max-width:980px){
    .shell{grid-template-columns:70px 1fr;}
    .dock-logo span,.nav-item span,.dock-user .txt{display:none;}
    .nav-item{justify-content:center;}
    .dock-logo{justify-content:center;}
    .grid-2,.grid-3{grid-template-columns:1fr;}

    .kpi-grid{grid-template-columns:repeat(2,1fr);}
    .product-kpi-grid{grid-template-columns:repeat(2,1fr);}
    .settings-shell{grid-template-columns:1fr;}
  }
  @media(max-width:640px){
    .view{padding:16px 14px;}
    .topbar{flex-direction:column;height:auto;gap:10px;padding:10px 14px;}
    .search-wrap{max-width:100%;}

<!-- ============ LOGIN ============ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><span class="dot"></span><span>ContentOS</span></div>
    <div class="login-sub">Sign in to your content operations workspace.</div>
    <label class="field-label">Your name</label>
    <input class="field" id="login-name" placeholder="e.g. Nadeesha Perera" list="user-list">
    <datalist id="user-list"></datalist>
    <label class="field-label">Role</label>
    <select class="field" id="login-role">
      <option value="Admin">Admin — Full access</option>
      <option value="General Manager">General Manager — Create, review, approve tasks</option>
      <option value="Content Creator">Content Creator — View assigned tasks, upload work</option>
      <option value="Viewer">Viewer — Read only</option>
    </select>
    <button class="btn btn-primary" onclick="doLogin()">Enter workspace</button>
    <div style="text-align:center;margin-top:14px;">
      <span class="req-tag">Demo data is stored locally in this browser.</span>
    </div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
<div class="shell">
  <!-- DOCK / SIDEBAR -->
  <div class="dock">
    <div class="dock-logo" id="dock-logo-wrap"><span class="dot"></span><span>ContentOS</span></div>
    <div id="nav-list"></div>
    <div class="dock-foot">
      <div class="dock-user">
        <div class="avatar" id="user-avatar">--</div>
        <div class="txt">
          <div id="user-name-tag" style="color:#fff;font-weight:600;"></div>
          <div class="role-tag" id="user-role-tag"></div>
        </div>
      </div>
      <a class="logout-link" onclick="doLogout()">Sign out</a>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-col">
    <div class="topbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="global-search" placeholder="Search everything..." onfocus="openCmdk()" readonly>
        <span class="kbd">/</span>
      </div>
      <div class="topbar-right">
        <span class="date-chip" id="topbar-date"></span>
        <button class="icon-btn" onclick="toggleNotif()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg>
          <span class="badge-dot" id="notif-dot" style="display:none;"></span>
        </button>
      </div>
    </div>
    <div class="view" id="view"></div>
  </div>
</div>
</div>

<!-- Notifications panel -->
<div id="notif-panel">
  <div style="padding:12px 16px;border-bottom:1px solid var(--line);font-weight:700;font-size:13px;display:flex;justify-content:space-between;">
    <span>Notifications</span>
    <a style="font-size:11px;color:var(--accent);font-weight:600;" onclick="markAllRead()">Mark all read</a>
  </div>
  <div id="notif-list"></div>
</div>

<!-- Command palette -->
<div id="cmdk" onclick="if(event.target===this)closeCmdk()">
  <div class="cmdk-box">
    <input class="cmdk-input" id="cmdk-input" placeholder="Search tasks, products, brands, people..." oninput="renderCmdkResults(this.value)">
    <div class="cmdk-results" id="cmdk-results"></div>
  </div>
</div>

<!-- Generic modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-box"></div>
</div>

<div class="toast" id="toast"></div>

function timeAgo(ts){ const s=Math.floor((Date.now()-ts)/1000); if(s<60) return 'just now'; const m=Math.floor(s/60); if(m<60) return m+'m ago'; const h=Math.floor(m/60); if(h<24) return h+'h ago'; return Math.floor(h/24)+'d ago'; }

    return {brands, users, products, tasks, logs, notifications, auditLog, customEvents:[], settings};
  }
};
function pastDate(days){ const d=new Date(); d.setDate(d.getDate()-days); return d.toISOString().slice(0,10); }
function futureDate(days){ const d=new Date(); d.setDate(d.getDate()+days); return d.toISOString().slice(0,10); }

let SESSION = null;
let currentView = 'dashboard';

function doLogin(){
  const name = document.getElementById('login-name').value.trim() || 'Guest User';
  const role = document.getElementById('login-role').value;
  SESSION = {name, role};
  localStorage.setItem('contentos_session', JSON.stringify(SESSION));
  DB.load();
  BRANDS = DB.data.brands;
  ensureUser(name, role);
  boot();
}
function ensureUser(name, role){
  const exists = DB.data.users.find(u=>u.name.toLowerCase()===name.toLowerCase());
  if(!exists){ DB.data.users.push({id:uid('u'), name, role, email:''}); DB.save(); }
}
function doLogout(){
  localStorage.removeItem('contentos_session');
  location.reload();
}
function currentUser(){
  return DB.data.users.find(u=>u.name.toLowerCase()===SESSION.name.toLowerCase()) || {name:SESSION.name, role:SESSION.role};
}
function perms(){ return ROLES[SESSION.role] || ROLES['Viewer']; }

function boot(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('user-name-tag').textContent = SESSION.name;
  document.getElementById('user-role-tag').textContent = SESSION.role;
  document.getElementById('user-avatar').textContent = SESSION.name.split(' ').map(s=>s[0]).slice(0,2).join('').toUpperCase();
  document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('en-GB',{weekday:'long', day:'2-digit', month:'short', year:'numeric'});
  applyCompanyBranding();
  buildNav();
  renderView('dashboard');
  refreshNotifDot();
}

function applyCompanyBranding(){
  const s = DB.data.settings || {};
  const wrap = document.getElementById('dock-logo-wrap');
  if(s.companyLogo){
    wrap.innerHTML = `<img src="${s.companyLogo}" style="width:22px;height:22px;border-radius:6px;object-fit:cover;"><span>${escapeHtml(s.companyName||'ContentOS')}</span>`;
  } else {
    wrap.innerHTML = `<span class="dot"></span><span>${escapeHtml(s.companyName||'ContentOS')}</span>`;
  }
}

function buildNav(){
  const p = perms();
  const wrap = document.getElementById('nav-list');
  wrap.innerHTML = NAV_ITEMS.filter(n=>p.pages.includes(n.id)).map(n=>`
    <a class="nav-item" data-nav="${n.id}" onclick="renderView('${n.id}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="${n.icon}"/></svg>
      <span>${n.label}</span>
    </a>`).join('');
}
function setActiveNav(id){
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active', el.dataset.nav===id));
}

/* ROUTER */
function renderView(id){
  if(!perms().pages.includes(id)) id = 'dashboard';
  currentView = id;
  setActiveNav(id);
  const el = document.getElementById('view');
  const renderers = {
    dashboard:renderDashboard, tasks:renderTasks, log:renderLog, calendar:renderCalendar,
    products:renderProducts, brands:renderBrands, analytics:renderAnalytics, audit:renderAuditLog, users:renderUsers,
    settings:renderSettings
  };
  el.innerHTML = '';
  (renderers[id]||renderDashboard)(el);
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.remove('show'), 2600);
}

/* =========================================================
   DASHBOARD
========================================================= */
function renderDashboard(el){
  const tasks = DB.data.tasks;
  const pending = tasks.filter(t=>t.status!=='Done').length;
  const doneToday = tasks.filter(t=>t.status==='Done' && t.date===todayISO()).length;
  const overdue = tasks.filter(t=>t.status!=='Done' && t.date<todayISO()).length;
  const products = DB.data.products;
  const oos = products.filter(p=>p.status==='Out of Stock').length;
  const newProd = products.filter(p=>p.status==='New Product').length;

  const myTasks = tasks.filter(t=>SESSION.role==='Content Creator' ? matchesUser(t.assignee) : true)
                        .filter(t=>t.status!=='Done').slice(0,5);

  // Activity Feed
  const activity = getActivityFeed(10);

  el.innerHTML = `
    <div class="view-head">
      <div><div class="view-title">Good to see you, ${SESSION.name.split(' ')[0]}</div><div class="view-desc">Here's what's happening across your workspace.</div></div>
      <button class="btn btn-ghost btn-sm" onclick="renderView('tasks')">Go to tasks →</button>
    </div>
    <div class="kpi-grid">
      <div class="card kpi"><div class="label">Open tasks</div><div class="num">${pending}</div><div class="sub">${overdue} overdue</div></div>
      <div class="card kpi"><div class="label">Completed today</div><div class="num">${doneToday}</div><div class="sub">across all brands</div></div>
      <div class="card kpi"><div class="label">Out of stock</div><div class="num">${oos}</div><div class="sub">products</div></div>
      <div class="card kpi"><div class="label">Total products</div><div class="num">${products.length}</div><div class="sub">in catalog</div></div>
    </div>
    <div class="grid-2">
      <div class="card" style="padding:18px 20px;">
        <div class="section-title">${SESSION.role==='Content Creator'?'Your open tasks':'Open tasks across the team'}</div>
        <div id="dash-tasks"></div>
      </div>
      <div class="card" style="padding:18px 20px;">
        <div class="section-title">Recent Activity</div>
        <div class="activity-feed" id="dash-activity"></div>
      </div>
    </div>
    <div class="grid-2" style="margin-top:16px;">
      <div class="card" style="padding:18px 20px;">
        <div class="section-title">Product Content Counter</div>
        <div class="search-counter-wrap">
          <input id="pc-search" placeholder="Search any product..." oninput="renderProductCounter(this.value)">
        </div>
        <div id="dash-product-counter"></div>
      </div>
      <div class="card" style="padding:18px 20px;">
        <div class="section-title">Brand breakdown</div>
        <div id="dash-brands"></div>
      </div>
    </div>
  `;

  const tWrap = el.querySelector('#dash-tasks');
  tWrap.innerHTML = myTasks.length ? myTasks.map(taskMiniRow).join('') : emptyState('No open tasks','Everything is caught up!');

  const aWrap = el.querySelector('#dash-activity');
  aWrap.innerHTML = activity.length ? activity.map(a=>`
    <div class="activity-item">
      <div class="activity-time">${timeAgo(a.ts)}</div>
      <div class="activity-text">${escapeHtml(a.text)}</div>
    </div>`).join('') : emptyState('No activity yet','Tasks will appear here.');

  renderProductCounter('');

  const bWrap = el.querySelector('#dash-brands');
  bWrap.innerHTML = BRANDS.slice(0,5).map(b=>{
    const count = DB.data.logs.filter(l=>l.brand===b.id).length;
    return `<div class="bar-row"><div class="bar-label"><span class="brand-chip"><span class="brand-dot" style="background:${b.color}"></span>${b.name}</span></div><div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,count*12)}%;background:${b.color}"></div></div><div class="bar-val">${count}</div></div>`;
  }).join('');
}

function getActivityFeed(limit=10){
  const items = [];
  DB.data.tasks.forEach(t=>{
    t.history?.forEach(h=>{
      items.push({ts:h.ts, text:`${DB.data.users.find(u=>u.id===h.by)?.name||'Someone'} ${h.detail} in task "${escapeHtml(t.title)}"`});
    });
    t.comments?.forEach(c=>{
      const u = DB.data.users.find(x=>x.id===c.userId);
      items.push({ts:c.ts, text:`${u?.name||'Someone'} commented on "${escapeHtml(t.title)}"`});
    });
  });
  return items.sort((a,b)=>b.ts-a.ts).slice(0,limit);
}

function productContentCount(productId){
  return DB.data.logs.filter(l=>l.product===productId).length;
}
function renderProductCounter(query){
  const wrap = document.getElementById('dash-product-counter');
  if(!wrap) return;
  query = (query||'').trim().toLowerCase();
  let list;
  if(query){
    list = DB.data.products.filter(p=>p.name.toLowerCase().includes(query) || (p.sku||'').toLowerCase().includes(query))
      .map(p=>({p, count:productContentCount(p.id)}))
      .sort((a,b)=>b.count-a.count);
  } else {
    list = DB.data.products.map(p=>({p, count:productContentCount(p.id)}))
      .sort((a,b)=>b.count-a.count).slice(0,10);
  }
  if(!list.length){ wrap.innerHTML = emptyState('No products found','Try a different search.'); return; }
  const max = Math.max(1, ...list.map(x=>x.count));
  wrap.innerHTML = list.map(({p,count})=>{
    const b = brandOf(p.brand);
    return `<div class="bar-row"><div class="bar-label" style="width:190px;"><span class="brand-chip"><span class="brand-dot" style="background:${b.color}"></span><span style="font-size:11px;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(p.name)}</span></span></div><div class="bar-track"><div class="bar-fill" style="width:${count/max*100}%;background:${b.color}"></div></div><div class="bar-val">${count}</div></div>`;
  }).join('');
}

function matchesUser(uidVal){
  const u = currentUser();
  return uidVal===u.id;
}
function statusColor(s){
  return {'New Product':'#3d6fa8','Active':'#2f6f5e','Out of Stock':'#d1503f','Discontinued':'#8a8f8a',
          'Pending':'#e2a542','In Progress':'#3d6fa8','In Review':'#8a5cbf','Done':'#2f6f5e'}[s] || '#999';
}
function statusPillClass(s){
  return {'Pending':'status-pending','In Progress':'status-progress','In Review':'status-review','Done':'status-done',
          'New Product':'status-new','Active':'status-active','Out of Stock':'status-oos','Discontinued':'status-disc'}[s] || 'status-pending';
}
function taskMiniRow(t){
  const b = brandOf(t.brand); const overdue = t.status!=='Done' && t.date<todayISO();
  return `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f0f0ec;">
    <div style="flex:1;">
      <div style="font-size:13px;font-weight:600;">${escapeHtml(t.title)}</div>
      <div style="font-size:11px;color:var(--ink-soft);margin-top:2px;"><span class="brand-chip"><span class="brand-dot" style="background:${b.color}"></span>${b.name}</span> · ${fmtDate(t.date)}</div>
    </div>
    <span class="pill ${statusPillClass(t.status)}">${overdue?'Overdue':t.status}</span>
  </div>`;
}
function emptyState(title, sub){
  return `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M9 12h6"/></svg><div class="t">${title}</div><div>${sub}</div></div>`;
}

/* =========================================================
   TASKS PAGE
========================================================= */
let taskFilters = {brand:'', status:'', scope:'today', assignee:'', type:'', q:''};
let taskViewMode = localStorage.getItem('contentos_task_view') || 'card';
function renderTasks(el){
  const p = perms();
  el.innerHTML = `
    <div class="view-head">
      <div><div class="view-title">Tasks</div><div class="view-desc">Daily work list, organized by brand.</div></div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div class="view-toggle">
          <button class="${taskViewMode==='card'?'active':''}" onclick="taskViewMode='card';localStorage.setItem('contentos_task_view','card');renderTasks(document.getElementById('view'))">Cards</button>
          <button class="${taskViewMode==='table'?'active':''}" onclick="taskViewMode='table';localStorage.setItem('contentos_task_view','table');renderTasks(document.getElementById('view'))">Table</button>
        </div>
        ${p.canCreateTask ? `<button class="btn btn-primary btn-sm" onclick="openTaskModal()">+ New task</button>` : ''}
      </div>
    </div>
    <div class="toolbar">
      <input class="tfield" id="filter-q" placeholder="Search tasks..." value="${escapeHtml(taskFilters.q)}" oninput="taskFilters.q=this.value;renderTasks(document.getElementById('view'))" style="min-width:180px;">
      <select class="select" id="filter-scope" onchange="taskFilters.scope=this.value;renderTasks(document.getElementById('view'))">
        <option value="today" ${taskFilters.scope==='today'?'selected':''}>Due today</option>
        <option value="upcoming" ${taskFilters.scope==='upcoming'?'selected':''}>Upcoming</option>
        <option value="overdue" ${taskFilters.scope==='overdue'?'selected':''}>Overdue</option>
        <option value="all" ${taskFilters.scope==='all'?'selected':''}>All open</option>
        <option value="done" ${taskFilters.scope==='done'?'selected':''}>Completed</option>
      </select>
      <select class="select" id="filter-brand" onchange="taskFilters.brand=this.value;renderTasks(document.getElementById('view'))">
        <option value="">All brands</option>
        ${BRANDS.map(b=>`<option value="${b.id}" ${taskFilters.brand===b.id?'selected':''}>${b.name}</option>`).join('')}
      </select>
      <select class="select" id="filter-status" onchange="taskFilters.status=this.value;renderTasks(document.getElementById('view'))">
        <option value="">Any status</option>
        ${getTaskStatuses().map(s=>`<option ${taskFilters.status===s?'selected':''}>${s}</option>`).join('')}
      </select>
      <select class="select" id="filter-type" onchange="taskFilters.type=this.value;renderTasks(document.getElementById('view'))">
        <option value="">Any type</option>
        ${getPostTypes().map(s=>`<option ${taskFilters.type===s?'selected':''}>${s}</option>`).join('')}
      </select>
      <select class="select" id="filter-assignee" onchange="taskFilters.assignee=this.value;renderTasks(document.getElementById('view'))">
        <option value="">Anyone</option>
        ${DB.data.users.map(u=>`<option value="${u.id}" ${taskFilters.assignee===u.id?'selected':''}>${u.name}</option>`).join('')}
      </select>
      ${(taskFilters.brand||taskFilters.status||taskFilters.type||taskFilters.assignee||taskFilters.q) ? `<button class="btn btn-ghost btn-sm" onclick="taskFilters={brand:'',status:'',scope:taskFilters.scope,assignee:'',type:'',q:''};renderTasks(document.getElementById('view'))">Clear filters</button>` : ''}
    </div>
    <div id="task-list"></div>
  `;
  let list = DB.data.tasks.slice();
  if(SESSION.role==='Content Creator') list = list.filter(t=>matchesUser(t.assignee));
  if(taskFilters.scope==='today') list = list.filter(t=>t.date===todayISO() && t.status!=='Done');
  else if(taskFilters.scope==='upcoming') list = list.filter(t=>t.date>todayISO() && t.status!=='Done');
  else if(taskFilters.scope==='overdue') list = list.filter(t=>t.date<todayISO() && t.status!=='Done');
  else if(taskFilters.scope==='all') list = list.filter(t=>t.status!=='Done');
  else if(taskFilters.scope==='done') list = list.filter(t=>t.status==='Done');
  if(taskFilters.brand) list = list.filter(t=>t.brand===taskFilters.brand);
  if(taskFilters.status) list = list.filter(t=>t.status===taskFilters.status);
  if(taskFilters.type) list = list.filter(t=>t.type===taskFilters.type);
  if(taskFilters.assignee) list = list.filter(t=>t.assignee===taskFilters.assignee);
  if(taskFilters.q){
    const q = taskFilters.q.toLowerCase();
    list = list.filter(t=>t.title.toLowerCase().includes(q) || (t.notes||'').toLowerCase().includes(q));
  }

  const wrap = el.querySelector('#task-list');
  if(!list.length){ wrap.innerHTML = emptyState('No tasks match this view','Try a different filter, or add a new task.'); return; }

  if(taskViewMode==='table'){
    wrap.innerHTML = renderTaskTable(list);
    return;
  }

  const groups = {};
  list.forEach(t=>{ (groups[t.brand] = groups[t.brand]||[]).push(t); });
  wrap.innerHTML = Object.keys(groups).map(bid=>{
    const b = brandOf(bid);
    return `<div class="brand-group">
      <div class="brand-group-head"><span class="brand-chip"><span class="brand-dot" style="background:${b.color}"></span><strong>${b.name}</strong></span><span class="line"></span><span style="font-size:11.5px;color:var(--ink-soft);">${groups[bid].length} task${groups[bid].length>1?'s':''}</span></div>
      ${groups[bid].map(taskCard).join('')}
    </div>`;
  }).join('');
}

function renderTaskTable(list){
  const p = perms();
  return `<div class="card" style="overflow-x:auto;">
    <table>
      <thead><tr><th>Title</th><th>Brand</th><th>Type</th><th>Product</th><th>Assignee</th><th>Date</th><th>Status</th><th>Links</th><th></th></tr></thead>
      <tbody>
        ${list.map(t=>{
          const b = brandOf(t.brand);
          const assignee = DB.data.users.find(u=>u.id===t.assignee);
          const prod = t.product ? DB.data.products.find(x=>x.id===t.product) : null;
          const overdue = t.status!=='Done' && t.date<todayISO();
          return `<tr>
            <td style="font-weight:600;max-width:220px;">${escapeHtml(t.title)}</td>
            <td><span class="brand-chip"><span class="brand-dot" style="background:${b.color}"></span>${b.name}</span></td>
            <td>${t.type}</td>
            <td>${prod?escapeHtml(prod.name):'—'}</td>
            <td>${assignee?escapeHtml(assignee.name):'—'}</td>
            <td class="mono" style="font-size:12px;">${fmtDate(t.date)}</td>
            <td><span class="pill ${statusPillClass(t.status)}">${overdue?'Overdue':t.status}</span></td>
            <td>${(t.driveLinks||[]).length}</td>
            <td style="display:flex;gap:6px;">
              ${t.status!=='Done' && p.canUpload ? `<button class="btn btn-primary btn-sm" onclick="openCompleteModal('${t.id}')">Complete</button>` : ''}
              <button class="btn btn-ghost btn-sm" onclick="openTaskDetail('${t.id}')">Details</button>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

function taskCard(t){
  const overdue = t.status!=='Done' && t.date<todayISO();
  const assignee = DB.data.users.find(u=>u.id===t.assignee);
  const linkCount = (t.driveLinks||[]).length;
  const commentCount = (t.comments||[]).length;
  return `<div class="task-card">
    <div class="top-row">
      <div style="flex:1;">
        <div class="title">${escapeHtml(t.title)}</div>
        <div class="meta">
          <span>${t.type}${t.product ? ' · '+ (DB.data.products.find(p=>p.id===t.product)?.name || '') : ''}</span>
          <span>${assignee?assignee.name:'—'}</span>
          <span class="mono">${fmtDate(t.date)}</span>
          ${linkCount ? `<span>${linkCount} link${linkCount>1?'s':''}</span>`:''}
          ${commentCount ? `<span>${commentCount} comment${commentCount>1?'s':''}</span>`:''}
        </div>
      </div>
      <span class="pill ${statusPillClass(t.status)}">${overdue?'Overdue':t.status}</span>
    </div>
    ${t.notes ? `<div style="font-size:12px;color:var(--ink-soft);margin-top:8px;">${escapeHtml(t.notes)}</div>` : ''}
    <div style="display:flex;gap:8px;margin-top:10px;">
      ${t.status!=='Done' && perms().canUpload ? `<button class="btn btn-primary btn-sm" onclick="openCompleteModal('${t.id}')">Complete</button>` : ''}
      <button class="btn btn-ghost btn-sm" onclick="openTaskDetail('${t.id}')">Details</button>
    </div>
  </div>`;
}

function setTaskStatus(id, status){
  const t = DB.data.tasks.find(x=>x.id===id); t.status=status;
  logHistory(t, 'status', `Status changed to ${status}`);
  logAudit(currentUser().id, 'status_change', `Changed status to ${status}`);
  DB.save(); renderTasks(document.getElementById('view'));
  toast('Task updated');
}

function logHistory(task, action, detail){
  if(!task.history) task.history = [];
  task.history.unshift({ts:Date.now(), by:currentUser().id, action, detail});
}

function logAudit(userId, action, detail){
  if(!DB.data.auditLog) DB.data.auditLog = [];
  DB.data.auditLog.unshift({id:uid('a'), userId, action, detail, ts:Date.now()});
}

function openTaskModal(){
  const box = document.getElementById('modal-box');
  box.innerHTML = `
    <div class="modal-head"><h3>New task</h3><button class="close-x" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-row"><label>Task title</label><input id="nt-title" placeholder="e.g. Reel for product launch"></div>
      <div class="two-col">
        <div class="form-row"><label>Brand</label><select id="nt-brand">${BRANDS.map(b=>`<option value="${b.id}">${b.name}</option>`).join('')}</select></div>
        <div class="form-row"><label>Type</label><select id="nt-type">${getPostTypes().map(p=>`<option>${p}</option>`).join('')}</select></div>
      </div>
      <div class="two-col">
        <div class="form-row"><label>Product</label><select id="nt-product"><option value="">No product</option>${DB.data.products.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select></div>
        <div class="form-row"><label>Assign to</label><select id="nt-assignee">${DB.data.users.map(u=>`<option value="${u.id}">${u.name}</option>`).join('')}</select></div>
      </div>
      <div class="form-row"><label>Date</label><input type="date" id="nt-date" value="${todayISO()}"></div>
      <div class="form-row"><label>Notes</label><textarea id="nt-notes" rows="2" placeholder="Any instructions..."></textarea></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-primary btn-sm" onclick="createTask()">Create</button></div>
  `;
  openModal();
}

function createTask(){
  const title = document.getElementById('nt-title').value.trim();
  if(!title){ toast('Add a task title'); return; }
  const t = {
    id: uid('t'), brand: document.getElementById('nt-brand').value, title,
    type: document.getElementById('nt-type').value, product: document.getElementById('nt-product').value,
    assignee: document.getElementById('nt-assignee').value, addedBy: currentUser().id,
    date: document.getElementById('nt-date').value || todayISO(), status: getTaskStatuses()[0] || 'Pending',
    notes: document.getElementById('nt-notes').value.trim(), driveLinks:[], comments:[],
    history:[{ts:Date.now(), by:currentUser().id, action:'created', detail:'Task created'}]
  };
  DB.data.tasks.unshift(t);
  const assignee = DB.data.users.find(u=>u.id===t.assignee);
  if(notifEnabled('assigned')) DB.data.notifications.unshift({id:uid('n'), text:`${currentUser().name} assigned you: "${title}"`, type:'assigned', ts:Date.now(), read:false, forRole:'', forUser:t.assignee});
  logAudit(currentUser().id, 'created_task', `Created task: ${title}`);
  DB.save(); closeModal(); renderTasks(document.getElementById('view')); refreshNotifDot();
  toast('Task created');
}

function openCompleteModal(id){
  const t = DB.data.tasks.find(x=>x.id===id);
  const box = document.getElementById('modal-box');
  box.innerHTML = `
    <div class="modal-head"><h3>Mark complete</h3><button class="close-x" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div style="font-size:13px;color:var(--ink-soft);margin-bottom:12px;">${escapeHtml(t.title)}</div>
      <div class="form-row"><label>Google Drive link — proof of work</label><input id="ct-link" placeholder="https://drive.google.com/..."></div>
      <div class="req-tag">You can add more links later from Task Details.</div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-primary btn-sm" onclick="completeTask('${id}')">Submit</button></div>
  `;
  openModal();
}

function completeTask(id){
  const link = document.getElementById('ct-link').value.trim();
  if(!link){ toast('Add a drive link'); return; }
  const t = DB.data.tasks.find(x=>x.id===id);
  const statuses = getTaskStatuses();
  t.status = statuses[statuses.length-1] || 'Done';
  if(!t.driveLinks) t.driveLinks=[];
  t.driveLinks.push({id:uid('dl'), url:link, addedBy:currentUser().id, ts:Date.now()});
  DB.data.logs.unshift({id:uid('log'), taskId:t.id, brand:t.brand, product:t.product, type:t.type, completedBy: currentUser().id, date: todayISO(), driveLink:link, title:t.title});
  logHistory(t, 'completed', 'Marked as complete');
  if(notifEnabled('complete')) DB.data.notifications.unshift({id:uid('n'), text:`${currentUser().name} completed "${t.title}"`, type:'complete', ts:Date.now(), read:false, forRole:'General Manager'});
  logAudit(currentUser().id, 'completed_task', `Completed: ${t.title}`);
  DB.save(); closeModal(); renderTasks(document.getElementById('view')); refreshNotifDot();
  toast('Task completed');
}

function renderTaskDetailModal(id){

function addDriveLink(taskId){
  const input = document.getElementById('dl-new-url');
  const url = input.value.trim();
  if(!url){ toast('Enter a URL'); return; }

function renderCommentsTab(t){
  const comments = t.comments||[];
  const me = currentUser();
  return `
    <div>
      ${comments.length ? comments.map(c=>{
        const u = DB.data.users.find(x=>x.id===c.userId);
        const mine = c.userId===me.id;
        return `<div class="comment-item">
          <div class="comment-head">
            <span class="comment-user">${u?escapeHtml(u.name):'Unknown'}</span>
            <span class="comment-time">${fmtDateTime(c.ts)}</span>
          </div>
          <div class="comment-text" id="comment-text-${c.id}">${escapeHtml(c.text)}${c.edited?'<span class="comment-edited-tag">(edited)</span>':''}</div>
          ${mine ? `<div class="comment-actions"><a onclick="startEditComment('${t.id}','${c.id}')">Edit</a><a onclick="deleteComment('${t.id}','${c.id}')">Delete</a></div>` : ''}
        </div>`;
      }).join('') : emptyState('No comments','Start the discussion below.')}
    </div>
    <div class="comment-input-row">

function addComment(taskId){
  const ta = document.getElementById('comment-new-text');
  const text = ta.value.trim();
  if(!text){ toast('Write something'); return; }
  const t = DB.data.tasks.find(x=>x.id===taskId);
  if(!t.comments) t.comments=[];
  const me = currentUser();
  t.comments.push({id:uid('c'), userId:me.id, text, ts:Date.now(), edited:false});
  logHistory(t, 'comment', 'Commented on the task');
  if(notifEnabled('comment')){
    const notifyIds = new Set([t.assignee, t.addedBy].filter(uidv=>uidv && uidv!==me.id));
    notifyIds.forEach(uidv=>{
      DB.data.notifications.unshift({id:uid('n'), text:`${me.name} commented on "${t.title}"`, type:'comment', ts:Date.now(), read:false, forRole:'', forUser:uidv});
    });
  }
  logAudit(me.id, 'added_comment', `Commented on task`);
  DB.save();
  renderTaskDetailModal(taskId);
  refreshNotifDot();
  toast('Comment posted');
}

function startEditComment(taskId, commentId){
  const t = DB.data.tasks.find(x=>x.id===taskId);
  const c = t.comments.find(x=>x.id===commentId);
  const wrap = document.getElementById('comment-text-'+commentId);
  wrap.innerHTML = `<textarea id="edit-comment-${commentId}" style="width:100%;padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-size:12.5px;">${escapeHtml(c.text)}</textarea>
    <div style="margin-top:6px;display:flex;gap:8px;">
      <button class="btn btn-primary btn-sm" onclick="saveEditComment('${taskId}','${commentId}')">Save</button>
      <button class="btn btn-ghost btn-sm" onclick="renderTaskDetailModal('${taskId}')">Cancel</button>
    </div>`;
}

function saveEditComment(taskId, commentId){
  const t = DB.data.tasks.find(x=>x.id===taskId);
  const c = t.comments.find(x=>x.id===commentId);
  const newText = document.getElementById('edit-comment-'+commentId).value.trim();
  if(!newText){ toast('Cannot be empty'); return; }
  c.text = newText; c.edited = true;
  logAudit(currentUser().id, 'edited_comment', `Edited comment`);
  DB.save();
  renderTaskDetailModal(taskId);
  toast('Comment updated');
}

function deleteComment(taskId, commentId){
  const t = DB.data.tasks.find(x=>x.id===taskId);
  t.comments = t.comments.filter(x=>x.id!==commentId);
  logAudit(currentUser().id, 'deleted_comment', `Deleted comment`);
  DB.save();
  renderTaskDetailModal(taskId);
  toast('Comment deleted');
}

function renderHistoryTab(t){
  const hist = (t.history||[]).slice().sort((a,b)=>b.ts-a.ts);
  if(!hist.length) return emptyState('No history','Activity will appear here.');
  return `<div class="timeline">${hist.map(h=>{
    const u = DB.data.users.find(x=>x.id===h.by);
    return `<div class="timeline-item"><strong>${u?escapeHtml(u.name):'Someone'}</strong> — ${escapeHtml(h.detail)}<div class="timeline-detail">${fmtDateTime(h.ts)}</div></div>`;
  }).join('')}</div>`;
}

/* CALENDAR */
let calMonth = new Date().getMonth();
let calYear = new Date().getFullYear();
let calEventFilter = 'all';
function renderCalendar(el){
  el.innerHTML = `
    <div class="view-head">
      <div><div class="view-title">Calendar</div><div class="view-desc">Holidays, Poya days, religious observances, and scheduled content.</div></div>
      <div class="toolbar" style="margin:0;">
        <button class="btn btn-ghost btn-sm" onclick="calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(document.getElementById('view'))">← Prev</button>
        <span style="font-weight:700;font-family:'Space Grotesk';min-width:150px;text-align:center;display:inline-block;">${monthName(calMonth)} ${calYear}</span>
        <button class="btn btn-ghost btn-sm" onclick="calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(document.getElementById('view'))">Next →</button>
        <select class="select" onchange="calEventFilter=this.value;renderCalendar(document.getElementById('view'))">
          <option value="all" ${calEventFilter==='all'?'selected':''}>All events</option>
          <option value="public" ${calEventFilter==='public'?'selected':''}>Public holidays</option>
          <option value="poya" ${calEventFilter==='poya'?'selected':''}>Poya days</option>
          <option value="religious" ${calEventFilter==='religious'?'selected':''}>Religious</option>
          <option value="marketing" ${calEventFilter==='marketing'?'selected':''}>Marketing</option>
          <option value="custom" ${calEventFilter==='custom'?'selected':''}>My events</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="openCustomEventModal()">+ Add event</button>
      </div>
    </div>
    <div class="cal-legend">
      <span><i style="background:var(--coral-soft);"></i>Public holiday</span>
      <span><i style="background:#efe4f6;"></i>Poya day</span>
      <span><i style="background:var(--blue-soft);"></i>Religious</span>
      <span><i style="background:var(--amber-soft);"></i>Marketing</span>
      <span><i style="background:#dff2ea;"></i>My event</span>
    </div>
    <div class="card" style="padding:16px;">
      <div class="cal-grid" style="margin-bottom:6px;">
        ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      </div>
      <div class="cal-grid" id="cal-body"></div>
    </div>
  `;
  const body = el.querySelector('#cal-body');
  const first = new Date(calYear, calMonth, 1);
  let startDow = first.getDay(); startDow = startDow===0?6:startDow-1;
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth, 0).getDate();
  let cells = [];
  for(let i=startDow-1;i>=0;i--) cells.push({d:daysInPrev-i, dim:true});
  for(let d=1; d<=daysInMonth; d++) cells.push({d, dim:false});
  while(cells.length % 7 !== 0) cells.push({d: cells.length - (startDow+daysInMonth) + 1, dim:true});
  body.innerHTML = cells.map(c=>{
    const iso = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(c.d).padStart(2,'0')}`;
    const isToday = !c.dim && iso===todayISO();
    const events = SL_HOLIDAYS.filter(h=>h.date===iso && (calEventFilter==='all'||calEventFilter===h.type));
    const custom = (DB.data.customEvents||[]).filter(h=>h.date===iso && (calEventFilter==='all'||calEventFilter==='custom'));
    const dayTasks = DB.data.tasks.filter(t=>t.date===iso);
    const allEvents = events.length + custom.length;
    const shownH = calEventFilter==='custom' ? [] : events.slice(0,2);
    const shownC = custom.slice(0, Math.max(0,2-shownH.length));
    const remaining = allEvents - shownH.length - shownC.length + (calEventFilter==='all'?dayTasks.length:0);
    return `<div class="cal-cell ${c.dim?'dim':''} ${isToday?'today':''}" onclick="${c.dim?'':`openDayModal('${iso}')`}">
      <div class="dnum">${c.d}</div>
      ${shownH.map(h=>`<span class="cal-tag ${holidayTypeMeta(h.type).cls}">${escapeHtml(h.name.slice(0,16))}</span>`).join('')}
      ${shownC.map(h=>`<span class="cal-tag cal-custom">${escapeHtml((h.title||'').slice(0,16))}</span>`).join('')}
      ${remaining>0 ? `<span style="font-size:9.5px;color:var(--ink-soft);">+${remaining} more</span>`:''}
    </div>`;
  }).join('');
}
function monthName(m){ return ['January','February','March','April','May','June','July','August','September','October','November','December'][m]; }
function holidayTypeMeta(t){
  return {
    public:    {label:'Public holiday', cls:'cal-holiday'},
    poya:      {label:'Poya day',       cls:'cal-poya'},
    religious: {label:'Religious',      cls:'cal-religious'},
    marketing: {label:'Marketing date', cls:'cal-marketing'},
  }[t] || {label:'Event', cls:'cal-holiday'};
}

function openDayModal(iso){
  const events = SL_HOLIDAYS.filter(h=>h.date===iso);
  const custom = (DB.data.customEvents||[]).filter(h=>h.date===iso);
  const tasks = DB.data.tasks.filter(t=>t.date===iso);
  const box = document.getElementById('modal-box');
  box.innerHTML = `
    <div class="modal-head"><h3>${fmtDate(iso)}</h3><button class="close-x" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="section-title" style="margin-bottom:8px;">Calendar events</div>
      ${events.map(h=>`<div class="drive-link-row"><div><strong>${escapeHtml(h.name)}</strong><div class="drive-link-meta">${holidayTypeMeta(h.type).label}</div></div></div>`).join('')}
      ${custom.map(h=>`<div class="drive-link-row"><div><strong>${escapeHtml(h.title)}</strong>${h.notes?`<div class="drive-link-meta">${escapeHtml(h.notes)}</div>`:''}</div><a class="btn btn-ghost btn-sm" onclick="deleteCustomEvent('${h.id}','${iso}')">Delete</a></div>`).join('')}
      ${(!events.length && !custom.length) ? emptyState('No events','Add a custom event below.') : ''}
      <button class="btn btn-primary btn-sm" style="margin-top:10px;" onclick="openCustomEventModal('${iso}')">+ Add event on this day</button>
      ${tasks.length ? `<div class="section-title" style="margin-top:18px;">Tasks due</div>${tasks.map(taskMiniRow).join('')}` : ''}
    </div>
    <div class="modal-foot"><button class="btn btn-ghost btn-sm" onclick="closeModal()">Close</button></div>
  `;
  openModal();
}

function openCustomEventModal(iso){
  const box = document.getElementById('modal-box');
  box.innerHTML = `
    <div class="modal-head"><h3>Add custom event</h3><button class="close-x" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-row"><label>Event title</label><input id="ce-title" placeholder="e.g. Client photoshoot"></div>
      <div class="form-row"><label>Date</label><input type="date" id="ce-date" value="${iso||todayISO()}"></div>

    </div>
    <div class="modal-foot"><button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancel</button><button class="btn btn-primary btn-sm" onclick="createCustomEvent()">Add event</button></div>
  `;

function createCustomEvent(){
  const title = document.getElementById('ce-title').value.trim();
  const date = document.getElementById('ce-date').value;
  if(!title || !date){ toast('Add a title and date'); return; }
  if(!DB.data.customEvents) DB.data.customEvents = [];
  DB.data.customEvents.push({id:uid('ce'), title, date, notes:document.getElementById('ce-notes').value.trim(), addedBy:currentUser().id});
  logAudit(currentUser().id, 'custom_event', `Added calendar event: ${title}`);
  DB.save(); closeModal(); renderCalendar(document.getElementById('view'));

}

function deleteCustomEvent(id, iso){
  DB.data.customEvents = (DB.data.customEvents||[]).filter(x=>x.id!==id);
  DB.save();
  logAudit(currentUser().id, 'custom_event_deleted', `Deleted calendar event`);
  if(iso) openDayModal(iso); else closeModal();
  renderCalendar(document.getElementById('view'));

}

        ${getCategories().map(c=>`<option ${productFilters.category===c?'selected':''}>${c}</option>`).join('')}

        </div>

  }

    const b = brandOf(pr.brand);

function readFileAsDataUrl(file, cb){
  const reader = new FileReader();
  reader.onload = ()=>cb(reader.result);
  reader.readAsDataURL(file);
}

function saveProduct(id){
  const name = document.getElementById('pm-name').value.trim();
  if(!name){ toast('Add a name'); return; }

function deleteProduct(id){
  DB.data.products = DB.data.products.filter(x=>x.id!==id);
  logAudit(currentUser().id, 'product_deleted', `Deleted product`);
  DB.save(); closeModal(); renderProducts(document.getElementById('view'));

}

function buildProductTimeline(productId){
  const items = [];
  DB.data.tasks.filter(t=>t.product===productId).forEach(t=>{
    (t.history||[]).forEach(h=>{
      items.push({ts:h.ts, label:h.detail, taskTitle:t.title, by:h.by});
    });
  });
  DB.data.logs.filter(l=>l.product===productId).forEach(l=>{
    // already captured via task history 'completed', but ensure at least one entry if no task history matched
  });
  return items.sort((a,b)=>b.ts-a.ts);
}

/* ANALYTICS */
let analyticsView = {period:'monthly', month:new Date().toISOString().slice(0,7), year:String(new Date().getFullYear()), brand:'', product:'', type:''};
function renderAnalytics(el){
  el.innerHTML = `
    <div class="view-head">
      <div><div class="view-title">Analytics</div><div class="view-desc">Content production metrics.</div></div>
      <div class="view-toggle">
        <button class="${analyticsView.period==='monthly'?'active':''}" onclick="analyticsView.period='monthly';renderAnalytics(document.getElementById('view'))">Monthly</button>
        <button class="${analyticsView.period==='weekly'?'active':''}" onclick="analyticsView.period='weekly';renderAnalytics(document.getElementById('view'))">Weekly</button>
      </div>
    </div>
    <div class="toolbar">
      ${analyticsView.period==='monthly' ? `<input class="tfield" type="month" value="${analyticsView.month}" onchange="analyticsView.month=this.value;renderAnalytics(document.getElementById('view'))">` : `<input class="tfield" type="number" style="width:90px;" value="${analyticsView.year}" onchange="analyticsView.year=this.value;renderAnalytics(document.getElementById('view'))">`}
      <select class="select" onchange="analyticsView.brand=this.value;renderAnalytics(document.getElementById('view'))">
        <option value="">All brands</option>
        ${BRANDS.map(b=>`<option value="${b.id}" ${analyticsView.brand===b.id?'selected':''}>${b.name}</option>`).join('')}
      </select>
      <select class="select" onchange="analyticsView.product=this.value;renderAnalytics(document.getElementById('view'))">
        <option value="">All products</option>
        ${DB.data.products.map(p=>`<option value="${p.id}" ${analyticsView.product===p.id?'selected':''}>${p.name}</option>`).join('')}
      </select>
      <select class="select" onchange="analyticsView.type=this.value;renderAnalytics(document.getElementById('view'))">
        <option value="">All content types</option>
        ${getPostTypes().map(t=>`<option ${analyticsView.type===t?'selected':''}>${t}</option>`).join('')}
      </select>
      ${(analyticsView.brand||analyticsView.product||analyticsView.type) ? `<button class="btn btn-ghost btn-sm" onclick="analyticsView.brand='';analyticsView.product='';analyticsView.type='';renderAnalytics(document.getElementById('view'))">Clear</button>` : ''}
    </div>
    <div class="card" style="padding:18px 20px;margin-bottom:16px;">
      <div class="section-title">Content Production — ${analyticsView.period==='monthly'?monthName(Number(analyticsView.month.split('-')[1])-1)+' '+analyticsView.month.split('-')[0]:analyticsView.year}</div>
      <div id="an-production"></div>
    </div>
    <div class="grid-2">
      <div class="card" style="padding:18px 20px;">
        <div class="section-title">Brand Breakdown — Content per Brand</div>
        <div id="an-brand"></div>
      </div>
      <div class="card" style="padding:18px 20px;">
        <div class="section-title">Post Type Breakdown</div>
        <div id="an-type"></div>
      </div>
    </div>
    <div class="card" style="padding:18px 20px;margin-top:16px;">
      <div class="section-title">Product Breakdown — Content per Product</div>
      <div id="an-product"></div>
    </div>
    <div class="card" style="padding:18px 20px;margin-top:16px;">
      <div class="section-title">By creator</div>
      <div id="an-user"></div>
    </div>
  `;

  let inRange = DB.data.logs.slice();
  if(analyticsView.period==='monthly'){
    inRange = inRange.filter(l=>l.date.slice(0,7)===analyticsView.month);
  } else {
    inRange = inRange.filter(l=>l.date.slice(0,4)===analyticsView.year);
  }
  if(analyticsView.brand) inRange = inRange.filter(l=>l.brand===analyticsView.brand);
  if(analyticsView.product) inRange = inRange.filter(l=>l.product===analyticsView.product);
  if(analyticsView.type) inRange = inRange.filter(l=>l.type===analyticsView.type);

  // Production over time (weekly buckets within month, or monthly buckets within year)
  const prodWrap = el.querySelector('#an-production');
  let buckets = [];
  if(analyticsView.period==='monthly'){
    const [y,m] = analyticsView.month.split('-').map(Number);
    const daysInMonth = new Date(y, m, 0).getDate();
    for(let w=0; w*7<daysInMonth; w++){
      const startD = w*7+1, endD = Math.min(daysInMonth, startD+6);
      const label = `W${w+1} (${startD}-${endD})`;
      const count = inRange.filter(l=>{ const d=Number(l.date.split('-')[2]); return d>=startD && d<=endD; }).length;
      buckets.push({label, count});
    }
  } else {
    for(let m=0;m<12;m++){
      const mm = String(m+1).padStart(2,'0');
      const count = inRange.filter(l=>l.date.slice(5,7)===mm).length;
      buckets.push({label: monthName(m).slice(0,3), count});
    }
  }
  const maxB = Math.max(1, ...buckets.map(b=>b.count));
  prodWrap.innerHTML = buckets.map(b=>`<div class="bar-row"><div class="bar-label">${b.label}</div><div class="bar-track"><div class="bar-fill" style="width:${b.count/maxB*100}%;background:var(--accent)"></div></div><div class="bar-val">${b.count}</div></div>`).join('') || emptyState('No content','Try different filters.');

  const brandWrap = el.querySelector('#an-brand');
  const max2 = Math.max(1, ...BRANDS.map(b=>inRange.filter(l=>l.brand===b.id).length));
  brandWrap.innerHTML = BRANDS.map(b=>{
    const c = inRange.filter(l=>l.brand===b.id).length;
    return `<div class="bar-row"><div class="bar-label"><span class="brand-chip"><span class="brand-dot" style="background:${b.color}"></span>${b.name}</span></div><div class="bar-track"><div class="bar-fill" style="width:${c/max2*100}%;background:${b.color}"></div></div><div class="bar-val">${c}</div></div>`;
  }).join('');

  const typeWrap = el.querySelector('#an-type');
  const max1 = Math.max(1, ...getPostTypes().map(t=>inRange.filter(l=>l.type===t).length));
  typeWrap.innerHTML = getPostTypes().map(t=>{
    const c = inRange.filter(l=>l.type===t).length;
    return `<div class="bar-row"><div class="bar-label">${t}</div><div class="bar-track"><div class="bar-fill" style="width:${c/max1*100}%;background:var(--blue)"></div></div><div class="bar-val">${c}</div></div>`;
  }).join('');

  const productWrap = el.querySelector('#an-product');
  const prodCounts = DB.data.products.map(p=>({p, count:inRange.filter(l=>l.product===p.id).length})).filter(x=>x.count>0 || !analyticsView.product).sort((a,b)=>b.count-a.count).slice(0,12);
  const max4 = Math.max(1, ...prodCounts.map(x=>x.count));
  productWrap.innerHTML = prodCounts.length ? prodCounts.map(({p,count})=>{
    const b = brandOf(p.brand);
    return `<div class="bar-row"><div class="bar-label" style="width:180px;">${escapeHtml(p.name)}</div><div class="bar-track"><div class="bar-fill" style="width:${count/max4*100}%;background:${b.color}"></div></div><div class="bar-val">${count}</div></div>`;
  }).join('') : emptyState('No content','Try different filters.');

  const userWrap = el.querySelector('#an-user');
  const max3 = Math.max(1, ...DB.data.users.map(u=>inRange.filter(l=>l.completedBy===u.id).length));
  userWrap.innerHTML = DB.data.users.map(u=>{
    const c = inRange.filter(l=>l.completedBy===u.id).length;
    return `<div class="bar-row"><div class="bar-label">${u.name}</div><div class="bar-track"><div class="bar-fill" style="width:${c/max3*100}%;background:var(--blue)"></div></div><div class="bar-val">${c}</div></div>`;
  }).join('');
}

function saveUser(id){
  const name = document.getElementById('um-name').value.trim();
  if(!name){ toast('Add a name'); return; }
  const vals = {name, email:document.getElementById('um-email').value.trim(), role:document.getElementById('um-role').value};

  else{ DB.data.users.unshift({id:uid('u'), ...vals}); logAudit(currentUser().id, 'user_created', `Created user: ${name}`); }
  DB.save(); closeModal(); renderUsers(document.getElementById('view'));
  toast(id?'Updated':'Added');
}

function deleteUser(id){
  DB.data.users = DB.data.users.filter(x=>x.id!==id);
  logAudit(currentUser().id, 'user_deleted', `Deleted user`);
  DB.save(); closeModal(); renderUsers(document.getElementById('view'));

}

/* MODAL & NOTIFICATIONS */
function openModal(){

function toggleNotif(){
  const panel = document.getElementById('notif-panel');
  panel.classList.toggle('open');
  if(panel.classList.contains('open')) renderNotifList();
}

function notifAppliesToMe(n){
  const me = currentUser();
  if(n.forUser) return n.forUser===me.id;
  return n.forRole==='all' || n.forRole===SESSION.role || SESSION.role==='Admin';
}

function renderNotifList(){
  const list = DB.data.notifications.filter(notifAppliesToMe);
  const wrap = document.getElementById('notif-list');
  wrap.innerHTML = list.length ? list.map(n=>{
    const type = NOTIF_TYPES[n.type] || {badge:'📢', label:'Notification'};
    return `
    <div class="notif-item ${n.read?'read':''}">
      <div class="badge notif-${n.type||'default'}" style="background:${['task','assigned'].includes(n.type)?'#3d6fa8':['comment'].includes(n.type)?'#8a5cbf':['complete'].includes(n.type)?'#2f6f5e':'#e2a542'};">${type.badge}</div>
      <div><div>${escapeHtml(n.text)}</div><div class="notif-time">${timeAgo(n.ts)}</div></div>
    </div>`;
  }).join('') : `<div style="padding:24px;text-align:center;color:var(--ink-soft);font-size:12.5px;">No notifications.</div>`;
}

function markAllRead(){
  DB.data.notifications.forEach(n=>n.read=true); DB.save(); renderNotifList(); refreshNotifDot();
}

function refreshNotifDot(){
  const list = DB.data.notifications.filter(n=>notifAppliesToMe(n) && !n.read);
  document.getElementById('notif-dot').style.display = list.length ? 'block':'none';
}

document.addEventListener('click', (e)=>{
  const panel = document.getElementById('notif-panel');
  if(panel.classList.contains('open') && !panel.contains(e.target) && !e.target.closest('.icon-btn')) panel.classList.remove('open');
});

/* COMMAND PALETTE */
function openCmdk(){
  document.getElementById('cmdk').classList.add('open');
  document.getElementById('cmdk-input').value='';
  setTimeout(()=>document.getElementById('cmdk-input').focus(),30);
  renderCmdkResults('');
}
function closeCmdk(){ document.getElementById('cmdk').classList.remove('open'); }
document.addEventListener('keydown', e=>{
  if(e.key==='/' && document.activeElement.tagName!=='INPUT' && document.activeElement.tagName!=='TEXTAREA'){ e.preventDefault(); if(SESSION) openCmdk(); }
  if(e.key==='Escape') closeCmdk();
});

function renderCmdkResults(q){
  q = q.toLowerCase().trim();
  const results = [];
  DB.data.tasks.forEach(t=>{ if(!q || t.title.toLowerCase().includes(q) || brandOf(t.brand).name.toLowerCase().includes(q)) results.push({tag:'Task', label:t.title, sub:brandOf(t.brand).name+' · '+t.status, action:()=>{closeCmdk();renderView('tasks');}}); });
  DB.data.products.forEach(p=>{ if(!q || p.name.toLowerCase().includes(q) || (p.sku||'').toLowerCase().includes(q)) results.push({tag:'Product', label:p.name, sub:brandOf(p.brand).name+' · '+p.status, action:()=>{closeCmdk();openProductDashboard(p.id);}}); });
  BRANDS.forEach(b=>{ if(!q || b.name.toLowerCase().includes(q)) results.push({tag:'Brand', label:b.name, sub:'View analytics', action:()=>{closeCmdk();renderView('brands');}}); });
  DB.data.users.forEach(u=>{ if(!q || u.name.toLowerCase().includes(q)) results.push({tag:'User', label:u.name, sub:u.role, action:()=>{closeCmdk();renderView('users');}}); });
  const wrap = document.getElementById('cmdk-results');
  wrap.innerHTML = results.slice(0,15).map((r,i)=>`<div class="cmdk-item" onclick="window.__cmdkAction(${i})"><div><div>${escapeHtml(r.label)}</div><div class="cmdk-tag">${r.sub}</div></div><div class="cmdk-tag">${r.tag}</div></div>`).join('') || `<div style="padding:20px;text-align:center;color:var(--ink-soft);font-size:12.5px;">No results.</div>`;
  window.__cmdkResults = results;
  window.__cmdkAction = (i)=>{ window.__cmdkResults[i].action(); };
}

/* BOOT */
(function init(){
  const raw = localStorage.getItem('contentos_session');
  DB.load();
  BRANDS = DB.data.brands;
  const nameList = document.getElementById('user-list');
  nameList.innerHTML = DB.data.users.map(u=>`<option value="${u.name}">`).join('');
  document.getElementById('login-name').addEventListener('input', function(){
    const match = DB.data.users.find(u=>u.name.toLowerCase()===this.value.trim().toLowerCase());
    if(match) document.getElementById('login-role').value = match.role;
  });
  if(raw){ SESSION = JSON.parse(raw); boot(); }
})();
</script>
</body>
</html>
